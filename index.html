<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Workout</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect fill='%23ff4e2a' x='0' y='0' width='64' height='64' rx='14'/%3E%3Crect fill='white' x='28' y='25' width='8' height='14' rx='2'/%3E%3Crect fill='white' x='5' y='21' width='7' height='22' rx='3'/%3E%3Crect fill='white' x='52' y='21' width='7' height='22' rx='3'/%3E%3Crect fill='white' x='3' y='26' width='11' height='12' rx='2'/%3E%3Crect fill='white' x='50' y='26' width='11' height='12' rx='2'/%3E%3Crect fill='white' x='12' y='29' width='16' height='6' rx='2'/%3E%3Crect fill='white' x='36' y='29' width='16' height='6' rx='2'/%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ━━ Tokens — Light default ━━ */
:root {
  --bg:        #f4f4f2;
  --surface:   #ffffff;
  --sf2:       #f9f9f7;
  --sf3:       #f0f0ee;
  --sf4:       #e6e6e3;
  --accent:    #ff4e2a;
  --accent2:   #ff7a57;
  --ac-dim:    rgba(255,78,42,.09);
  --text:      #141414;
  --tsub:      #555;
  --tmuted:    #aaa;
  --border:    #e8e8e5;
  --border2:   #d8d8d5;
  --red:       #ff3b30;
  --green:     #28c76f;
  --sh0: 0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh1: 0 2px 8px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.05);
  --sh2: 0 8px 28px rgba(0,0,0,.09),0 2px 6px rgba(0,0,0,.05);
  --sh3: 0 28px 72px rgba(0,0,0,.13),0 4px 14px rgba(0,0,0,.07);
}
body.dark {
  --bg:      #0e0e0e;
  --surface: #181818;
  --sf2:     #1e1e1e;
  --sf3:     #262626;
  --sf4:     #323232;
  --text:    #f0f0f0;
  --tsub:    #bbb;
  --tmuted:  #555;
  --border:  #282828;
  --border2: #383838;
  --sh0: 0 1px 3px rgba(0,0,0,.5);
  --sh1: 0 2px 8px rgba(0,0,0,.55);
  --sh2: 0 8px 28px rgba(0,0,0,.6);
  --sh3: 0 28px 72px rgba(0,0,0,.75);
}

/* ━━ Base ━━ */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;min-height:100dvh;
  -webkit-text-size-adjust:100%;overscroll-behavior:none;
  transition:background .2s,color .2s;
}

/* ━━ Header ━━ */
#hdr{
  position:sticky;top:0;z-index:200;
  background:var(--surface);border-bottom:1px solid var(--border);
  height:56px;padding:0 20px;
  padding-top:env(safe-area-inset-top,0px);
  display:flex;align-items:center;gap:10px;
  box-shadow:var(--sh0);
}
#logo{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:800;color:var(--accent);letter-spacing:-.4px;white-space:nowrap;}
.logo-dot{
  width:30px;height:30px;border-radius:9px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:15px;
  box-shadow:0 2px 8px rgba(255,78,42,.35);flex-shrink:0;
}
#hdr-gap{flex:1;}
#hdr-r{display:flex;align-items:center;gap:7px;}

#btn-add{
  height:34px;padding:0 14px;
  background:var(--accent);color:#fff;border:none;border-radius:10px;
  font-family:'Pretendard',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;
  box-shadow:0 2px 8px rgba(255,78,42,.28);
  transition:all .2s cubic-bezier(.34,1.2,.64,1);
}
#btn-add:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 5px 16px rgba(255,78,42,.4);}

.hbtn{
  width:34px;height:34px;border-radius:10px;
  border:1px solid var(--border2);background:var(--sf2);
  color:var(--tsub);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all .15s;flex-shrink:0;
}
.hbtn:hover{background:var(--sf3);color:var(--text);}

/* ━━ Tab Bar ━━ */
#tabs{
  position:sticky;top:56px;z-index:190;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:3px;
}
#tab-scroll{
  flex:1;display:flex;align-items:center;gap:2px;
  overflow-x:auto;padding:8px 0;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
#tab-scroll::-webkit-scrollbar{display:none;}

.tab{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:8px;border:1px solid transparent;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  font-size:13px;font-weight:500;color:var(--tmuted);
  transition:all .16s;
}
.tab:hover{background:var(--sf3);color:var(--tsub);}
.tab.on{background:var(--ac-dim);border-color:rgba(255,78,42,.18);color:var(--accent);font-weight:700;}
.tcnt{
  min-width:18px;height:18px;padding:0 5px;
  background:var(--sf3);border-radius:9px;
  font-size:10px;font-weight:700;color:var(--tmuted);
  display:inline-flex;align-items:center;justify-content:center;
  transition:all .16s;
}
.tab.on .tcnt{background:var(--accent);color:#fff;}
.tmeta{display:none;gap:1px;margin-left:1px;}
.tab:hover .tmeta,.tab.on .tmeta{display:flex;}
.tmbtn{
  width:17px;height:17px;border-radius:4px;border:none;
  background:transparent;color:var(--tmuted);cursor:pointer;font-size:10px;
  display:flex;align-items:center;justify-content:center;transition:all .12s;
}
.tmbtn:hover{background:var(--sf4);color:var(--text);}
.tmbtn.del:hover{background:rgba(255,59,48,.1);color:var(--red);}
#btn-newtab{
  flex-shrink:0;width:28px;height:28px;border-radius:7px;
  border:1.5px dashed var(--border2);background:transparent;
  color:var(--tmuted);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;margin-left:3px;
}
#btn-newtab:hover{border-color:var(--accent);color:var(--accent);background:var(--ac-dim);}

/* ━━ Main ━━ */
#main{flex:1;padding:22px 20px 40px;}

.empty-wrap{min-height:380px;display:flex;align-items:center;justify-content:center;}
.empty-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:44px 48px;text-align:center;max-width:320px;
  box-shadow:var(--sh1);
}
.eicon{font-size:46px;margin-bottom:14px;opacity:.4;display:block;}
.ettl{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px;}
.esub{font-size:13px;color:var(--tmuted);line-height:1.85;}
.esub b{color:var(--accent);font-weight:700;}

/* ━━ Grid ━━ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;}

/* ━━ Card ━━ */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:var(--sh0);
  animation:cardIn .26s cubic-bezier(.34,1.2,.64,1) both;
  transition:box-shadow .22s,transform .22s,border-color .22s;
}
.card:hover{box-shadow:var(--sh2);transform:translateY(-3px);border-color:rgba(255,78,42,.2);}
@keyframes cardIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.card-hd{
  padding:8px 12px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  border-bottom:1px solid var(--border);background:var(--sf2);
}
.card-ttl{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.card-ttl.mt{color:var(--tmuted);font-weight:400;font-size:11px;font-family:'JetBrains Mono',monospace;}
.cbtns{display:flex;gap:3px;flex-shrink:0;}
.cbtn{
  height:23px;padding:0 8px;
  border:1px solid var(--border2);background:var(--sf3);
  color:var(--tmuted);border-radius:5px;
  cursor:pointer;font-size:10.5px;font-family:'Pretendard',sans-serif;font-weight:600;
  transition:all .13s;display:flex;align-items:center;
}
.cbtn:hover{background:var(--sf4);color:var(--text);}
.cbtn.del{border-color:transparent;background:transparent;}
.cbtn.del:hover{border-color:var(--red);color:var(--red);background:rgba(255,59,48,.07);}

/* YouTube */
.ytbox{position:relative;background:#000;overflow:hidden;}
.ytbox .ytinner{display:block;width:100%;}
.ytbox>*:not(.ytinner){position:absolute;inset:0;width:100%;height:100%;}
.ytthumb{cursor:pointer;position:absolute;inset:0;}
.ytimg{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .3s,transform .5s;}
.ytthumb:hover .ytimg{opacity:.68;transform:scale(1.04);}
.ytthumb::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.52) 0%,transparent 58%);
  pointer-events:none;
}
.ytplay{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:52px;height:37px;background:rgba(255,0,0,.9);border-radius:10px;
  pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.48);
  transition:transform .24s cubic-bezier(.34,1.56,.64,1),background .18s;
}
.ytthumb:hover .ytplay{background:#f00;transform:translate(-50%,-50%) scale(1.14);}
.ytplay::after{
  content:'';position:absolute;top:50%;left:54%;
  transform:translate(-50%,-50%);
  border-left:15px solid #fff;border-top:9px solid transparent;border-bottom:9px solid transparent;
}

/* Card body */
.card-body{padding:11px 13px;}
.card-memo{font-size:12.5px;color:var(--tsub);line-height:1.82;white-space:pre-wrap;word-break:break-word;}

/* Link row */
.linkrow{
  padding:9px 12px;background:var(--sf2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:7px;overflow:hidden;
}
.linkrow a{color:var(--accent);text-decoration:none;font-size:11px;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.linkrow a:hover{text-decoration:underline;}

/* ━━ Modals ━━ */
.ov{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.42);backdrop-filter:blur(10px);
  z-index:1000;align-items:center;justify-content:center;padding:16px;
}
.ov.open{display:flex;}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:22px;width:100%;max-width:460px;padding:28px;
  animation:mIn .22s cubic-bezier(.34,1.2,.64,1);box-shadow:var(--sh3);
}
@keyframes mIn{from{opacity:0;transform:scale(.94) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.mrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.mttl{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px;}
.mttl .ac{color:var(--accent);}
.mclose{
  width:28px;height:28px;border-radius:8px;
  border:1px solid var(--border2);background:var(--sf2);
  color:var(--tmuted);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all .13s;
}
.mclose:hover{background:var(--sf3);color:var(--text);}
.fg{margin-bottom:14px;}
.fl{
  display:block;font-size:10px;font-weight:700;color:var(--tmuted);
  letter-spacing:1.4px;text-transform:uppercase;margin-bottom:6px;
  font-family:'JetBrains Mono',monospace;
}
.fi,.ft{
  width:100%;background:var(--sf2);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);font-family:'Pretendard',sans-serif;
  font-size:14px;padding:10px 13px;outline:none;
  transition:border-color .17s,box-shadow .17s;
}
.fi:focus,.ft:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,78,42,.1);}
.fi::placeholder,.ft::placeholder{color:var(--tmuted);}
.ft{resize:vertical;min-height:82px;line-height:1.7;}

/* Detect badge */
#dbox{
  margin-top:7px;border-radius:9px;padding:8px 12px;
  display:none;align-items:center;gap:8px;
  font-size:12px;font-weight:600;transition:background .2s;
}
#dbox.ld{display:flex;background:var(--sf3);color:var(--tmuted);}
#dbox.sh{display:flex;background:rgba(255,78,42,.08);color:var(--accent);}
#dbox.lf{display:flex;background:rgba(40,199,111,.08);color:var(--green);}
#dbox.er{display:flex;background:rgba(255,59,48,.08);color:var(--red);}
.dspinner{
  width:10px;height:10px;border-radius:50%;
  border:1.5px solid currentColor;border-top-color:transparent;
  animation:spin .7s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg);}}
.ddot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}

.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.btn-no{
  height:38px;padding:0 18px;
  background:var(--sf2);border:1px solid var(--border2);
  color:var(--tsub);border-radius:10px;cursor:pointer;
  font-size:13px;font-family:'Pretendard',sans-serif;font-weight:600;
  transition:all .13s;
}
.btn-no:hover{background:var(--sf3);}
.btn-yes{
  height:38px;padding:0 22px;
  background:var(--accent);border:none;color:#fff;border-radius:10px;cursor:pointer;
  font-size:13px;font-family:'Pretendard',sans-serif;font-weight:700;
  box-shadow:0 3px 10px rgba(255,78,42,.26);
  transition:all .2s cubic-bezier(.34,1.2,.64,1);
}
.btn-yes:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 5px 16px rgba(255,78,42,.38);}
.btn-yes:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:none;}

/* ━━ Drag ━━ */
body.dragging{user-select:none;-webkit-user-select:none;}
.rph{border:2px dashed rgba(255,78,42,.28)!important;background:rgba(255,78,42,.04)!important;border-radius:16px;min-height:150px;}
.dghost{position:fixed!important;z-index:9999;pointer-events:none;opacity:.93;border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,.18),0 0 0 1.5px var(--accent);}
.card.dsrc{opacity:.1;}

/* ━━ Mobile ━━ */
@media(max-width:768px){
  #hdr{height:50px;padding:0 14px;}
  .logo-txt{display:none;}
  #btn-add .btn-lbl{display:none;}
  #btn-add{width:34px;padding:0;justify-content:center;}
  #tabs{top:50px;padding:0 10px;}
  #main{padding:14px 14px 32px;}
  .grid{grid-template-columns:1fr;gap:12px;}
  .card{border-radius:14px;}
  .ov{align-items:flex-end;padding:0;}
  .modal{max-width:none;border-radius:22px 22px 0 0;padding:24px 18px calc(24px + env(safe-area-inset-bottom,0px));}
  .fi,.ft{font-size:16px;}
}
@media(max-width:420px){
  .empty-box{padding:36px 24px;}
}


/* ━━ UI Polish Upgrade: bordered tabs, premium cards, inner video-type tabs ━━ */
:root{
  --glass: rgba(255,255,255,.74);
  --glow: rgba(255,78,42,.22);
  --line-soft: rgba(255,255,255,.62);
}
body.dark{
  --glass: rgba(24,24,24,.72);
  --glow: rgba(255,78,42,.28);
  --line-soft: rgba(255,255,255,.05);
}
body{
  background:
    radial-gradient(circle at 18% 8%, rgba(255,78,42,.10), transparent 28%),
    radial-gradient(circle at 86% 12%, rgba(255,122,87,.12), transparent 26%),
    linear-gradient(180deg, var(--sf2) 0%, var(--bg) 34%, var(--bg) 100%);
  isolation:isolate;
}
body::before{
  content:'';position:fixed;inset:-30%;z-index:-1;pointer-events:none;
  background:
    radial-gradient(circle, rgba(255,78,42,.08) 0 1px, transparent 1.6px),
    radial-gradient(circle, rgba(0,0,0,.035) 0 1px, transparent 1.5px);
  background-size:34px 34px,52px 52px;
  animation:bgDrift 26s linear infinite;
  opacity:.45;
}
body.dark::before{opacity:.25;background:radial-gradient(circle, rgba(255,255,255,.08) 0 1px, transparent 1.5px);background-size:42px 42px;}
@keyframes bgDrift{to{transform:translate3d(42px,36px,0) rotate(.001deg);}}
#hdr{
  background:var(--glass);
  backdrop-filter:blur(18px) saturate(150%);
  border-bottom:1px solid var(--border2);
  box-shadow:0 10px 30px rgba(0,0,0,.06);
}
.logo-dot{position:relative;overflow:hidden;}
.logo-dot::after{content:'';position:absolute;inset:-40%;background:linear-gradient(120deg,transparent 35%,rgba(255,255,255,.55),transparent 65%);transform:translateX(-80%);animation:logoShine 4.2s ease-in-out infinite;}
@keyframes logoShine{0%,55%{transform:translateX(-90%);}75%,100%{transform:translateX(90%);}}
#btn-add,.btn-yes{position:relative;overflow:hidden;}
#btn-add::after,.btn-yes::after{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,.26),transparent);transform:translateX(-120%);transition:transform .55s;}
#btn-add:hover::after,.btn-yes:hover::after{transform:translateX(120%);}
#tabs{
  padding:8px 14px;
  background:var(--glass);
  backdrop-filter:blur(18px) saturate(150%);
  border-bottom:1px solid var(--border2);
  box-shadow:0 8px 24px rgba(0,0,0,.045);
}
#tab-scroll{
  gap:6px;padding:6px;
  border:1px solid var(--border2);
  background:linear-gradient(180deg,var(--sf2),var(--surface));
  border-radius:16px;
  box-shadow:inset 0 1px 0 var(--line-soft), var(--sh0);
}
.tab{
  min-height:34px;
  padding:7px 13px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--surface);
  box-shadow:0 1px 0 rgba(255,255,255,.55), 0 1px 4px rgba(0,0,0,.035);
  color:var(--tsub);
}
.tab:hover{border-color:var(--border2);background:var(--sf2);transform:translateY(-1px);}
.tab.on{
  background:linear-gradient(180deg,rgba(255,78,42,.16),rgba(255,78,42,.07));
  border-color:rgba(255,78,42,.44);
  color:var(--accent);
  box-shadow:0 8px 22px rgba(255,78,42,.13), inset 0 1px 0 rgba(255,255,255,.42);
}
#btn-newtab{
  width:36px;height:36px;border-radius:12px;margin-left:8px;
  border:1.6px dashed var(--border2);background:var(--surface);box-shadow:var(--sh0);
}
#btn-newtab:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(255,78,42,.12);}
#main{position:relative;}
.subtabs-panel{
  width:min(620px,100%);
  margin:0 auto 20px;
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;padding:8px;
  border:1px solid var(--border2);
  border-radius:20px;
  background:linear-gradient(180deg,var(--surface),var(--sf2));
  box-shadow:var(--sh1), inset 0 1px 0 var(--line-soft);
  animation:sectionIn .24s cubic-bezier(.34,1.2,.64,1) both;
}
.subtab{
  min-height:46px;
  border:1px solid var(--border);
  border-radius:15px;
  background:var(--surface);
  color:var(--tsub);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:9px;
  font-family:'Pretendard',sans-serif;
  font-size:13px;font-weight:800;
  transition:transform .18s, box-shadow .18s, border-color .18s, background .18s, color .18s;
}
.subtab:hover{transform:translateY(-1px);border-color:var(--border2);box-shadow:var(--sh0);}
.subtab.on{
  color:var(--accent);
  border-color:rgba(255,78,42,.45);
  background:linear-gradient(180deg,rgba(255,78,42,.15),rgba(255,78,42,.055));
  box-shadow:0 12px 26px rgba(255,78,42,.13), inset 0 1px 0 rgba(255,255,255,.45);
}
.subicon{font-size:16px;line-height:1;}
.subcnt{
  min-width:24px;height:22px;padding:0 7px;
  border-radius:999px;
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--sf3);color:var(--tmuted);
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:800;
}
.subtab.on .subcnt{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(255,78,42,.26);}
@keyframes sectionIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.grid{gap:18px;animation:sectionIn .24s cubic-bezier(.34,1.2,.64,1) both;}
.card{
  position:relative;
  border-radius:22px;
  border:1px solid var(--border2);
  background:linear-gradient(180deg,var(--surface),var(--sf2));
  box-shadow:0 12px 34px rgba(20,20,20,.07),0 1px 0 rgba(255,255,255,.7) inset;
  overflow:hidden;
}
body.dark .card{box-shadow:0 16px 38px rgba(0,0,0,.45),0 1px 0 rgba(255,255,255,.04) inset;}
.card::before{
  content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(circle at 22% 0%, rgba(255,78,42,.13), transparent 35%);
  opacity:.72;transition:opacity .22s, transform .32s;
}
.card::after{
  content:'';position:absolute;top:0;left:-70%;width:45%;height:100%;z-index:1;pointer-events:none;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.22),transparent);
  transform:skewX(-12deg);transition:left .55s ease;
}
.card:hover{transform:translateY(-5px);border-color:rgba(255,78,42,.34);box-shadow:0 20px 48px rgba(20,20,20,.12),0 0 0 4px rgba(255,78,42,.045);}
.card:hover::before{opacity:1;transform:scale(1.03);}
.card:hover::after{left:125%;}
.card>*{position:relative;z-index:2;}
.card-hd{
  min-height:56px;
  padding:12px 14px;
  align-items:flex-start;
  background:linear-gradient(180deg,rgba(255,255,255,.58),rgba(255,255,255,.18));

}

/* ━━ Final layout refinements: centered title, in-menu add button, longform ratio ━━ */
#hdr{position:sticky;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;}
#logo{grid-column:2;justify-self:center;text-align:center;flex-direction:column;gap:2px;line-height:1.05;}
.logo-dot{width:32px;height:32px;}
.logo-txt{display:block;font-size:15px;}
#hdr-gap{display:none;}
#hdr-r{grid-column:3;justify-self:end;}
.content-toolbar{
  width:min(1120px,100%);
  margin:0 auto 18px;
  display:flex;align-items:center;justify-content:flex-end;gap:10px;
  padding:0 2px;
  border:0;border-radius:0;
  background:transparent;
  box-shadow:none;
  animation:sectionIn .24s cubic-bezier(.34,1.2,.64,1) both;
}
.content-add{
  min-width:132px;height:42px;padding:0 18px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  font-family:'Pretendard',sans-serif;font-size:13px;font-weight:900;
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap;
  box-shadow:0 10px 24px rgba(255,78,42,.26);
  transition:transform .2s cubic-bezier(.34,1.2,.64,1), box-shadow .2s, filter .2s;
}
.content-add:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(255,78,42,.36);filter:saturate(1.04);}
.content-add:active{transform:translateY(0);}
#btn-add.content-add{position:relative;overflow:hidden;width:auto;min-width:128px;height:42px;padding:0 16px;justify-content:center;}
#btn-add.content-add .btn-lbl{display:inline!important;}
#btn-add.content-add::after{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,.28),transparent);transform:translateX(-120%);transition:transform .55s;}
#btn-add.content-add:hover::after{transform:translateX(120%);}
.grid[data-sub="longform"]{grid-template-columns:repeat(auto-fill,minmax(340px,1fr));}
.ytbox.longform{padding-bottom:56.25%!important;max-height:360px;}
.ytbox.shorts{padding-bottom:177.78%!important;}
.card[data-vtype="longform"] .ytimg{object-fit:cover;}
.card[data-vtype="longform"] .ytplay{width:62px;height:43px;}
@media(max-width:768px){

  #btn-add.content-add .btn-lbl{display:inline!important;}
  .grid[data-sub="longform"]{grid-template-columns:1fr;}
}

/* ━━ v9: Bigger longform player + Premium-friendly YouTube playback path ━━ */
.subtabs-row,

}
.grid[data-sub="longform"]{

}

/* ━━ Share / Backup UI ━━ */
#btn-share{
  width:auto;min-width:78px;height:36px;padding:0 12px;gap:6px;
  border:1.5px solid var(--border2);font-weight:800;font-size:12.5px;
  background:linear-gradient(180deg,var(--sf2),var(--surface));
}
#btn-share:hover{border-color:rgba(255,78,42,.45);color:var(--accent);box-shadow:0 8px 18px rgba(255,78,42,.12);}
.share-box{
  border:1.5px solid var(--border);background:var(--sf2);
  border-radius:16px;padding:15px;margin-bottom:14px;
}
.share-lead{font-size:13px;line-height:1.75;color:var(--tsub);word-break:keep-all;}
.share-lead b{color:var(--accent);font-weight:800;}
.share-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
.share-btn{
  min-height:42px;padding:0 14px;border-radius:12px;
  border:1.5px solid var(--border2);background:var(--surface);color:var(--text);
  font-family:'Pretendard',sans-serif;font-size:13px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:transform .16s,box-shadow .16s,border-color .16s,background .16s;
}
.share-btn:hover{transform:translateY(-1px);border-color:rgba(255,78,42,.48);box-shadow:var(--sh1);}
.share-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 8px 20px rgba(255,78,42,.24);}
.share-btn.primary:hover{background:var(--accent2);}
.share-btn.full{grid-column:1 / -1;}
.share-msg{
  display:none;margin-top:12px;padding:10px 12px;border-radius:12px;
  font-size:12.5px;font-weight:700;line-height:1.5;border:1px solid transparent;
}
.share-msg.ok{display:block;background:rgba(40,199,111,.10);color:var(--green);border-color:rgba(40,199,111,.25);}
.share-msg.warn{display:block;background:rgba(255,78,42,.10);color:var(--accent);border-color:rgba(255,78,42,.26);}
.share-msg.err{display:block;background:rgba(255,59,48,.10);color:var(--red);border-color:rgba(255,59,48,.25);}
body.dark #btn-share{border-color:rgba(255,255,255,.22);background:linear-gradient(180deg,#252525,#191919);}
body.dark #btn-share:hover{border-color:rgba(255,126,96,.68);box-shadow:0 0 0 3px rgba(255,78,42,.12);}
body.dark .share-box{border-color:rgba(255,255,255,.16);background:#202020;}
body.dark .share-btn{border-color:rgba(255,255,255,.18);background:#181818;color:#f2f2f2;}
body.dark .share-btn:hover{border-color:rgba(255,126,96,.58);background:#242424;}
@media(max-width:768px){
  #hdr{grid-template-columns:92px 1fr 92px!important;}
  #hdr-r{gap:6px!important;}
  #btn-share{width:38px!important;min-width:38px!important;height:38px!important;padding:0!important;border-radius:12px!important;}
  #btn-share .share-label{display:none!important;}
  #btn-theme{width:38px!important;height:38px!important;border-radius:12px!important;}
  .share-actions{grid-template-columns:1fr;}
  .share-btn.full{grid-column:auto;}
}

.share-modal{max-width:720px;}
.share-head{position:relative;justify-content:center;margin-bottom:18px;}
.share-head .mttl{width:100%;text-align:center;font-size:19px;}
.share-head .mclose{position:absolute;right:0;top:50%;transform:translateY(-50%);}

<script>
/* ━━ Helpers ━━ */
const uid =()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const esc =s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const SUBS={shorts:{label:'숏폼',icon:'⚡'},longform:{label:'롱폼',icon:'▶'}};

/* ━━ YouTube ━━ */
const isYT  =url=>/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)/i.test(url||'');
const isSh  =url=>/youtube\.com\/shorts\//i.test(url||'');
const getId =url=>{
  const ps=[/youtube\.com\/watch\?v=([^&\s]+)/,/youtu\.be\/([^?\s]+)/,/youtube\.com\/shorts\/([^?\s]+)/];
  for(const p of ps){const m=String(url||'').match(p);if(m)return m[1];}
  return null;
};
function videoTypeFromItem(it){
  const raw=String(it?.vtype||it?.videoType||it?.type||'').toLowerCase();
  if(['shorts','short','숏폼'].includes(raw)) return 'shorts';
  if(['longform','long','longs','롱폼'].includes(raw)) return 'longform';
  const link=it?.link||it?.url||'';
  if(link&&isSh(link)) return 'shorts';
  if(Number(it?.ratio)>100) return 'shorts';
  return 'longform';
}

async function fetchYTMeta(targetUrls){
  const urls=[...new Set(targetUrls.filter(Boolean))];
  for(const target of urls){
    try{
      const r=await fetch('https://www.youtube.com/oembed?url='+encodeURIComponent(target)+'&format=json');
      if(!r.ok) continue;
      const d=await r.json();
      if(d&&d.title) return d;
    }catch(e){}
  }
  for(const target of urls){
    try{
      const r=await fetch('https://noembed.com/embed?url='+encodeURIComponent(target));
      if(!r.ok) continue;
      const d=await r.json();
      if(d&&d.title) return d;
    }catch(e){}
  }
  return null;
}

async function detectYT(url){
  const id=getId(url); if(!id) return null;
  const shortUrl=`https://www.youtube.com/shorts/${id}`;
  const watchUrl=`https://www.youtube.com/watch?v=${id}`;
  const youtuUrl=`https://youtu.be/${id}`;
  const forcedShort=isSh(url);
  const meta=await fetchYTMeta(forcedShort?[shortUrl,watchUrl,youtuUrl]:[watchUrl,youtuUrl,shortUrl]);
  const detectedRatio=(meta&&meta.width&&meta.height)?(meta.height/meta.width)*100:null;
  const type=forcedShort?'shorts':(detectedRatio&&detectedRatio>100?'shorts':'longform');
  const ratio=type==='shorts'?177.78:(detectedRatio||56.25);
  return {type,ratio,id,title:(meta&&meta.title)||''};
}

function ytWatchUrl(id,type){
  return type==='shorts' ? `https://www.youtube.com/shorts/${id}` : `https://www.youtube.com/watch?v=${id}`;
}
function thumbCandidates(id,type){
  if(type==='shorts'){
    return [
      `https://i.ytimg.com/vi/${id}/oar2.jpg`,

function setThumbStep(img,step){
  const id=img?.dataset?.ytid;
  const type=img?.dataset?.vtype||'longform';
  if(!id||!img)return false;
  const candidates=thumbCandidates(id,type);
  if(step>=candidates.length){img.onerror=null;img.onload=null;return false;}
  img.dataset.ytstep=String(step);
  img.src=candidates[step];
  return true;
}
function fallbackThumb(img){
  const next=Number(img?.dataset?.ytstep||0)+1;
  setThumbStep(img,next);
}
function validateThumb(img){
  if(!img)return;
  const type=img.dataset.vtype||'longform';
  const step=Number(img.dataset.ytstep||0);
  const minWidth=type==='shorts'?640:720;
  if(img.naturalWidth&&img.naturalWidth<minWidth&&step<thumbCandidates(img.dataset.ytid,type).length-1){
    fallbackThumb(img);
  }
}
function isMobilePlayback(){

function ytEmbedSrc(vid,type='longform',autoplay=false){
  const origin=encodeURIComponent(location.origin&&location.origin!=='null'?location.origin:location.href.split('/').slice(0,3).join('/'));
  const params=[
    autoplay?'autoplay=1':'autoplay=0',
    'rel=0',
    'playsinline=1',
    'controls=1',
    'fs=1',
    'modestbranding=1',
    'iv_load_policy=3',
    'enablejsapi=1',
    `origin=${origin}`
  ];
  return `https://www.youtube.com/embed/${vid}?${params.join('&')}`;
}
function buildYT(url,ratio,type){
  const id=getId(url); if(!id) return '';
  const wid='yt'+Date.now()+Math.random().toString(36).slice(2,6);
  const vtype=type||((isSh(url)||Number(ratio)>100)?'shorts':'longform');
  const pb=vtype==='shorts'?177.78:56.25;
  const watch=ytWatchUrl(id,vtype);

  // 모바일에서는 커스텀 썸네일 → iframe 교체 방식이 iOS/Safari에서
  // 한 번 더 탭해야 재생되는 경우가 있어, 처음부터 YouTube iframe을 노출한다.
  // 사용자는 공식 플레이어의 재생 버튼을 한 번만 누르면 바로 재생된다.
  if(isMobilePlayback()){
    const src=ytEmbedSrc(id,vtype,false);
    return `<div class="ytbox ${vtype} mobile-embed playing" id="${wid}" style="padding-bottom:${pb}%" data-ratio="${pb}">
      <iframe src="${src}" title="YouTube video player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </div>`;
  }

  const thumb=thumbCandidates(id,vtype)[0];
  return `<div class="ytbox ${vtype}" id="${wid}" style="padding-bottom:${pb}%" data-ratio="${pb}">
    <div class="ytthumb" onclick="play('${wid}','${id}','${vtype}')">
      <img class="ytimg" src="${thumb}" data-ytid="${id}" data-vtype="${vtype}" data-ytstep="0"
           onerror="fallbackThumb(this)" onload="validateThumb(this)" loading="lazy" decoding="async" alt=""/>
      <a class="yt-open" href="${watch}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span class="yt-open-text">YouTube 로그인 재생</span></a>
      <div class="ytplay"></div>
    </div>
  </div>`;
}
function play(wid,vid,type='longform'){
  const b=document.getElementById(wid);if(!b)return;
  const pb=b.style.paddingBottom;
  const src=ytEmbedSrc(vid,type,true);
  const watch=ytWatchUrl(vid,type);
  b.classList.add('playing');
  b.innerHTML=`<iframe style="position:absolute;inset:0;width:100%;height:100%;border:none;display:block;"
    src="${src}"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
    <a class="yt-open yt-live" href="${watch}" target="_blank" rel="noopener"><span class="yt-open-text">YouTube에서 열기</span></a>`;
  b.style.paddingBottom=pb;
}

function cloneItemForShare(it){
  const item=Object.assign({},it||{});
  const title=String(item.title||item.name||'');
  const link=String(item.link||item.url||'');
  const memo=String(item.memo||item.content||'');
  const vtype=videoTypeFromItem(Object.assign({},item,{link,url:link}));
  item.id=String(item.id||uid());
  item.title=title;item.name=title;
  item.link=link;item.url=link;

function sanitizeImportedData(raw){
  const src=raw?.workoutData||raw?.data||raw;
  if(!src||!Array.isArray(src.menus)||!src.items||typeof src.items!=='object'){
    throw new Error('invalid');
  }
  const next={menus:[],items:{}};
  const usedMenuIds=new Set();
  src.menus.forEach((m,idx)=>{
    if(!m)return;
    let originalId=String(m.id||'');
    let id=originalId||uid();
    if(usedMenuIds.has(id)) id=uid();
    usedMenuIds.add(id);
    const name=String(m.name||`메뉴 ${idx+1}`).trim()||`메뉴 ${idx+1}`;
    next.menus.push({id,name});
    const arr=Array.isArray(src.items[originalId])?src.items[originalId]:[];
    const usedItemIds=new Set();
    next.items[id]=arr.map(it=>{
      const item=cloneItemForShare(it);
      let itemId=String(item.id||uid());
      if(usedItemIds.has(itemId)) itemId=uid();
      usedItemIds.add(itemId);
      item.id=itemId;
      return item;
    });
  });
  return next;
}

function utf8ToBase64Url(str){
  const bytes=new TextEncoder().encode(str);
  let bin='';
  const chunk=0x8000;
  for(let i=0;i<bytes.length;i+=chunk){
    bin+=String.fromCharCode(...bytes.subarray(i,i+chunk));
  }
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function base64UrlToUtf8(str){
  let s=String(str||'').trim().replace(/^WORKOUT_SHARE_V\d+:/i,'').replace(/\s+/g,'');
  s=s.replace(/-/g,'+').replace(/_/g,'/');
  while(s.length%4)s+='=';
  const bin=atob(s);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}
function encodeSharePayload(payload){
  return 'WORKOUT_SHARE_V1:'+utf8ToBase64Url(JSON.stringify(payload));
}
function decodeSharedText(text){
  const t=String(text||'').trim();
  if(!t) throw new Error('empty');
  if(t[0]==='{') return JSON.parse(t);
  if(/^WORKOUT_SHARE_V\d+:/i.test(t)) return JSON.parse(base64UrlToUtf8(t));
  try{return JSON.parse(base64UrlToUtf8(t));}
  catch(e){return JSON.parse(t);}
}

function mergeImportedSelection(selected){
  const incoming=sanitizeImportedData(selected);
  normalizeMenus();
  let addedMenus=0,addedItems=0,skipped=0;
  let firstTargetId=null;
  incoming.menus.forEach(m=>{
    let target=data.menus.find(x=>String(x.name||'').trim().toLowerCase()===String(m.name||'').trim().toLowerCase());
    if(!target){
      target={id:uid(),name:m.name};
      data.menus.push(target);
      data.items[target.id]=[];
      addedMenus++;
    }
    if(!firstTargetId)firstTargetId=target.id;
    if(!Array.isArray(data.items[target.id]))data.items[target.id]=[];
    const existing=data.items[target.id];
    const links=new Set(existing.map(it=>normalizeLinkKey(it.link||it.url)).filter(Boolean));
    (incoming.items[m.id]||[]).forEach(it=>{
      const key=normalizeLinkKey(it.link||it.url);
      if(key&&links.has(key)){skipped++;return;}
      const ni=cloneItemForShare(it);
      ni.id=uid();
      existing.push(ni);
      if(key)links.add(key);
      addedItems++;
    });
  });
  normalizeMenus();
  if(firstTargetId){
    aid=firstTargetId;
    localStorage.setItem('workoutActiveMenuId',aid);
  }
  save();saveSub();render();
  return {addedMenus,addedItems,skipped};
}
function importShareFile(event){
  const file=event.target.files&&event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const raw=JSON.parse(String(reader.result||''));
      loadPendingImportFromRaw(raw,'JSON 파일');
    }catch(e){
      pendingImportRaw=null;pendingImportData=null;
      const importArea=document.getElementById('import-area');
      if(importArea)importArea.hidden=true;
      setShareMsg('가져오기 실패: 지원하지 않는 JSON 파일이거나 파일이 손상되었습니다.','err');
    }finally{
      event.target.value='';
    }
  };
  reader.onerror=()=>setShareMsg('파일을 읽지 못했습니다.','err');
  reader.readAsText(file,'utf-8');
}
function importSelectedWorkoutData(){
  try{
    if(!pendingImportData){setShareMsg('먼저 가져올 JSON 파일을 선택해주세요.','warn');return;}
    const selected=getSelectedSubset('import');
    if(!selected){setShareMsg('가져올 메뉴 또는 영상을 선택해주세요.','warn');return;}
    const result=mergeImportedSelection(selected);
    const importSummary=`새 메뉴 ${result.addedMenus}개, 영상 ${result.addedItems}개 추가${result.skipped?`, 중복 ${result.skipped}개 제외`:''}`;
    setShareMsg(`가져오기가 완료되었습니다. ${importSummary}`,'ok');
    showCenterToast('데이터 가져오기 완료', importSummary);
    renderShareTree('export-tree',data,'export');
  }catch(e){
    setShareMsg('선택 데이터 가져오기 중 오류가 발생했습니다.','err');
  }
}

/* ━━ Theme — 기본: 라이트 ━━ */
const isMobileViewport=()=>window.matchMedia('(max-width: 768px)').matches;
const applyIcon=()=>document.getElementById('btn-theme').textContent=document.body.classList.contains('dark')?'🌙':'☀️';
function applySavedTheme(){
  const saved=localStorage.getItem('theme')||'light';
  const userSet=localStorage.getItem('themeUserSet')==='1';
  const shouldDark=saved==='dark' && (!isMobileViewport() || userSet);
  document.body.classList.toggle('dark',shouldDark);
  if(isMobileViewport() && saved==='dark' && !userSet){
    localStorage.setItem('theme','light');
  }
  applyIcon();
}
const toggleTheme=()=>{
  const sc=document.getElementById('tab-scroll');
  const keepLeft=sc?sc.scrollLeft:0;
  document.body.classList.add('theme-switching');
  document.body.classList.toggle('dark');
  localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');
  localStorage.setItem('themeUserSet','1');
  applyIcon();
  requestAnimationFrame(()=>{
    if(sc) sc.scrollLeft=keepLeft;
    setTimeout(()=>document.body.classList.remove('theme-switching'),180);
  });
};
applySavedTheme();

/* ━━ Inner subtabs ━━ */
function countByType(items){
  return items.reduce((acc,it)=>{const t=videoTypeFromItem(it);acc[t]=(acc[t]||0)+1;return acc;},{shorts:0,longform:0});
}
function getActiveSub(mid,items){
  const saved=subMap[mid];
  if(saved==='shorts'||saved==='longform') return saved;
  const c=countByType(items||[]);
  return c.shorts>0?'shorts':'longform';
}
function setActiveSub(mid,type){
  if(!(type in SUBS)) return;
  subMap[mid]=type;saveSub();renderItems();
}
function activateSubOnly(mid,type){
  if(type in SUBS){subMap[mid]=type;saveSub();}
}
function buildSubtabs(mid,items,cur){
  const c=countByType(items);
  const wrap=document.createElement('div');wrap.className='subtabs-panel';
  Object.keys(SUBS).forEach(type=>{
    const s=SUBS[type];
    const btn=document.createElement('button');
    btn.type='button';btn.className='subtab'+(cur===type?' on':'');
    btn.innerHTML=`<span class="subicon">${s.icon}</span><span>${s.label}</span><span class="subcnt">${c[type]||0}</span>`;
    btn.addEventListener('click',()=>setActiveSub(mid,type));
    wrap.appendChild(btn);
  });
  return wrap;
}
function buildContentToolbar(mid,cur){
  const wrap=document.createElement('section');
  wrap.className='content-toolbar';
  wrap.innerHTML=`<button id="btn-add" class="content-add" onclick="openAddLink()">
      <svg width="14" height="14" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span class="btn-lbl">링크 추가</span>
    </button>`;
  return wrap;
}
function buildSubtabsRow(mid,items,cur){
  const row=document.createElement('section');
  row.className='subtabs-row';
  row.appendChild(buildSubtabs(mid,items,cur));
  row.appendChild(buildContentToolbar(mid,cur));
  return row;
}

/* ━━ Link Modal ━━ */
let editId=null, editMenu=null;
function ensureCurrentMenu(){
  if(aid&&data.menus.some(m=>m.id===aid)) return aid;
  if(data.menus.length){aid=data.menus[0].id;localStorage.setItem('workoutActiveMenuId',aid);return aid;}
  const id=uid();data.menus.push({id,name:'운동 영상'});data.items[id]=[];aid=id;localStorage.setItem('workoutActiveMenuId',id);save();return id;
}
function openAddLink(){
  editId=null;editMenu=null;
  document.getElementById('mlink-ttl').innerHTML='링크 <span class="ac">추가</span>';
  ['in-url','in-title','in-memo'].forEach(id=>document.getElementById(id).value='');
  setD('');lastDet=null;
  openModal('m-link');
  setTimeout(()=>document.getElementById('in-url').focus(),150);
}
function openEditLink(iid,mid){
  editId=iid;editMenu=mid;
  const it=(data.items[mid]||[]).find(x=>x.id===iid); if(!it)return;
  document.getElementById('mlink-ttl').innerHTML='기록 <span class="ac">수정</span>';
  document.getElementById('in-url').value=it.link||'';
  document.getElementById('in-title').value=it.title||'';
  document.getElementById('in-memo').value=it.memo||'';
  setD('');lastDet=null;
  openModal('m-link');
  if(it.link&&isYT(it.link)) document.getElementById('in-url').dispatchEvent(new Event('input'));
}
async function saveLink(){
  const url=document.getElementById('in-url').value.trim();
  const titleEl=document.getElementById('in-title');
  const title=titleEl.value.trim();
  const memo=document.getElementById('in-memo').value.trim();
  if(!url&&!title&&!memo)return;
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.textContent='저장 중…';

  const tmid=(editId&&editMenu)?editMenu:ensureCurrentMenu();
  if(!data.items[tmid]) data.items[tmid]=[];
  let vtype=getActiveSub(tmid,data.items[tmid]);
  let ratio=null;
  let detectedTitle='';

  if(url&&isYT(url)){
    const info=lastDet||await detectYT(url);
    if(info){vtype=info.type;ratio=info.ratio;detectedTitle=info.title||'';}
  }
  const finalTitle=title||detectedTitle||'';

  if(editId&&editMenu){
    const it=data.items[editMenu].find(x=>x.id===editId);
    if(it){
      it.title=finalTitle;it.name=finalTitle;
      it.link=url;it.url=url;
      it.memo=memo;it.content=memo;
      it.vtype=vtype;it.videoType=vtype;
      if(ratio)it.ratio=ratio;
    }
    aid=editMenu;
  }else{
    const ni={id:uid(),title:finalTitle,name:finalTitle,link:url,url,memo,content:memo,vtype,videoType:vtype,createdAt:Date.now()};
    if(ratio)ni.ratio=ratio;
    data.items[tmid].push(ni);
    aid=tmid;
  }
  localStorage.setItem('workoutActiveMenuId',aid);
  activateSubOnly(aid,vtype);
  save();
  btn.disabled=false;btn.textContent='저장';
  closeModal('m-link');
  render();
}
document.getElementById('in-url').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('in-title').focus();if(e.key==='Escape')closeModal('m-link');});
document.getElementById('in-tab').addEventListener('keydown',e=>{if(e.key==='Enter')saveTab();if(e.key==='Escape')closeModal('m-tab');});

  const name=document.getElementById('in-tab').value.trim();

  if(etid){const m=data.menus.find(m=>m.id===etid);if(m)m.name=name;}

  if(!confirm('탭을 삭제하면 안의 기록도 모두 삭제됩니다. 계속할까요?'))return;
  data.menus=data.menus.filter(m=>m.id!==id);delete data.items[id];delete subMap[id];saveSub();
  if(aid===id) aid=data.menus.length?data.menus[0].id:null;
  aid?localStorage.setItem('workoutActiveMenuId',aid):localStorage.removeItem('workoutActiveMenuId');
  save();render();

  data.items[mid]=(data.items[mid]||[]).filter(x=>x.id!==iid);
  save();render();

function renderItems(){

  if(!aid||!data.menus.length){
    ct.innerHTML=emptyHTML('🏋️','시작해볼까요?','상위 메뉴를 만든 뒤<br/>메뉴 안의 <b>링크 추가</b>로 영상을 저장해보세요.');return;

    const card=document.createElement('div');

    card.innerHTML=hd+media+memo;
    grid.appendChild(card);
  });
  ct.appendChild(grid);
}


/* ━━ Menu Tab Drag & Drop — fixed: no duplicate menu IDs, touch-friendly drag ━━ */
let tabClickLocked=false;
const ts={
  on:false,down:false,src:null,ghost:null,ph:null,sid:null,
  timer:null,pointerType:'',sx:0,sy:0,ox:0,oy:0
};
function clearTabTimer(){
  if(ts.timer){clearTimeout(ts.timer);ts.timer=null;}
}
function startTabDragAt(clientX,clientY){
  if(ts.on||!ts.src||!ts.sid) return;
  ts.on=true;
  const tab=ts.src;
  const r=tab.getBoundingClientRect();
  ts.ox=clientX-r.left;ts.oy=clientY-r.top;

  const ph=document.createElement('div');
  ph.className='tab tdrag-ph';
  ph.style.width=r.width+'px';
  ph.style.height=r.height+'px';
  ph.setAttribute('aria-hidden','true');
  ph.innerHTML=tab.innerHTML;
  tab.parentNode.insertBefore(ph,tab.nextSibling);
  ts.ph=ph;

  const g=tab.cloneNode(true);
  g.classList.add('tdrag-ghost');
  g.style.width=r.width+'px';
  g.style.height=r.height+'px';
  g.style.left=r.left+'px';
  g.style.top=r.top+'px';
  document.body.appendChild(g);
  ts.ghost=g;

  tab.classList.add('tdrag-src');
  document.body.classList.add('tab-dragging');
}
function moveTabPlaceholder(clientX){
  const sc=document.getElementById('tab-scroll');
  if(!sc||!ts.ph) return;

  const sr=sc.getBoundingClientRect();
  const edge=42;
  if(clientX<sr.left+edge) sc.scrollLeft-=12;
  else if(clientX>sr.right-edge) sc.scrollLeft+=12;

  const siblings=[...sc.children].filter(el=>
    el.classList?.contains('tab') &&
    el!==ts.ph &&
    !el.classList.contains('tdrag-src')
  );
  let placed=false;
  for(const el of siblings){
    const r=el.getBoundingClientRect();
    if(clientX<r.left+r.width/2){
      sc.insertBefore(ts.ph,el);
      placed=true;
      break;
    }
  }
  if(!placed){
    const add=sc.querySelector('#btn-newtab');
    if(add) sc.insertBefore(ts.ph,add);
    else sc.appendChild(ts.ph);
  }
}
document.addEventListener('pointerdown',e=>{
  const tab=e.target.closest('.tab');
  if(!tab||e.target.closest('button'))return;
  if(e.pointerType==='mouse'&&e.button!==0)return;
  clearTabTimer();
  ts.down=true;ts.src=tab;ts.sid=tab.dataset.mid;
  ts.pointerType=e.pointerType||'mouse';
  ts.sx=e.clientX;ts.sy=e.clientY;
  if(ts.pointerType!=='mouse'){
    ts.timer=setTimeout(()=>startTabDragAt(ts.sx,ts.sy),260);
  }
},{passive:true});
document.addEventListener('pointermove',e=>{
  if(!ts.down&&!ts.on)return;
  const dx=e.clientX-ts.sx,dy=e.clientY-ts.sy;
  if(!ts.on){
    if(ts.pointerType==='mouse'){
      if(Math.hypot(dx,dy)<7)return;
      startTabDragAt(e.clientX,e.clientY);
    }else{
      if(Math.hypot(dx,dy)>10){
        clearTabTimer();
        ts.down=false;ts.src=null;ts.sid=null;
      }
      return;
    }
  }
  if(!ts.on)return;
  e.preventDefault();
  if(ts.ghost){
    ts.ghost.style.left=(e.clientX-ts.ox)+'px';
    ts.ghost.style.top=(e.clientY-ts.oy)+'px';
  }
  moveTabPlaceholder(e.clientX);
},{passive:false});
function endTabDrag(){
  clearTabTimer();
  if(!ts.down&&!ts.on)return;
  if(ts.on){
    const sc=document.getElementById('tab-scroll');
    if(sc&&ts.ph){
      normalizeMenus();
      const seen=new Set();
      const order=[];
      [...sc.children].forEach(el=>{
        let id=null;
        if(el===ts.ph) id=ts.sid;
        else if(el.classList?.contains('tab')&&!el.classList.contains('tdrag-src')) id=el.dataset.mid;
        if(id&&!seen.has(id)){seen.add(id);order.push(id);}
      });
      const byId=new Map(data.menus.map(m=>[m.id,m]));
      const reordered=order.map(id=>byId.get(id)).filter(Boolean);
      data.menus.forEach(m=>{if(!seen.has(m.id))reordered.push(m);});
      data.menus=reordered;
      save();
    }
    tabClickLocked=true;
    setTimeout(()=>{tabClickLocked=false;},180);
    cleanTabDrag();

  }else{
    ts.down=false;ts.src=null;ts.sid=null;ts.pointerType='';

/* ━━ Drag & Drop ━━ */
const rs={on:false,src:null,ghost:null,ph:null,sid:null,tmr:null,sx:0,sy:0,ox:0,oy:0};
document.addEventListener('pointerdown',e=>{
  const card=e.target.closest('.card');
  if(!card||e.target.closest('button,a,iframe,.ytthumb'))return;
  rs.sx=e.clientX;rs.sy=e.clientY;
  rs.tmr=setTimeout(()=>{
    rs.on=true;rs.src=card;rs.sid=card.dataset.iid;
    const r=card.getBoundingClientRect();rs.ox=e.clientX-r.left;rs.oy=e.clientY-r.top;
    const ph=document.createElement('div');ph.className='card rph';ph.style.height=r.height+'px';
    card.parentNode.insertBefore(ph,card.nextSibling);rs.ph=ph;
    const g=card.cloneNode(true);g.classList.add('dghost');
    g.style.cssText+=`width:${r.width}px;height:${r.height}px;left:${r.left}px;top:${r.top}px;`;
    document.body.appendChild(g);rs.ghost=g;
    card.classList.add('dsrc');document.body.classList.add('dragging');
  },320);
},{passive:true});
document.addEventListener('pointermove',e=>{
  const pt={x:e.clientX,y:e.clientY};
  if(rs.tmr&&!rs.on){if(Math.abs(pt.x-rs.sx)>10||Math.abs(pt.y-rs.sy)>10){clearTimeout(rs.tmr);rs.tmr=null;}return;}
  if(!rs.on)return;e.preventDefault();
  if(rs.ghost){rs.ghost.style.left=(pt.x-rs.ox)+'px';rs.ghost.style.top=(pt.y-rs.oy)+'px';}
  const grid=document.querySelector('.grid');if(!grid)return;
  const siblings=[...grid.querySelectorAll('.card:not(.dsrc)')];
  let placed=false;
  for(const el of siblings){const r=el.getBoundingClientRect();if(pt.y<r.top+r.height/2){grid.insertBefore(rs.ph,el);placed=true;break;}}
  if(!placed)grid.appendChild(rs.ph);
},{passive:false});
function endDrag(){
  clearTimeout(rs.tmr);rs.tmr=null;
  if(!rs.on){cleanDrag();return;}
  const grid=document.querySelector('.grid');
  if(grid&&rs.ph&&aid&&data.items[aid]){
    const cur=grid.dataset.sub||getActiveSub(aid,data.items[aid]);
    const order=[...grid.querySelectorAll('.card,.rph')].map(el=>el===rs.ph?rs.sid:el.dataset.iid).filter(Boolean);
    const byId=new Map(data.items[aid].map(it=>[it.id,it]));
    let oi=0;
    data.items[aid]=data.items[aid].map(it=>videoTypeFromItem(it)===cur?(byId.get(order[oi++])||it):it);
    save();
  }
  cleanDrag();render();
}
function cleanDrag(){
  if(rs.src) rs.src.classList.remove('dsrc');
  if(rs.ghost?.parentNode) rs.ghost.parentNode.removeChild(rs.ghost);
  if(rs.ph?.parentNode) rs.ph.parentNode.removeChild(rs.ph);
  document.body.classList.remove('dragging');
  rs.on=false;rs.src=null;rs.ghost=null;rs.ph=null;rs.sid=null;
}
document.addEventListener('pointerup',endDrag,{passive:true});

/* ━━ v25: robust mobile scroll-top + adaptive shorts card width ━━ */
function scrollToPageTopV25(smooth=true){
  const behavior=smooth?'smooth':'auto';
  const scrollers=[document.scrollingElement, document.documentElement, document.body].filter(Boolean);
  try{window.scrollTo({top:0,left:0,behavior});}catch(e){window.scrollTo(0,0);}
  scrollers.forEach(el=>{
    try{
      if(typeof el.scrollTo==='function') el.scrollTo({top:0,left:0,behavior});
      else el.scrollTop=0;
    }catch(e){el.scrollTop=0;}
  });
  const force=()=>{
    scrollers.forEach(el=>{try{el.scrollTop=0;el.scrollLeft=0;}catch(e){}});
    try{window.scrollTo(0,0);}catch(e){}
    updateTopButton();
  };
  if(!smooth) force();
  setTimeout(force, smooth?460:60);
}
scrollToPageTop = scrollToPageTopV25;

function updateTopButtonV25(){
  const btn=document.getElementById('btn-top');
  if(!btn)return;
  const y=window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
  btn.classList.toggle('show', y>180);
}
updateTopButton = updateTopButtonV25;

function updateMobileShortsSize(){
  const root=document.documentElement;
  if(!root)return;
  const isMob=window.matchMedia('(max-width: 768px)').matches;
  if(!isMob){
    root.style.removeProperty('--mobile-short-card-width');
    return;
  }
  const vw=Math.min(window.innerWidth || 390, document.documentElement.clientWidth || 390);
  const vh=(window.visualViewport && window.visualViewport.height) ? window.visualViewport.height : (window.innerHeight || 740);
  /* 남는 화면 안에 카드 헤더까지 들어오도록 숏폼 카드 폭을 역산 */
  const reserved=260;
  const maxVideoH=Math.max(360, vh-reserved);
  let width=Math.floor(maxVideoH*9/16);
  width=Math.max(218, Math.min(width, vw-28, 300));
  root.style.setProperty('--mobile-short-card-width', width+'px');
}

function installV25MobileFixes(){
  updateMobileShortsSize();
  updateTopButton();
  const topBtn=document.getElementById('btn-top');
  if(topBtn && !topBtn.dataset.v25Bound){
    topBtn.dataset.v25Bound='1';
    topBtn.addEventListener('click',e=>{
      e.preventDefault();
      e.stopPropagation();
      scrollToPageTop(true);
    },{passive:false});
    topBtn.addEventListener('touchend',e=>{
      e.preventDefault();
      e.stopPropagation();
      scrollToPageTop(true);
    },{passive:false});
  }
}
window.addEventListener('scroll',updateTopButton,{passive:true});
window.addEventListener('resize',()=>{updateMobileShortsSize();updateTopButton();},{passive:true});

/* ━━ v26: 모바일 최상단 이동 버튼 표시/클릭 안정화 ━━ */
(function(){
  const btn = document.getElementById('btn-top');
  if(!btn) return;

  function getScrollYAll(){
    const vals = [
      window.pageYOffset || 0,
      window.scrollY || 0,
      document.scrollingElement ? document.scrollingElement.scrollTop : 0,
      document.documentElement ? document.documentElement.scrollTop : 0,
      document.body ? document.body.scrollTop : 0,
      document.getElementById('main') ? document.getElementById('main').scrollTop : 0,
      document.getElementById('ct') ? document.getElementById('ct').scrollTop : 0
    ];
    return Math.max.apply(null, vals.map(v => Number(v) || 0));
  }

  function setTopButtonVisible(){
    const visible = getScrollYAll() > 140;
    btn.classList.toggle('show', visible);
    document.body.classList.toggle('top-button-visible', visible);
  }

  function goTop(e){
    if(e){
      e.preventDefault();
      e.stopPropagation();
    }
    const targets = [document.scrollingElement, document.documentElement, document.body, document.getElementById('main'), document.getElementById('ct')].filter(Boolean);
    try{ window.scrollTo({top:0,left:0,behavior:'smooth'}); }catch(_){ window.scrollTo(0,0); }
    targets.forEach(el=>{
      try{
        if(typeof el.scrollTo === 'function') el.scrollTo({top:0,left:0,behavior:'smooth'});
        else el.scrollTop = 0;
      }catch(_){ try{el.scrollTop = 0;}catch(__){} }
    });
    setTimeout(()=>{
      targets.forEach(el=>{ try{el.scrollTop = 0; el.scrollLeft = 0;}catch(_){} });
      try{ window.scrollTo(0,0); }catch(_){}
      setTopButtonVisible();
    }, 420);
  }

  let raf = 0;
  function onAnyScroll(){
    if(raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(setTopButtonVisible);
  }

  btn.onclick = goTop;
  btn.addEventListener('click', goTop, {passive:false});
  btn.addEventListener('touchstart', e=>e.stopPropagation(), {passive:false});
  btn.addEventListener('touchend', goTop, {passive:false});

  window.scrollToPageTop = function(smooth=true){
    if(!smooth){
      [document.scrollingElement, document.documentElement, document.body, document.getElementById('main'), document.getElementById('ct')].filter(Boolean).forEach(el=>{try{el.scrollTop=0;el.scrollLeft=0;}catch(_){}});
      try{window.scrollTo(0,0);}catch(_){}
      setTopButtonVisible();
      return;
    }
    goTop();
  };
  window.updateTopButton = setTopButtonVisible;

  ['scroll','resize','orientationchange','touchmove'].forEach(evt=>{
    window.addEventListener(evt, onAnyScroll, {passive:true});
    document.addEventListener(evt, onAnyScroll, {passive:true});
  });
  ['main','ct'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('scroll', onAnyScroll, {passive:true});
  });
  window.visualViewport?.addEventListener('scroll', onAnyScroll, {passive:true});
  window.visualViewport?.addEventListener('resize', onAnyScroll, {passive:true});
  setTopButtonVisible();
  setTimeout(setTopButtonVisible, 250);
})();

/* ━━ v30: search above tabs + robust video card drag reorder ━━ */
(function(){
  if(window.__WORKOUT_V30__) return;
  window.__WORKOUT_V30__=true;

  function isInteractiveTarget(el){
    return !!(el && el.closest('button,a,iframe,input,select,textarea,.ytthumb,.ytbox,.mclose,.share-btn,.cbtn,.card-memo-details summary'));
  }
  function activeVideoType(){
    if(!aid || !data.items || !data.items[aid]) return 'shorts';
    return (document.querySelector('.grid')?.dataset.sub) || getActiveSub(aid,data.items[aid]);
  }
  function dragDisabledForCurrentMenu(){
    try{
      const raw=localStorage.getItem('workoutViewStateV28');
      const vs=raw?JSON.parse(raw):{};
      const st=(aid && vs && vs[aid]) || {};
      return !!(st.q || st.fav || (st.watched && st.watched!=='all') || (st.sort && st.sort!=='manual'));
    }catch(e){return false;}
  }
  function reorderCurrentSubFromGrid(grid, draggedId){
    if(!grid || !aid || !Array.isArray(data.items[aid])) return;
    const cur=grid.dataset.sub || activeVideoType();
    const visibleOrder=[...grid.children]
      .map(el=>{
        if(el.classList?.contains('rph')) return draggedId;
        if(el.classList?.contains('card') && !el.classList.contains('dsrc')) return el.dataset.iid;
        return null;
      })
      .filter(Boolean);
    if(!visibleOrder.length) return;
    const byId=new Map(data.items[aid].map(it=>[String(it.id),it]));
    let cursor=0;
    data.items[aid]=data.items[aid].map(it=>{
      if(videoTypeFromItem(it)!==cur) return it;
      const nextId=visibleOrder[cursor++];
      return byId.get(String(nextId)) || it;
    });
    save();
  }

  const ds={down:false,on:false,src:null,ghost:null,ph:null,sid:null,pointerType:'',timer:null,sx:0,sy:0,ox:0,oy:0};
  function clearVideoDragTimer(){ if(ds.timer){clearTimeout(ds.timer);ds.timer=null;} }
  function resetVideoDrag(){
    clearVideoDragTimer();
    if(ds.src) ds.src.classList.remove('dsrc');
    if(ds.ghost?.parentNode) ds.ghost.parentNode.removeChild(ds.ghost);
    if(ds.ph?.parentNode) ds.ph.parentNode.removeChild(ds.ph);
    document.body.classList.remove('dragging');
    ds.down=false;ds.on=false;ds.src=null;ds.ghost=null;ds.ph=null;ds.sid=null;ds.pointerType='';
  }
  function startVideoDrag(clientX,clientY){
    if(ds.on || !ds.src || !ds.sid) return;
    const grid=ds.src.closest('.grid');
    if(!grid || dragDisabledForCurrentMenu()) { resetVideoDrag(); return; }
    ds.on=true;
    const r=ds.src.getBoundingClientRect();
    ds.ox=clientX-r.left; ds.oy=clientY-r.top;
    const ph=document.createElement('div');
    ph.className='card rph';
    ph.style.width=r.width+'px';
    ph.style.height=r.height+'px';
    ph.dataset.iid=ds.sid;
    ph.dataset.vtype=ds.src.dataset.vtype || activeVideoType();
    ds.src.parentNode.insertBefore(ph,ds.src.nextSibling);
    ds.ph=ph;
    const g=ds.src.cloneNode(true);
    const vtype=ds.src.dataset.vtype || activeVideoType();
    g.classList.add('dghost','dghost-compact');
    g.dataset.vtype=vtype;
    // 드래그 중에는 영상 플레이어/썸네일을 복제하지 않고 작은 제목 카드만 표시한다.
    // 긴 롱폼 카드가 복제되어 하단에 한 장 더 보이는 문제를 방지한다.
    g.querySelectorAll('iframe,.ytbox,.linkrow,.card-body,.card-memo-details').forEach(el=>el.remove());
    const isShortGhost=vtype==='shorts';
    const gw=isShortGhost
      ? Math.min(240, Math.max(176, Math.floor(window.innerWidth*.46)))
      : Math.min(280, Math.max(210, Math.floor(window.innerWidth*.30)));
    const gh=isShortGhost
      ? Math.min(150, Math.max(104, Math.floor(window.innerHeight*.16)))
      : Math.min(132, Math.max(96, Math.floor(window.innerHeight*.14)));
    g.style.cssText+=`width:${gw}px;height:${gh}px;left:${clientX-(gw/2)}px;top:${clientY-42}px;`;
    document.body.appendChild(g);
    ds.ghost=g;
    ds.src.classList.add('dsrc');
    document.body.classList.add('dragging');
  }
  function moveVideoPlaceholder(clientX,clientY){
    const grid=document.querySelector('.grid');
    if(!grid || !ds.ph) return;
    const gr=grid.getBoundingClientRect();
    const edge=70;
    if(clientY<edge) window.scrollBy(0,-12);
    else if(clientY>window.innerHeight-edge) window.scrollBy(0,12);
    if(clientX<gr.left+28) window.scrollBy(-8,0);
    else if(clientX>gr.right-28) window.scrollBy(8,0);

    const cards=[...grid.querySelectorAll('.card:not(.dsrc):not(.rph)')];
    if(!cards.length){grid.appendChild(ds.ph);return;}
    let before=null;
    for(const el of cards){
      const r=el.getBoundingClientRect();
      const cx=r.left+r.width/2;
      const cy=r.top+r.height/2;
      const sameRow=clientY>=r.top && clientY<=r.bottom;
      if((sameRow && clientX<cx) || (!sameRow && clientY<cy)){
        before=el;
        break;
      }
    }
    if(before) grid.insertBefore(ds.ph,before);
    else grid.appendChild(ds.ph);
  }

  document.addEventListener('pointerdown',function(e){
    const card=e.target.closest('.grid .card');
    if(!card || card.classList.contains('rph') || card.dataset.dragDisabled==='1') return;
    if(isInteractiveTarget(e.target)) return;
    if(e.pointerType==='mouse' && e.button!==0) return;
    if(dragDisabledForCurrentMenu()) return;
    e.stopImmediatePropagation();
    clearVideoDragTimer();
    ds.down=true;ds.src=card;ds.sid=card.dataset.iid;ds.pointerType=e.pointerType||'mouse';ds.sx=e.clientX;ds.sy=e.clientY;
    if(ds.pointerType!=='mouse'){
      ds.timer=setTimeout(()=>startVideoDrag(ds.sx,ds.sy),360);
    }
  },true);

  document.addEventListener('pointermove',function(e){
    if(!ds.down && !ds.on) return;
    const dx=e.clientX-ds.sx, dy=e.clientY-ds.sy;
    if(!ds.on){
      if(ds.pointerType==='mouse'){
        if(Math.hypot(dx,dy)<8) return;
        e.stopImmediatePropagation();
        startVideoDrag(e.clientX,e.clientY);
      }else{
        if(Math.hypot(dx,dy)>12){ resetVideoDrag(); }
        return;
      }
    }
    if(!ds.on) return;
    e.preventDefault();
    e.stopImmediatePropagation();
    if(ds.ghost){
      if(ds.ghost.classList.contains('dghost-compact')){
        const rr=ds.ghost.getBoundingClientRect();
        const gw=rr.width||220;
        ds.ghost.style.left=(e.clientX-(gw/2))+'px';
        ds.ghost.style.top=(e.clientY-42)+'px';
      }else{
        ds.ghost.style.left=(e.clientX-ds.ox)+'px';
        ds.ghost.style.top=(e.clientY-ds.oy)+'px';
      }
    }
    moveVideoPlaceholder(e.clientX,e.clientY);
  },true);

  function endVideoDrag(e){
    if(!ds.down && !ds.on) return;
    if(e) e.stopImmediatePropagation();
    clearVideoDragTimer();
    if(ds.on){
      const grid=document.querySelector('.grid');
      reorderCurrentSubFromGrid(grid, ds.sid);
      resetVideoDrag();
      render();
      if(typeof showCenterToast==='function') showCenterToast('영상 순서 변경 완료','현재 탭 안에서 영상 순서를 저장했습니다.');
    }else resetVideoDrag();
  }
  document.addEventListener('pointerup',endVideoDrag,true);
  document.addEventListener('pointercancel',function(e){ if(ds.down||ds.on){e.stopImmediatePropagation();resetVideoDrag();} },true);
})();

</script>

<script>
/* v32: combine search + filter controls + inner tabs/add into one command row. */
(function(){
  if(window.__WORKOUT_V32__) return;
  window.__WORKOUT_V32__=true;

  function composeCommandRow(){
    const ct=document.getElementById('ct');
    if(!ct) return;
    const existingRow=ct.querySelector(':scope > .library-command-row');
    const lib=ct.querySelector(':scope > .library-tools') || existingRow?.querySelector('.library-tools');
    const subtabs=ct.querySelector(':scope > .subtabs-row') || existingRow?.querySelector('.subtabs-row');
    if(!lib || !subtabs) return;

    const stray=ct.querySelector(':scope > .library-filter-row, :scope > .library-top-row');
    if(existingRow && lib.parentElement===existingRow && subtabs.parentElement===existingRow && !stray){
      lib.classList.remove('top-search-only');
      lib.classList.add('command-left');
      return;
    }

    ct.querySelectorAll(':scope > .library-command-row, :scope > .library-filter-row, :scope > .library-top-row').forEach(el=>el.remove());

    const row=document.createElement('section');
    row.className='library-command-row';
    lib.classList.remove('top-search-only');
    lib.classList.add('command-left');
    row.appendChild(lib);
    row.appendChild(subtabs);
    ct.insertBefore(row, ct.firstChild);
  }

  const previousRenderItems=window.renderItems;
  if(typeof previousRenderItems==='function'){
    window.renderItems=function(){
      previousRenderItems.apply(this, arguments);
      composeCommandRow();
    };
  }

  const previousRender=window.render;
  if(typeof previousRender==='function'){
    window.render=function(){
      previousRender.apply(this, arguments);
      composeCommandRow();
    };
  }

  const ct=document.getElementById('ct');
  if(ct){
    let pending=false;
    new MutationObserver(()=>{
      if(pending) return;
      pending=true;
      requestAnimationFrame(()=>{pending=false;composeCommandRow();});
    }).observe(ct,{childList:true});
  }
  requestAnimationFrame(composeCommandRow);
})();
</script>

<script>
/* v36: final stability checks and mobile viewport tuning */
(function(){
  if(window.__WORKOUT_V36__) return;
  window.__WORKOUT_V36__=true;

  function auditWorkoutData(){
    let changed=false;
    if(!data || typeof data!=='object'){ data={menus:[],items:{}}; changed=true; }
    if(!Array.isArray(data.menus)){ data.menus=[]; changed=true; }
    if(!data.items || typeof data.items!=='object'){ data.items={}; changed=true; }

    const menuSeen=new Set();
    const cleanedMenus=[];
    data.menus.forEach((m,idx)=>{
      if(!m || typeof m!=='object') { changed=true; return; }
      let id=String(m.id||'');
      if(!id || menuSeen.has(id)){ id=uid(); changed=true; }
      menuSeen.add(id);
      const name=String(m.name||`메뉴 ${idx+1}`).trim() || `메뉴 ${idx+1}`;
      if(m.id!==id || m.name!==name) changed=true;
      cleanedMenus.push({id,name});
      if(!Array.isArray(data.items[id])){ data.items[id]=[]; changed=true; }
    });
    Object.keys(data.items).forEach(mid=>{ if(!menuSeen.has(mid)){ delete data.items[mid]; changed=true; } });
    data.menus=cleanedMenus;

    Object.keys(data.items).forEach(mid=>{
      const arr=Array.isArray(data.items[mid]) ? data.items[mid] : [];
      const itemSeen=new Set();
      data.items[mid]=arr.filter(Boolean).map((it,idx)=>{
        if(typeof it!=='object'){ changed=true; it={}; }
        let id=String(it.id||'');
        if(!id || itemSeen.has(id)){ id=uid(); changed=true; }
        itemSeen.add(id);
        const link=String(it.link||it.url||'');
        const title=String(it.title||it.name||link||`영상 ${idx+1}`);
        const memo=String(it.memo||it.content||'');
        const vtype=videoTypeFromItem(Object.assign({},it,{link,url:link}));
        if(it.id!==id || it.link!==link || it.url!==link || it.title!==title || it.name!==title || it.memo!==memo || it.content!==memo || it.vtype!==vtype || it.videoType!==vtype){
          changed=true;
        }
        return Object.assign({},it,{id,link,url:link,title,name:title,memo,content:memo,vtype,videoType:vtype,createdAt:it.createdAt||Date.now()});
      });
    });
    if(aid && !data.menus.some(m=>m.id===aid)){
      aid=data.menus[0]?.id || null;
      if(aid) localStorage.setItem('workoutActiveMenuId',aid);
      else localStorage.removeItem('workoutActiveMenuId');
      changed=true;
    }
    if(changed){ try{ save(); }catch(e){} }
  }

  function computeMobileShortSize(){
    const root=document.documentElement;
    if(!root) return;
    if(!matchMedia('(max-width: 768px)').matches){
      root.style.removeProperty('--mobile-short-card-width');
      return;
    }
    const vw=Math.min(window.innerWidth||390, document.documentElement.clientWidth||390);
    const vh=(window.visualViewport&&window.visualViewport.height)||window.innerHeight||720;
    const command=document.querySelector('.library-command-row');
    const commandH=command?Math.min(170, Math.ceil(command.getBoundingClientRect().height)):128;
    const safeBottom=96;
    const headerAllowance=118;
    const cardHeader=82;
    const availableVideoH=Math.max(360, vh - Math.min(330, commandH + headerAllowance + safeBottom + cardHeader));
    let width=Math.floor(availableVideoH*9/16);
    width=Math.max(236, Math.min(width, vw-32, 340));
    root.style.setProperty('--mobile-short-card-width', width+'px');
  }

  const previousUpdateShorts=window.updateMobileShortsSize;
  window.updateMobileShortsSize=function(){
    try{ if(typeof previousUpdateShorts==='function') previousUpdateShorts(); }catch(e){}
    computeMobileShortSize();
  };

  const previousScrollTop=window.scrollToPageTop;
  window.scrollToPageTop=function(smooth=true){
    try{ if(typeof previousScrollTop==='function') previousScrollTop(smooth); }catch(e){}
    const behavior=smooth?'smooth':'auto';
    requestAnimationFrame(()=>{
      try{ window.scrollTo({top:0,left:0,behavior}); }catch(e){ window.scrollTo(0,0); }
      [document.documentElement,document.body,document.getElementById('main'),document.getElementById('ct')].filter(Boolean).forEach(el=>{
        try{ el.scrollTop=0; el.scrollLeft=0; }catch(e){}
      });
    });
  };

  const previousUpdateTop=window.updateTopButton;
  window.updateTopButton=function(){
    const y=window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
    const btn=document.getElementById('btn-top');
    if(btn) btn.classList.toggle('show', y>180);
    try{ if(typeof previousUpdateTop==='function') previousUpdateTop(); }catch(e){}
  };

  const previousRender=window.render;
  if(typeof previousRender==='function'){
    window.render=function(){
      auditWorkoutData();
      previousRender.apply(this,arguments);
      requestAnimationFrame(()=>{ computeMobileShortSize(); window.updateTopButton?.(); });
    };
  }
  const previousRenderItems=window.renderItems;
  if(typeof previousRenderItems==='function'){
    window.renderItems=function(){
      auditWorkoutData();
      previousRenderItems.apply(this,arguments);
      requestAnimationFrame(()=>{ computeMobileShortSize(); window.updateTopButton?.(); });
    };
  }

  // 모바일 탭바/필터 스크롤 위치가 테마 전환이나 렌더 후 과하게 흔들리지 않도록 현재 위치 보존
  const oldToggle=window.toggleTheme;
  if(typeof oldToggle==='function'){
    window.toggleTheme=function(){
      const tabScroll=document.getElementById('tab-scroll');
      const tools=document.querySelector('.lib-controls');
      const keepTab=tabScroll?tabScroll.scrollLeft:0;
      const keepTools=tools?tools.scrollLeft:0;
      oldToggle.apply(this,arguments);
      requestAnimationFrame(()=>{
        if(tabScroll) tabScroll.scrollLeft=keepTab;
        if(tools) tools.scrollLeft=keepTools;
        computeMobileShortSize();
      });
    };
  }

  ['resize','orientationchange','scroll'].forEach(evt=>{
    window.addEventListener(evt,()=>requestAnimationFrame(()=>{computeMobileShortSize();window.updateTopButton?.();}),{passive:true});
  });
  window.visualViewport?.addEventListener('resize',()=>requestAnimationFrame(computeMobileShortSize));
  window.addEventListener('load',()=>{auditWorkoutData();computeMobileShortSize();window.updateTopButton?.();},{once:true});

  try{auditWorkoutData();computeMobileShortSize();window.updateTopButton?.();}catch(e){console.warn('v36 check failed',e);}
})();
</script>

(function(){
  return; /* v38 mobile drag script disabled by v41 */
  if(window.__WORKOUT_V38__) return;
  window.__WORKOUT_V38__=true;

  function isMobileUI(){
    return window.matchMedia('(max-width: 900px)').matches || ('ontouchstart' in window && window.innerWidth <= 980);
  }
  function findVideo(mid,iid){
    const arr=(window.data&&data.items&&data.items[mid])||[];
    const idx=arr.findIndex(x=>String(x.id)===String(iid));
    return {arr,idx,it:idx>=0?arr[idx]:null};
  }
  function sameTypeIndexes(mid,iid){
    const found=findVideo(mid,iid);
    if(!found.it) return {arr:found.arr,idx:-1,pos:-1,idxs:[],type:'longform'};
    const type=videoTypeFromItem(found.it);
    const idxs=[];
    found.arr.forEach((x,i)=>{ if(videoTypeFromItem(x)===type) idxs.push(i); });
    return {arr:found.arr,idx:found.idx,pos:idxs.indexOf(found.idx),idxs,type};
  }
  window.moveVideoOnMobile=function(iid,mid,dir){
    const info=sameTypeIndexes(mid,iid);
    if(info.pos<0) return;
    const nextPos=info.pos + (dir<0?-1:1);
    if(nextPos<0 || nextPos>=info.idxs.length){
      showCenterToast(dir<0?'이미 첫 번째 영상입니다.':'이미 마지막 영상입니다.');
      return;
    }
    const a=info.idxs[info.pos];
    const b=info.idxs[nextPos];
    const tmp=info.arr[a];
    info.arr[a]=info.arr[b];
    info.arr[b]=tmp;
    try{ save(); }catch(e){}
    closeModal('m-item-actions');
    render();
    requestAnimationFrame(()=>{
      const card=document.querySelector(`.card[data-iid="${CSS.escape(String(iid))}"]`);
      if(card) card.scrollIntoView({block:'center',inline:'nearest',behavior:'smooth'});
    });
    showCenterToast('영상 위치 변경 완료', `${SUBS[info.type]?.label||'영상'} 순서를 변경했습니다.`);
  };

  // 기존 관리 모달을 그대로 쓰되 모바일 전용 순서 변경 버튼을 삽입한다.
  const prevOpen=window.openItemActions;
  if(typeof prevOpen==='function'){
    window.openItemActions=function(iid,mid){
      prevOpen.apply(this,arguments);
      requestAnimationFrame(()=>{
        const modal=document.querySelector('#m-item-actions .item-action-list');
        if(!modal || modal.querySelector('.mobile-reorder-tools')) return;
        const info=sameTypeIndexes(mid,iid);
        const typeLabel=SUBS[info.type]?.label||'영상';
        const canUp=info.pos>0;
        const canDown=info.pos>=0 && info.pos<info.idxs.length-1;
        const box=document.createElement('div');
        box.className='mobile-reorder-tools';
        box.innerHTML=`
          <div class="mobile-reorder-title">모바일 위치 변경 <span>${typeLabel} ${Math.max(0,info.pos+1)}/${info.idxs.length}</span></div>
          <div class="mobile-reorder-row">
            <button class="share-btn" type="button" ${canUp?'':'disabled'} onclick='moveVideoOnMobile(${JSON.stringify(String(iid))},${JSON.stringify(String(mid))},-1)'>↑ 위로 이동</button>
            <button class="share-btn" type="button" ${canDown?'':'disabled'} onclick='moveVideoOnMobile(${JSON.stringify(String(iid))},${JSON.stringify(String(mid))},1)'>↓ 아래로 이동</button>
          </div>`;
        const after=modal.querySelector('.action-fixed-type');
        if(after) after.insertAdjacentElement('afterend',box);
        else modal.insertAdjacentElement('afterbegin',box);
      });
    };
  }

  // 모바일에서 카드 자체를 길게 누르거나 끌어서 정렬하지 않도록 원천 차단한다.
  document.addEventListener('pointerdown',function(e){
    if(!isMobileUI()) return;
    const card=e.target.closest('.grid .card');
    if(!card) return;
    if(e.target.closest('button,a,iframe,.ytthumb,input,select,textarea,summary')) return;
    e.stopImmediatePropagation();
    try{ if(typeof cleanDrag==='function') cleanDrag(); }catch(_e){}
  },true);

  document.addEventListener('touchmove',function(e){
    if(!isMobileUI()) return;
    const card=e.target.closest('.grid .card');
    if(!card) return;
    if(document.body.classList.contains('dragging')){
      e.stopImmediatePropagation();
      try{ if(typeof cleanDrag==='function') cleanDrag(); }catch(_e){}
    }
  },{capture:true,passive:true});
})();
</script>
