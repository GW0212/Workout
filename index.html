<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Workout</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23ff6a3d'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-size='34'%3E%F0%9F%92%AA%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Pretendard:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ══ 다크 ══ */
:root {
  --bg:#0b0b0d;
  --surface:#141416;
  --surface2:#1a1b1f;
  --surface3:#212329;
  --surface4:#2b2f38;
  --accent:#ff6a3d;
  --accent2:#ff8a66;
  --accent-dim:rgba(255,106,61,.12);
  --accent-soft:rgba(255,106,61,.18);
  --text:#f4f4f5;
  --text-sub:#b7bcc7;
  --text-muted:#737985;
  --border:#2d313b;
  --border2:#484e5d;
  --red:#ff5f57;
  --green:#30d158;
  --sidebar-w:248px;
  --shadow:0 18px 50px rgba(0,0,0,.45);
  --header-bg:rgba(17,18,21,.92);
}
/* ══ 라이트 ══ */
body.light {
  --bg:#f3f3f1;
  --surface:#ffffff;
  --surface2:#f8f8f6;
  --surface3:#efefec;
  --surface4:#e2e1dc;
  --text:#17181b;
  --text-sub:#434852;
  --text-muted:#9aa0aa;
  --border:#e7e4de;
  --border2:#d8d4cd;
  --shadow:0 12px 36px rgba(0,0,0,.08);
  --header-bg:rgba(255,255,255,.88);
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Pretendard',sans-serif;background:radial-gradient(circle at top left, rgba(255,106,61,.05), transparent 28%), var(--bg);color:var(--text);display:flex;transition:background .25s,color .25s;}
body:not(.light) #main{background:linear-gradient(180deg, rgba(255,255,255,.015), transparent 18%), var(--bg);}
body:not(.light) #sidebar{box-shadow:inset -1px 0 0 rgba(255,255,255,.03);}
body:not(.light) .item-card,
body:not(.light) .empty-box,
body:not(.light) .modal,
body:not(.light) .link-display,
body:not(.light) .yt-box{box-shadow:0 14px 32px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.03);}
body:not(.light) .item-card:hover{box-shadow:0 22px 48px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.04);} 

/* ══ 모바일 헤더 ══ */
#mobile-header{
  display:none;position:fixed;top:0;left:0;right:0;height:56px;
  background:var(--header-bg);border-bottom:1px solid var(--border);
  backdrop-filter:blur(18px);
  align-items:center;padding:0 14px;gap:10px;z-index:200;
}
#btn-menu-toggle{
  width:36px;height:36px;background:var(--surface2);border:1px solid var(--border2);
  color:var(--text-sub);cursor:pointer;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:5px;border-radius:8px;transition:background .15s;
}
#btn-menu-toggle:hover{background:var(--surface3);}
#btn-menu-toggle span{display:block;width:16px;height:2px;background:currentColor;border-radius:2px;}
#mobile-logo{font-family:'Pretendard',sans-serif;font-size:17px;font-weight:800;color:var(--accent);letter-spacing:-.2px;flex:1;}

/* ══ 공통 아이콘 버튼 ══ */
.hdr-icon-btn{
  width:36px;height:36px;
  background:linear-gradient(180deg, rgba(255,255,255,.02), transparent), var(--surface2);
  border:1px solid var(--border2);
  border-radius:9px;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;color:var(--text-sub);flex-shrink:0;
}
.hdr-icon-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border2);}

#mobile-add-btn{
  width:36px;height:36px;background:var(--accent);border:none;color:#fff;
  border-radius:9px;font-size:20px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .2s;box-shadow:0 10px 24px rgba(255,106,61,.22);
}
#mobile-add-btn:hover{background:var(--accent2);}
#mobile-add-btn:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;}

/* ══ 사이드바 ══ */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;
  background:linear-gradient(180deg, rgba(255,106,61,.03), transparent 18%), var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:100;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}

/* 사이드바 헤더 */
#sidebar-header{
  height:72px;
  padding:12px 18px;
  border-bottom:1px solid var(--border2);
  background:transparent;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
#sidebar-logo{
  font-family:'Pretendard',sans-serif;font-size:18px;font-weight:800;color:var(--accent);
  letter-spacing:-.3px;line-height:1;display:flex;align-items:center;gap:10px;
  min-height:30px;
}
.logo-icon{
  width:30px;height:30px;background:var(--accent);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;
  box-shadow:0 8px 18px rgba(255,106,61,.22);
}
#sidebar-sub{
  font-size:10px;color:var(--text-muted);letter-spacing:2px;
  text-transform:uppercase;margin-top:4px;
  font-family:'JetBrains Mono',monospace;
  line-height:1;
}

/* 메뉴 리스트 */
#menu-list{flex:1;overflow-y:auto;padding:12px 10px 14px;}
#menu-list::-webkit-scrollbar{width:3px;}
#menu-list::-webkit-scrollbar-thumb{background:var(--surface4);border-radius:2px;}

.menu-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 13px;
  border-radius:12px;cursor:pointer;
  transition:all .18s;margin-bottom:6px;
  border:1px solid transparent;
}
.menu-item:hover{background:linear-gradient(180deg, rgba(255,255,255,.015), transparent), var(--surface2);border-color:var(--border2);}
.menu-item.active{
  background:linear-gradient(90deg, var(--accent-dim), transparent 88%), var(--surface2);
  border-color:rgba(255,106,61,.28);
  box-shadow:inset 3px 0 0 var(--accent), 0 8px 20px rgba(0,0,0,.12);
}
.menu-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--surface4);border:2px solid var(--border2);
  flex-shrink:0;transition:all .2s;
}
.menu-item.active .menu-dot{
  background:var(--accent);border-color:var(--accent);
  box-shadow:0 0 8px rgba(255,78,42,.6);
}
/* 메뉴 이름: 기본(회색) vs 선택(밝은 흰색) */
.menu-name{
  flex:1;font-size:13.5px;font-weight:500;
  color:var(--text-muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .2s;
}
.menu-item:hover .menu-name{color:var(--text-sub);}
.menu-item.active .menu-name{color:var(--text);font-weight:700;}

.menu-actions{display:none;gap:6px;}
.menu-item:hover .menu-actions,.menu-item.active .menu-actions{display:flex;}
.menu-btn{
  min-width:46px;height:30px;padding:0 11px;
  border:1px solid var(--border2);
  background:linear-gradient(180deg, rgba(255,255,255,.03), transparent), var(--surface2);
  color:var(--text-sub);
  cursor:pointer;font-size:11px;border-radius:9px;
  transition:all .18s ease;font-family:'Pretendard',sans-serif;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;
  box-shadow:0 4px 10px rgba(0,0,0,.10);
}
.menu-btn:hover{background:linear-gradient(180deg, rgba(255,255,255,.05), transparent), var(--surface3);color:var(--text);border-color:var(--accent-soft);transform:translateY(-1px);}
.menu-btn:active{transform:translateY(0);}
.menu-btn.del{background:linear-gradient(180deg, rgba(255,255,255,.025), transparent), var(--surface2);border-color:var(--border2);color:var(--text-sub);}
.menu-btn.del:hover{border-color:rgba(255,95,87,.45);color:#ffd4d1;background:rgba(255,95,87,.12);}

/* 사이드바 푸터 */
#sidebar-footer{
  padding:12px 10px 16px;
  border-top:1px solid var(--border2);
  background:transparent;
}
#btn-add-menu{
  width:100%;padding:12px;
  background:var(--surface2);
  border:1px dashed var(--border2);
  color:var(--text-muted);
  border-radius:12px;cursor:pointer;
  font-size:13px;font-family:'Pretendard',sans-serif;font-weight:600;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;
}
#btn-add-menu:hover{
  border-color:var(--accent-soft);color:var(--accent);
  background:rgba(255,106,61,.08);
}

/* ══ 메인 영역 ══ */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}

/* 메인 헤더 */
#main-header{
  height:72px;
  padding:12px 24px;
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;gap:12px;
  background:var(--header-bg);
  backdrop-filter:blur(18px);
  position:sticky;top:0;z-index:10;
}
#main-title{
  font-family:'Pretendard',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.4px;
  color:var(--text);flex:1;line-height:1;text-align:center;
}
#main-title span{color:var(--accent);}

/* 기록 추가 버튼 */
#btn-add-item{
  padding:9px 18px;
  background:var(--accent);border:none;color:#fff;
  border-radius:10px;cursor:pointer;font-size:13px;
  font-family:'Pretendard',sans-serif;font-weight:700;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  box-shadow:0 12px 26px rgba(255,106,61,.24);
}
#btn-add-item:hover{background:var(--accent2);transform:translateY(-2px) scale(1.03);box-shadow:0 8px 24px rgba(255,78,42,.5);}
#btn-add-item:active{transform:scale(.97);}
#btn-add-item:disabled{opacity:.25;cursor:not-allowed;transform:none;box-shadow:none;}

/* 아이템 컨테이너 */
#items-container{flex:1;overflow-y:auto;padding:28px 28px 32px;background:transparent;}
#items-container::-webkit-scrollbar{width:4px;}
#items-container::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}

/* ══ 빈 상태 ══ */
#empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:16px;animation:fadeUp .4s ease;
}
.empty-box{
  background:linear-gradient(180deg, rgba(255,255,255,.015), transparent), var(--surface);
  border:1px solid var(--border2);
  border-radius:20px;
  padding:36px 40px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  max-width:320px;
  box-shadow:var(--shadow);
}
#empty-state .icon{font-size:48px;opacity:.4;}
#empty-state p{font-size:14px;text-align:center;line-height:1.85;color:var(--text-muted);}
/* "기록 추가" 강조 텍스트 */
#empty-state b{color:var(--accent);font-weight:700;}

/* ══ 카드 그리드 ══ */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;align-items:start;}

/* ══ 카드 ══ */
.item-card{
  background:linear-gradient(180deg, rgba(255,106,61,.04), transparent 24%), var(--surface);
  border:1px solid var(--border2);
  border-radius:18px;overflow:hidden;
  transition:border-color .2s,transform .25s cubic-bezier(.34,1.2,.64,1),box-shadow .25s, background .25s;
  animation:fadeUp .35s cubic-bezier(.34,1.2,.64,1) both;
  display:flex;flex-direction:column;
  box-shadow:0 10px 26px rgba(0,0,0,.22);
  position:relative;
}
.item-card::before{
  content:'';
  position:absolute;top:0;left:18px;right:18px;height:2px;
  background:linear-gradient(90deg, var(--accent), rgba(255,106,61,.15) 70%, transparent);
  border-radius:999px;
}
.item-card:hover{
  border-color:var(--border2);
  transform:translateY(-5px);
  box-shadow:0 18px 40px rgba(0,0,0,.34);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* 카드 제목 바 */
.card-title-bar{
  padding:18px 18px 14px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg, rgba(255,255,255,.015), transparent);
  display:flex;align-items:center;justify-content:center;
}
.card-title-text{
  font-size:15px;font-weight:700;
  color:var(--text);
  font-family:'Pretendard',sans-serif;
  text-align:center;letter-spacing:-.25px;
}
.card-title-text.empty{
  color:var(--text-muted);font-weight:400;font-size:12px;
  font-family:'JetBrains Mono',monospace;
}

/* 카드 본문 */
.card-body{padding:16px 18px 18px;flex:1;}
.card-memo{
  font-size:13.5px;
  color:var(--text-sub);    /* ← 본문은 중간 밝기 */
  line-height:1.85;white-space:pre-wrap;word-break:break-word;
}

/* 링크 표시 */
.link-display{
  margin:14px 18px 0;
  padding:11px 14px;
  background:linear-gradient(180deg, rgba(255,255,255,.02), transparent), var(--surface2);
  border:1px solid var(--border2);
  border-radius:12px;
  display:flex;align-items:center;gap:8px;overflow:hidden;
}
.link-display a{
  color:#6eaaff;text-decoration:none;font-size:11.5px;
  font-family:'JetBrains Mono',monospace;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .15s;
}
.link-display a:hover{color:#a8ccff;text-decoration:underline;}
.link-icon{font-size:13px;flex-shrink:0;}

/* 카드 구분선 */
.card-divider{display:none;}

/* 카드 푸터 */
.card-footer{
  padding:16px 18px 18px;
  border-top:1px solid var(--border);
  background:transparent;
  display:flex;gap:8px;justify-content:flex-end;
  margin-top:auto;
}
/* 수정 버튼 */
.card-action-btn{
  padding:8px 14px;
  border:1px solid var(--border2);
  background:linear-gradient(180deg, rgba(255,255,255,.02), transparent), var(--surface2);
  color:var(--text-sub);
  border-radius:10px;cursor:pointer;
  font-size:12px;font-family:'Pretendard',sans-serif;font-weight:600;
  transition:all .15s;
}
.card-action-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border2);}
/* 삭제 버튼 */
.card-action-btn.del{
  background:transparent;border-color:transparent;
  color:var(--text-muted);
}
.card-action-btn.del:hover{
  border-color:var(--red);color:var(--red);
  background:rgba(255,59,48,.08);
}

/* ══ 유튜브 ══ */
.yt-box{position:relative;padding-bottom:100%;background:#000;overflow:hidden;margin:14px 18px 0;border-radius:14px;border:1px solid var(--border);}
.yt-box>*{position:absolute;inset:0;width:100%;height:100%;}
.yt-thumb-layer{cursor:pointer;}
.yt-thumb-img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .3s,transform .5s;}
.yt-thumb-layer:hover .yt-thumb-img{opacity:.65;transform:scale(1.06);}
.yt-thumb-layer::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 55%);
  pointer-events:none;
}
.yt-play-btn{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:62px;height:44px;background:rgba(255,0,0,.92);border-radius:12px;
  pointer-events:none;
  box-shadow:0 4px 24px rgba(0,0,0,.7),0 0 0 3px rgba(255,255,255,.1);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),background .2s,box-shadow .2s;
}
.yt-thumb-layer:hover .yt-play-btn{
  background:#ff0000;
  transform:translate(-50%,-50%) scale(1.18);
  box-shadow:0 10px 36px rgba(255,0,0,.55),0 0 0 5px rgba(255,255,255,.15);
}
.yt-play-btn::after{
  content:'';position:absolute;top:50%;left:54%;
  transform:translate(-50%,-50%);
  border-left:19px solid white;border-top:11px solid transparent;border-bottom:11px solid transparent;
}

/* ══ 모달 ══ */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(5,5,7,.72);backdrop-filter:blur(12px);
  z-index:1000;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:linear-gradient(180deg, rgba(255,106,61,.04), transparent 24%), var(--surface);
  border:1px solid var(--border2);
  border-radius:22px;width:100%;max-width:460px;padding:28px;
  animation:modalIn .25s cubic-bezier(.34,1.2,.64,1);
  box-shadow:0 40px 90px rgba(0,0,0,.5);
}
@keyframes modalIn{from{opacity:0;transform:scale(.92) translateY(14px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-title{
  font-family:'Pretendard',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.3px;
  color:var(--text);margin-bottom:22px;
}
.modal-title .accent{color:var(--accent);}
.form-group{margin-bottom:16px;}
.form-label{
  display:block;font-size:10px;font-weight:700;
  color:var(--text-muted);letter-spacing:1.8px;text-transform:uppercase;
  margin-bottom:7px;font-family:'JetBrains Mono',monospace;
}
.form-input,.form-textarea{
  width:100%;background:linear-gradient(180deg, rgba(255,255,255,.015), transparent), var(--surface2);border:1px solid var(--border2);
  border-radius:12px;color:var(--text);font-family:'Pretendard',sans-serif;
  font-size:14px;padding:12px 14px;
  transition:border-color .2s,box-shadow .2s, background .2s;outline:none;
}
.form-input:focus,.form-textarea:focus{
  border-color:var(--accent);box-shadow:0 0 0 4px rgba(255,106,61,.10);
}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text-muted);}
.form-textarea{resize:vertical;min-height:90px;line-height:1.7;}
.form-hint{font-size:11px;color:var(--text-muted);margin-top:5px;font-family:'JetBrains Mono',monospace;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;}
.btn-cancel{
  padding:10px 18px;background:var(--surface2);border:1px solid var(--border2);
  color:var(--text-sub);border-radius:10px;cursor:pointer;font-size:13px;
  font-family:'Pretendard',sans-serif;font-weight:600;transition:all .15s;
}
.btn-cancel:hover{background:var(--surface3);color:var(--text);}
.btn-confirm{
  padding:10px 22px;background:var(--accent);border:none;color:#fff;
  border-radius:10px;cursor:pointer;font-size:13px;
  font-family:'Pretendard',sans-serif;font-weight:700;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 14px rgba(255,78,42,.35);
}
.btn-confirm:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 6px 22px rgba(255,78,42,.5);}

/* 사이드바 오버레이 */
#sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);backdrop-filter:blur(3px);z-index:90;
}


body:not(.light) .menu-btn{border-color:#565d70;background:linear-gradient(180deg, rgba(255,255,255,.035), transparent), #23262e;color:#d7dbe3;box-shadow:0 6px 14px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.03);}
body:not(.light) .menu-btn:hover{border-color:rgba(255,106,61,.40);background:linear-gradient(180deg, rgba(255,255,255,.05), transparent), #2a2e37;color:#ffffff;box-shadow:0 10px 18px rgba(0,0,0,.24);}
body:not(.light) .menu-btn.del:hover{background:rgba(255,95,87,.14);border-color:rgba(255,95,87,.48);color:#ffe0dd;}
body:not(.light) .card-title-bar,
body:not(.light) .card-footer,
body:not(.light) #main-header,
body:not(.light) #sidebar-header,
body:not(.light) #sidebar-footer{border-color:var(--border2);}
body:not(.light) .form-input,
body:not(.light) .form-textarea,
body:not(.light) .hdr-icon-btn,
body:not(.light) .card-action-btn{border-color:#525867;}
body:not(.light) .menu-item.active .menu-name{color:#fff;}



/* ══ 인터랙션 강화 ══ */
a, button, input, textarea { -webkit-tap-highlight-color: transparent; }
button, .menu-item, .yt-thumb-layer, .card-action-btn, .menu-btn, #btn-add-menu, #btn-add-item, .hdr-icon-btn, .btn-cancel, .btn-confirm{
  transition:transform .16s ease, box-shadow .2s ease, border-color .2s ease, background .2s ease, color .2s ease, opacity .2s ease;
}
button:active, .card-action-btn:active, .menu-btn:active, #btn-add-menu:active, #btn-add-item:active, .hdr-icon-btn:active, .btn-cancel:active, .btn-confirm:active{
  transform:scale(.97);
}
button:focus-visible,
a:focus-visible,
input:focus-visible,
textarea:focus-visible,
.menu-item:focus-visible,
.yt-thumb-layer:focus-visible{
  outline:none;
  box-shadow:0 0 0 3px rgba(255,106,61,.16), 0 0 0 1px rgba(255,106,61,.40) inset;
}

.menu-item{position:relative;overflow:hidden;}
.menu-item::before{
  content:'';position:absolute;left:0;top:10px;bottom:10px;width:3px;
  border-radius:999px;background:transparent;
  transition:background .2s ease, box-shadow .2s ease;
}
.menu-item.active::before{
  background:linear-gradient(180deg, var(--accent), var(--accent2));
  box-shadow:0 0 14px rgba(255,106,61,.28);
}

.item-card{isolation:isolate;}
.item-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(115deg, transparent 20%, rgba(255,255,255,.05) 45%, transparent 70%);
  transform:translateX(-120%);
  transition:transform .7s ease;
  pointer-events:none;z-index:0;
}
.item-card:hover::after{transform:translateX(120%);}
.item-card > *{position:relative;z-index:1;}
.card-title-bar{transition:border-color .2s ease, background .2s ease;}
.item-card:hover .card-title-bar{
  background:linear-gradient(180deg, rgba(255,106,61,.08), transparent 120%), var(--surface2);
  border-bottom-color:rgba(255,106,61,.22);
}
.item-card:hover .card-title-text{color:var(--text);}

.empty-box{
  position:relative;overflow:hidden;
}
.empty-box::after{
  content:'';position:absolute;inset:auto -20% -55% auto;width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle, rgba(255,106,61,.12), transparent 70%);
  pointer-events:none;
}
#empty-state .icon{animation:floatIcon 2.8s ease-in-out infinite;}
@keyframes floatIcon{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}

.yt-box.loading::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent), linear-gradient(180deg, var(--surface2), var(--surface3));
  background-size:220px 100%, 100% 100%;
  animation:thumbShimmer 1.2s linear infinite;
  z-index:0;
}
@keyframes thumbShimmer{from{background-position:-220px 0, 0 0;}to{background-position:calc(100% + 220px) 0, 0 0;}}

#toast-wrap{
  position:fixed;right:18px;bottom:18px;z-index:1200;
  display:flex;flex-direction:column;gap:10px;pointer-events:none;
}
.toast{
  min-width:220px;max-width:320px;
  padding:13px 14px;border-radius:14px;
  background:linear-gradient(180deg, rgba(255,255,255,.03), transparent), var(--surface2);
  border:1px solid var(--border2);
  color:var(--text);font-size:13px;font-weight:600;
  box-shadow:0 18px 36px rgba(0,0,0,.28);
  display:flex;align-items:center;gap:10px;
  animation:toastIn .24s cubic-bezier(.34,1.2,.64,1);
}
.toast::before{
  content:'';width:10px;height:10px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 10px rgba(255,106,61,.35);
  flex-shrink:0;
}
.toast.error::before{background:var(--red);box-shadow:0 0 10px rgba(255,95,87,.35);}
.toast.hide{animation:toastOut .2s ease forwards;}
@keyframes toastIn{from{opacity:0;transform:translateY(12px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes toastOut{to{opacity:0;transform:translateY(8px) scale(.97);}}

@media(max-width:768px){
  #toast-wrap{left:12px;right:12px;bottom:12px;}
  .toast{min-width:0;max-width:none;width:100%;}
}

/* ══ 반응형 ══ */
@media(max-width:768px){
  html,body{height:auto;overflow-x:hidden;overflow-y:auto;width:100%;max-width:100%;}
  body{flex-direction:column;position:relative;}
  #mobile-header{display:flex;}
  #sidebar{
    position:fixed;top:0;left:0;bottom:0;
    width:min(82vw,320px);min-width:min(82vw,320px);max-width:min(82vw,320px);
    transform:translateX(calc(-100% - 14px));
    z-index:150;box-shadow:var(--shadow);
    border-right:1px solid var(--border2);
  }
  #sidebar.open{transform:translateX(0);}
  #sidebar-overlay.open{display:block;}
  #main{
    width:100%;max-width:100%;min-width:0;
    margin-top:56px;min-height:calc(100vh - 56px);
    overflow:visible;flex:1 1 auto;
  }
  #main-header{
    width:100%;max-width:100%;min-width:0;
    padding:12px 14px;min-height:56px;position:sticky;top:56px;
  }
  #main-title{font-size:20px;}
  #btn-add-item{display:none;}
  #items-container{width:100%;max-width:100%;padding:14px 12px 20px;overflow:visible;flex:none;}
  .items-grid{grid-template-columns:1fr;gap:14px;}
  .item-card{min-width:0;}
  .item-card:hover{transform:none;box-shadow:0 10px 26px rgba(0,0,0,.22);}
  .modal{padding:22px 18px;border-radius:18px;}
  .modal-overlay{padding:12px;}
}
body.sidebar-open{overflow:hidden;}
body.sidebar-open #main{pointer-events:none;user-select:none;}
body.sidebar-open #mobile-header{pointer-events:auto;}

@media(max-width:480px){
  #items-container{padding:10px;}
  #main-title{font-size:20px;}
}
</style>
</head>
<body>

<!-- 모바일 헤더 -->
<div id="mobile-header">
  <button id="btn-menu-toggle" onclick="toggleSidebar()">
    <span></span><span></span><span></span>
  </button>
  <div id="mobile-logo">💪 Workout</div>
  <button class="hdr-icon-btn" id="btn-theme-m" onclick="toggleTheme()" title="테마 전환">🌙</button>
  <button id="mobile-add-btn" onclick="openAddItem()" disabled>＋</button>
</div>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- 사이드바 -->
<div id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-logo"><div class="logo-icon">💪</div>Workout</div>
    <div id="sidebar-sub">Training Log</div>
  </div>
  <div id="menu-list"></div>
  <div id="sidebar-footer">
    <button id="btn-add-menu">＋ 메뉴 추가</button>
  </div>
</div>

<!-- 메인 -->
<div id="main">
  <div id="main-header">
    <div id="main-title">메뉴를 <span>선택</span>하세요</div>
    <button class="hdr-icon-btn" id="btn-theme" onclick="toggleTheme()" title="테마 전환">🌙</button>
    <button id="btn-add-item" disabled>＋ 기록 추가</button>
  </div>
  <div id="items-container">
    <div id="empty-state">
      <div class="empty-box">
        <div class="icon">🏋️</div>
        <p>좌측 메뉴에서 카테고리를 선택하거나<br/><b>메뉴 추가</b>로 새로운 운동을 시작해보세요.</p>
      </div>
    </div>
  </div>
</div>

<!-- 모달: 메뉴 -->
<div class="modal-overlay" id="modal-menu">
  <div class="modal">
    <div class="modal-title" id="modal-menu-title">메뉴 <span class="accent">추가</span></div>
    <div class="form-group">
      <label class="form-label">메뉴 이름</label>
      <input class="form-input" id="input-menu-name" type="text" placeholder="예: 가슴 운동, 하체 루틴…"/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-menu')">취소</button>
      <button class="btn-confirm" id="btn-menu-confirm">저장</button>
    </div>
  </div>
</div>

<!-- 모달: 기록 -->
<div class="modal-overlay" id="modal-item">
  <div class="modal">
    <div class="modal-title" id="modal-item-title">기록 <span class="accent">추가</span></div>
    <div class="form-group">
      <label class="form-label">제목 (선택)</label>
      <input class="form-input" id="input-item-title" type="text" placeholder="예: 벤치프레스 3세트, 오늘의 숄더…"/>
    </div>
    <div class="form-group">
      <label class="form-label">유튜브 링크 (선택)</label>
      <input class="form-input" id="input-item-link" type="url" placeholder="https://www.youtube.com/watch?v=…"/>
      <p class="form-hint">// 유튜브 링크 → 사이트 내 재생 🎬</p>
    </div>
    <div class="form-group">
      <label class="form-label">메모 (선택)</label>
      <textarea class="form-textarea" id="input-item-memo" placeholder="세트 수, 무게, 느낀 점 등…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-item')">취소</button>
      <button class="btn-confirm" id="btn-item-confirm">저장</button>
    </div>
  </div>
</div>

<div id="toast-wrap"></div>

<script>
// ── 데이터 마이그레이션: 기존 item에 title 필드 없으면 추가 ──
let data = JSON.parse(localStorage.getItem('workoutData') || '{"menus":[],"items":{}}');
Object.values(data.items).forEach(arr => arr.forEach(item => { if(!item.title) item.title=''; }));

let activeMenuId = null;

function save() { localStorage.setItem('workoutData', JSON.stringify(data)); }
function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2); }


function showToast(message, type = 'info') {
  const wrap = document.getElementById('toast-wrap');
  if (!wrap) return;
  const toast = document.createElement('div');
  toast.className = 'toast' + (type === 'error' ? ' error' : '');
  toast.textContent = message;
  wrap.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('hide');
    toast.addEventListener('animationend', () => toast.remove(), { once:true });
  }, 1900);
}

// ── 테마 ──
function applyThemeIcons() {
  const icon = document.body.classList.contains('light') ? '☀️' : '🌙';
  document.getElementById('btn-theme').textContent = icon;
  document.getElementById('btn-theme-m').textContent = icon;
}
function toggleTheme() {
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
  applyThemeIcons();
  showToast(document.body.classList.contains('light') ? '화이트 모드로 전환했습니다.' : '다크 모드로 전환했습니다.');
}
// 복원
if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
applyThemeIcons();

// ── 모바일 사이드바 ──
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const isOpen = sidebar.classList.toggle('open');
  overlay.classList.toggle('open', isOpen);
  document.body.classList.toggle('sidebar-open', isOpen && window.innerWidth <= 768);
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
  document.body.classList.remove('sidebar-open');
}
window.addEventListener('resize', () => {
  if (window.innerWidth > 768) closeSidebar();
});

// ── 유튜브 ──
function isYouTube(url) {
  return /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)/i.test(url);
}
function getYouTubeId(url) {
  const p = [/(?:youtube\.com\/watch\?v=)([^&\s]+)/, /(?:youtu\.be\/)([^?\s]+)/, /(?:youtube\.com\/shorts\/)([^?\s]+)/];
  for (const r of p) { const m = url.match(r); if (m) return m[1]; }
  return null;
}
function buildYTEmbed(url) {
  const id = getYouTubeId(url); if (!id) return null;
  const wid = 'yt' + Date.now() + Math.random().toString(36).slice(2, 6);
  return `<div class="yt-box loading" id="${wid}"><div class="yt-thumb-layer" onclick="ytPlay('${wid}','${id}')"><img class="yt-thumb-img" src="https://img.youtube.com/vi/${id}/hqdefault.jpg" onload="ytThumbLoaded(this)" onerror="this.onerror=null; this.src='https://img.youtube.com/vi/${id}/mqdefault.jpg'" alt=""/><div class="yt-play-btn"></div></div></div>`;
}
function ytThumbLoaded(img) {
  const box = img.closest('.yt-box');
  if (box) box.classList.remove('loading');
}
function ytPlay(wid, videoId) {
  const box = document.getElementById(wid); if (!box) return;
  box.innerHTML = '<iframe style="position:absolute;inset:0;width:100%;height:100%;border:none;" src="https://www.youtube.com/embed/' + videoId + '?autoplay=1&rel=0&modestbranding=1&playsinline=1" allow="autoplay;encrypted-media;picture-in-picture;fullscreen" allowfullscreen></iframe>';
}

// ── 사이드바 렌더 ──
function renderMenus() {
  const list = document.getElementById('menu-list');
  list.innerHTML = '';
  data.menus.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'menu-item' + (m.id === activeMenuId ? ' active' : '');
    div.tabIndex = 0;
    div.setAttribute('role', 'button');
    div.innerHTML = `
      <div class="menu-dot"></div>
      <div class="menu-name">${escHtml(m.name)}</div>
      <div class="menu-actions">
        <button class="menu-btn" onclick="event.stopPropagation();openEditMenu('${m.id}')">수정</button>
        <button class="menu-btn del" onclick="event.stopPropagation();deleteMenu('${m.id}')">삭제</button>
      </div>`;
    div.addEventListener('click', () => { selectMenu(m.id); closeSidebar(); });
    div.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectMenu(m.id); closeSidebar(); } });
    list.appendChild(div);
  });
}

// ── 카드 렌더 ──
function renderItems() {
  const container = document.getElementById('items-container');
  const header    = document.getElementById('main-title');
  const addBtn    = document.getElementById('btn-add-item');
  const mobileAdd = document.getElementById('mobile-add-btn');

  if (!activeMenuId) {
    header.innerHTML = '메뉴를 <span>선택</span>하세요';
    addBtn.disabled = mobileAdd.disabled = true;
    container.innerHTML = `<div id="empty-state"><div class="empty-box"><div class="icon">🏋️</div><p>좌측 메뉴에서 카테고리를 선택하거나<br/><b>메뉴 추가</b>로 새로운 운동을 시작해보세요.</p></div></div>`;
    return;
  }

  const menu = data.menus.find(m => m.id === activeMenuId);
  header.innerHTML = `<span>${escHtml(menu.name)}</span>`;
  addBtn.disabled = mobileAdd.disabled = false;

  const items = data.items[activeMenuId] || [];
  if (items.length === 0) {
    container.innerHTML = `<div id="empty-state"><div class="empty-box"><div class="icon">📝</div><p>아직 기록이 없어요.<br/><b>기록 추가</b> 버튼을 눌러보세요!</p></div></div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'items-grid';

  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.style.animationDelay = (i * 0.06) + 's';

    // 제목 바 (중앙 정렬)
    const titleText = item.title
      ? `<span class="card-title-text">${escHtml(item.title)}</span>`
      : `<span class="card-title-text empty">#${String(i+1).padStart(2,'0')}</span>`;
    const titleBar = `<div class="card-title-bar">${titleText}</div>`;

    // 링크/영상
    let mediaHtml = '';
    if (item.link) {
      mediaHtml = isYouTube(item.link)
        ? (buildYTEmbed(item.link) || linkDisplay(item.link))
        : linkDisplay(item.link);
    }

    // 제목과 미디어 사이 구분선
    const divider = mediaHtml ? '<div class="card-divider"></div>' : '';

    // 메모
    const memoHtml = item.memo
      ? `<div class="card-body"><div class="card-memo">${escHtml(item.memo)}</div></div>` : '';

    // 버튼
    const footer = `<div class="card-footer">
      <button class="card-action-btn" onclick="openEditItem('${item.id}')">수정</button>
      <button class="card-action-btn del" onclick="deleteItem('${item.id}')">삭제</button>
    </div>`;

    card.innerHTML = titleBar + divider + mediaHtml + memoHtml + footer;
    grid.appendChild(card);
  });

  container.innerHTML = '';
  container.appendChild(grid);
}

function linkDisplay(url) {
  return `<div class="link-display"><span class="link-icon">🔗</span><a href="${escAttr(url)}" target="_blank" rel="noopener">${escHtml(url)}</a></div>`;
}

function selectMenu(id) {
  activeMenuId = id;
  renderMenus();
  renderItems();
}

// ── 메뉴 CRUD ──
let editingMenuId = null;
function openAddMenu() {
  editingMenuId = null;
  document.getElementById('modal-menu-title').innerHTML = '메뉴 <span class="accent">추가</span>';
  document.getElementById('input-menu-name').value = '';
  openModal('modal-menu');
  setTimeout(() => document.getElementById('input-menu-name').focus(), 100);
}
function openEditMenu(id) {
  editingMenuId = id;
  const m = data.menus.find(x => x.id === id);
  document.getElementById('modal-menu-title').innerHTML = '메뉴 <span class="accent">수정</span>';
  document.getElementById('input-menu-name').value = m.name;
  openModal('modal-menu');
  setTimeout(() => document.getElementById('input-menu-name').focus(), 100);
}
function saveMenu() {
  const name = document.getElementById('input-menu-name').value.trim();
  if (!name) { document.getElementById('input-menu-name').focus(); showToast('메뉴 이름을 입력해주세요.', 'error'); return; }
  if (editingMenuId) {
    data.menus.find(m => m.id === editingMenuId).name = name;
  } else {
    const id = uid();
    data.menus.push({ id, name });
    data.items[id] = [];
    activeMenuId = id;
  }
  save(); renderMenus(); renderItems(); closeModal('modal-menu');
  showToast(editingMenuId ? '메뉴를 수정했습니다.' : '새 메뉴를 추가했습니다.');
}
function deleteMenu(id) {
  if (!confirm('메뉴를 삭제하면 안의 기록도 모두 삭제됩니다. 계속할까요?')) return;
  data.menus = data.menus.filter(m => m.id !== id);
  delete data.items[id];
  if (activeMenuId === id) activeMenuId = data.menus.length > 0 ? data.menus[0].id : null;
  save(); renderMenus(); renderItems();
  showToast('메뉴를 삭제했습니다.');
}

// ── 기록 CRUD ──
let editingItemId = null;
function openAddItem() {
  if (!activeMenuId) return;
  editingItemId = null;
  document.getElementById('modal-item-title').innerHTML = '기록 <span class="accent">추가</span>';
  document.getElementById('input-item-title').value = '';
  document.getElementById('input-item-link').value = '';
  document.getElementById('input-item-memo').value = '';
  openModal('modal-item');
  setTimeout(() => document.getElementById('input-item-title').focus(), 100);
}
function openEditItem(id) {
  editingItemId = id;
  const item = (data.items[activeMenuId] || []).find(x => x.id === id);
  document.getElementById('modal-item-title').innerHTML = '기록 <span class="accent">수정</span>';
  document.getElementById('input-item-title').value = item.title || '';
  document.getElementById('input-item-link').value = item.link || '';
  document.getElementById('input-item-memo').value = item.memo || '';
  openModal('modal-item');
  setTimeout(() => document.getElementById('input-item-title').focus(), 100);
}
function saveItem() {
  const title = document.getElementById('input-item-title').value.trim();
  const link  = document.getElementById('input-item-link').value.trim();
  const memo  = document.getElementById('input-item-memo').value.trim();
  if (!title && !link && !memo) { showToast('제목, 링크, 메모 중 하나는 입력해주세요.', 'error'); return; }
  if (!data.items[activeMenuId]) data.items[activeMenuId] = [];
  if (editingItemId) {
    const item = data.items[activeMenuId].find(x => x.id === editingItemId);
    item.title = title; item.link = link; item.memo = memo;
  } else {
    data.items[activeMenuId].push({ id: uid(), title, link, memo });
  }
  save(); renderItems(); closeModal('modal-item');
  showToast(editingItemId ? '기록을 수정했습니다.' : '기록을 저장했습니다.');
}
function deleteItem(id) {
  if (!confirm('이 기록을 삭제할까요?')) return;
  data.items[activeMenuId] = (data.items[activeMenuId] || []).filter(x => x.id !== id);
  save(); renderItems();
  showToast('기록을 삭제했습니다.');
}

// ── 모달 ──
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});
document.getElementById('input-menu-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveMenu();
  if (e.key === 'Escape') closeModal('modal-menu');
});
document.getElementById('input-item-memo').addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal('modal-item');
});
document.getElementById('btn-add-menu').addEventListener('click', openAddMenu);
document.getElementById('btn-add-item').addEventListener('click', openAddItem);
document.getElementById('btn-menu-confirm').addEventListener('click', saveMenu);
document.getElementById('btn-item-confirm').addEventListener('click', saveItem);

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return escHtml(s); }

// ── 초기화: 첫 번째 메뉴 자동 선택 ──
