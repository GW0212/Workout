<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Workout</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect fill='%23ff4e2a' x='0' y='0' width='64' height='64' rx='14'/%3E%3Crect fill='white' x='28' y='25' width='8' height='14' rx='2'/%3E%3Crect fill='white' x='5' y='21' width='7' height='22' rx='3'/%3E%3Crect fill='white' x='52' y='21' width='7' height='22' rx='3'/%3E%3Crect fill='white' x='3' y='26' width='11' height='12' rx='2'/%3E%3Crect fill='white' x='50' y='26' width='11' height='12' rx='2'/%3E%3Crect fill='white' x='12' y='29' width='16' height='6' rx='2'/%3E%3Crect fill='white' x='36' y='29' width='16' height='6' rx='2'/%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Pretendard:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ══ 다크 ══ */
:root {
  --bg:#0d0d0d;
  --surface:#161616;
  --surface2:#1c1c1c;
  --surface3:#242424;
  --surface4:#2e2e2e;
  --accent:#ff4e2a;
  --accent2:#ff7a57;
  --accent-dim:rgba(255,78,42,.15);
  --text:#f0f0f0;
  --text-sub:#c0c0c0;
  --text-muted:#666;
  --border:#252525;
  --border2:#333;
  --red:#ff3b30;
  --green:#30d158;
  --sidebar-w:264px;
  --shadow:0 20px 50px rgba(0,0,0,.7);
  --header-bg:#161616;
}
/* ══ 라이트 ══ */
body.light {
  --bg:#f0f0ee;
  --surface:#fff;
  --surface2:#f7f7f5;
  --surface3:#ebebea;
  --surface4:#dcdcda;
  --text:#141414;
  --text-sub:#444;
  --text-muted:#aaa;
  --border:#ddd;
  --border2:#c8c8c8;
  --shadow:0 12px 36px rgba(0,0,0,.1);
  --header-bg:#fff;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{margin:0;font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);display:flex;transition:background .25s,color .25s;overflow:hidden;-webkit-text-size-adjust:100%;}"")
html=html.replace(#mobile-logo{font-family:'Pretendard',sans-serif;font-size:17px;font-weight:800;color:var(--accent);letter-spacing:-.2px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ══ 모바일 헤더 ══ */
#mobile-header{
  display:none;position:fixed;top:0;left:0;right:0;height:56px;
  background:var(--header-bg);border-bottom:2px solid var(--border);
  align-items:center;padding:0 14px;gap:10px;z-index:200;
}
#btn-menu-toggle{
  width:36px;height:36px;background:var(--surface2);border:1px solid var(--border2);
  color:var(--text-sub);cursor:pointer;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:5px;border-radius:8px;transition:background .15s;
}
#btn-menu-toggle:hover{background:var(--surface3);}
#btn-menu-toggle span{display:block;width:16px;height:2px;background:currentColor;border-radius:2px;}
#mobile-logo{font-family:'Pretendard',sans-serif;font-size:17px;font-weight:800;color:var(--accent);letter-spacing:-.2px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ══ 공통 아이콘 버튼 ══ */
.hdr-icon-btn{
  width:36px;height:36px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:9px;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;color:var(--text-sub);flex-shrink:0;
}
.hdr-icon-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border2);}

#mobile-add-btn{
  width:36px;height:36px;background:var(--accent);border:none;color:#fff;
  border-radius:9px;font-size:20px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .2s;box-shadow:0 3px 12px rgba(255,78,42,.4);
}
#mobile-add-btn:hover{background:var(--accent2);}
#mobile-add-btn:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;}

/* ══ 사이드바 ══ */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;
  background:var(--surface);
  border-right:2px solid var(--border);
  display:flex;flex-direction:column;z-index:100;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}

/* 사이드바 헤더 */
#sidebar-header{
  padding:20px 16px 16px;
  border-bottom:2px solid var(--border);
  background:var(--surface);
}
#sidebar-logo{
  font-family:'Pretendard',sans-serif;font-size:18px;font-weight:800;color:var(--accent);
  letter-spacing:-.3px;line-height:1;display:flex;align-items:center;gap:10px;
}
.logo-icon{
  width:30px;height:30px;background:var(--accent);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;
  box-shadow:0 3px 10px rgba(255,78,42,.45);
}
#sidebar-sub{
  font-size:10px;color:var(--text-muted);letter-spacing:2px;
  text-transform:uppercase;margin-top:6px;
  font-family:'JetBrains Mono',monospace;
}

/* 메뉴 리스트 */
#menu-list{flex:1;min-height:0;overflow-y:auto;padding:12px 10px 18px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;}
#menu-list::-webkit-scrollbar{width:3px;}
#menu-list::-webkit-scrollbar-thumb{background:var(--surface4);border-radius:2px;}

.menu-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 13px;
  border-radius:10px;cursor:pointer;
  transition:all .18s;margin-bottom:4px;
  border:1px solid transparent;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.menu-item:hover{background:var(--surface2);border-color:var(--border);}
.menu-item.active{
  background:var(--accent-dim);
  border-color:rgba(255,78,42,.3);
}
.menu-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--surface4);border:2px solid var(--border2);
  flex-shrink:0;transition:all .2s;
}
.menu-item.active .menu-dot{
  background:var(--accent);border-color:var(--accent);
  box-shadow:0 0 8px rgba(255,78,42,.6);
}
/* 메뉴 이름: 기본(회색) vs 선택(밝은 흰색) */
.menu-name{
  flex:1;font-size:13.5px;font-weight:500;
  color:var(--text-muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .2s;
}
.menu-item:hover .menu-name{color:var(--text-sub);}
.menu-item.active .menu-name{color:var(--text);font-weight:700;}

.menu-actions{display:none;gap:4px;flex-shrink:0;}
.menu-item:hover .menu-actions,.menu-item.active .menu-actions{display:flex;}
.menu-btn{
  padding:3px 8px;
  border:1px solid var(--border2);
  background:var(--surface3);
  color:var(--text-sub);
  cursor:pointer;font-size:11px;border-radius:5px;
  transition:all .15s;font-family:'Pretendard',sans-serif;font-weight:600;
}
.menu-btn:hover{background:var(--surface4);color:var(--text);border-color:var(--border2);}
.menu-btn.del{border-color:transparent;background:transparent;}
.menu-btn.del:hover{border-color:var(--red);color:var(--red);background:rgba(255,59,48,.08);}

/* 사이드바 푸터 */
#sidebar-footer{
  padding:12px 10px 16px;
  border-top:2px solid var(--border);
  background:var(--surface);
}
#btn-add-menu{
  width:100%;padding:11px;
  background:var(--surface2);
  border:1px dashed var(--border2);
  color:var(--text-muted);
  border-radius:10px;cursor:pointer;
  font-size:13px;font-family:'Pretendard',sans-serif;font-weight:600;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;
}
#btn-add-menu:hover{
  border-color:var(--accent);color:var(--accent);
  background:rgba(255,78,42,.06);
}

/* ══ 메인 영역 ══ */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}

/* 메인 헤더 */
#main-header{
  padding:14px 24px 14px;
  border-bottom:2px solid var(--border);
  display:flex;align-items:center;gap:12px;
  min-height:64px;
  background:var(--header-bg);
  position:sticky;top:0;z-index:10;
}
#main-title{
  font-family:'Pretendard',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.3px;
  color:var(--text);flex:1;line-height:1;text-align:center;
}
#main-title span{color:var(--accent);}

/* 기록 추가 버튼 */
#btn-add-item{
  padding:9px 18px;
  background:var(--accent);border:none;color:#fff;
  border-radius:10px;cursor:pointer;font-size:13px;
  font-family:'Pretendard',sans-serif;font-weight:700;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  box-shadow:0 4px 14px rgba(255,78,42,.4);
}
#btn-add-item:hover{background:var(--accent2);transform:translateY(-2px) scale(1.03);box-shadow:0 8px 24px rgba(255,78,42,.5);}
#btn-add-item:active{transform:scale(.97);}
#btn-add-item:disabled{opacity:.25;cursor:not-allowed;transform:none;box-shadow:none;}

/* 아이템 컨테이너 */
#items-container{flex:1;overflow-y:auto;padding:22px 24px;background:var(--bg);min-height:0;}
#items-container::-webkit-scrollbar{width:4px;}
#items-container::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}

/* ══ 빈 상태 ══ */
#empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  min-height:100%;gap:16px;animation:fadeUp .4s ease;padding-top:8px;
}
.empty-box{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:36px 40px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  max-width:300px;
}
#empty-state .icon{font-size:48px;opacity:.4;}
#empty-state p{font-size:14px;text-align:center;line-height:1.85;color:var(--text-muted);}
/* "기록 추가" 강조 텍스트 */
#empty-state b{color:var(--accent);font-weight:700;}

/* ══ 카드 그리드 ══ */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}

/* ══ 카드 ══ */
.item-card{
  background:var(--surface);
  border:2px solid var(--border2);
  border-radius:14px;overflow:hidden;
  transition:border-color .2s,transform .25s cubic-bezier(.34,1.2,.64,1),box-shadow .25s;
  animation:fadeUp .35s cubic-bezier(.34,1.2,.64,1) both;
  display:flex;flex-direction:column;
  box-shadow:0 2px 12px rgba(0,0,0,.25);
  position:relative;
}
/* 왼쪽 accent 세로 바 */
.item-card::before{
  content:'';
  position:absolute;top:0;left:0;bottom:0;
  width:4px;
  background:linear-gradient(to bottom,var(--accent),var(--accent2));
  border-radius:4px 0 0 4px;
}
.item-card:hover{
  border-color:var(--accent);
  transform:translateY(-4px);
  box-shadow:0 12px 36px rgba(0,0,0,.5),0 0 0 1px var(--accent);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* 카드 제목 바 */
.card-title-bar{
  padding:12px 14px 10px;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  min-height:44px;
}
.card-title-text{
  font-size:14px;font-weight:700;
  color:var(--text);          /* ← 흰색(다크) / 검정(라이트) */
  font-family:'Pretendard',sans-serif;
  text-align:center;letter-spacing:-.2px;
}
.card-title-text.empty{
  color:var(--text-muted);font-weight:400;font-size:12px;
  font-family:'JetBrains Mono',monospace;
}

/* 카드 본문 */
.card-body{padding:14px 16px;flex:1;}
.card-memo{
  font-size:13.5px;
  color:var(--text-sub);    /* ← 본문은 중간 밝기 */
  line-height:1.85;white-space:pre-wrap;word-break:break-word;
}

/* 링크 표시 */
.link-display{
  padding:11px 14px;
  background:var(--surface3);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;overflow:hidden;
}
.link-display a{
  color:#6eaaff;text-decoration:none;font-size:11.5px;
  font-family:'JetBrains Mono',monospace;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .15s;
}
.link-display a:hover{color:#a8ccff;text-decoration:underline;}
.link-icon{font-size:13px;flex-shrink:0;}

/* 카드 구분선 */
.card-divider{height:1px;background:var(--border);}

/* 카드 푸터 */
.card-footer{
  padding:10px 14px;
  border-top:1px solid var(--border);
  background:var(--surface2);
  display:flex;gap:8px;justify-content:flex-end;
  margin-top:auto;
}
/* 수정 버튼 */
.card-action-btn{
  padding:6px 14px;
  border:1px solid var(--border2);
  background:var(--surface3);
  color:var(--text-sub);
  border-radius:7px;cursor:pointer;
  font-size:12px;font-family:'Pretendard',sans-serif;font-weight:600;
  transition:all .15s;
}
.card-action-btn:hover{background:var(--surface4);color:var(--text);border-color:var(--border2);}
/* 삭제 버튼 */
.card-action-btn.del{
  background:transparent;border-color:transparent;
  color:var(--text-muted);
}
.card-action-btn.del:hover{
  border-color:var(--red);color:var(--red);
  background:rgba(255,59,48,.08);
}

/* ══ 유튜브 ══ */
.yt-box{position:relative;padding-bottom:56.25%;background:#000;overflow:hidden;}
.yt-box>*{position:absolute;inset:0;width:100%;height:100%;}
.yt-thumb-layer{cursor:pointer;}
.yt-thumb-img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .3s,transform .5s;}
.yt-thumb-layer:hover .yt-thumb-img{opacity:.65;transform:scale(1.06);}
.yt-thumb-layer::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 55%);
  pointer-events:none;
}
.yt-play-btn{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:62px;height:44px;background:rgba(255,0,0,.92);border-radius:12px;
  pointer-events:none;
  box-shadow:0 4px 24px rgba(0,0,0,.7),0 0 0 3px rgba(255,255,255,.1);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),background .2s,box-shadow .2s;
}
.yt-thumb-layer:hover .yt-play-btn{
  background:#ff0000;
  transform:translate(-50%,-50%) scale(1.18);
  box-shadow:0 10px 36px rgba(255,0,0,.55),0 0 0 5px rgba(255,255,255,.15);
}
.yt-play-btn::after{
  content:'';position:absolute;top:50%;left:54%;
  transform:translate(-50%,-50%);
  border-left:19px solid white;border-top:11px solid transparent;border-bottom:11px solid transparent;
}

/* ══ 모달 ══ */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.82);backdrop-filter:blur(10px);
  z-index:1000;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:18px;width:100%;max-width:460px;padding:28px;
  animation:modalIn .25s cubic-bezier(.34,1.2,.64,1);
  box-shadow:0 40px 90px rgba(0,0,0,.6);
}
@keyframes modalIn{from{opacity:0;transform:scale(.92) translateY(14px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-title{
  font-family:'Pretendard',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.3px;
  color:var(--text);margin-bottom:22px;
}
.modal-title .accent{color:var(--accent);}
.form-group{margin-bottom:16px;}
.form-label{
  display:block;font-size:10px;font-weight:700;
  color:var(--text-muted);letter-spacing:1.8px;text-transform:uppercase;
  margin-bottom:7px;font-family:'JetBrains Mono',monospace;
}
.form-input,.form-textarea{
  width:100%;background:var(--surface2);border:1px solid var(--border2);
  border-radius:10px;color:var(--text);font-family:'Pretendard',sans-serif;
  font-size:14px;padding:11px 14px;
  transition:border-color .2s,box-shadow .2s;outline:none;
}
.form-input:focus,.form-textarea:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,78,42,.12);
}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text-muted);}
.form-textarea{resize:vertical;min-height:90px;line-height:1.7;}
.form-hint{font-size:11px;color:var(--text-muted);margin-top:5px;font-family:'JetBrains Mono',monospace;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;}
.btn-cancel{
  padding:10px 18px;background:var(--surface2);border:1px solid var(--border2);
  color:var(--text-sub);border-radius:10px;cursor:pointer;font-size:13px;
  font-family:'Pretendard',sans-serif;font-weight:600;transition:all .15s;
}
.btn-cancel:hover{background:var(--surface3);color:var(--text);}
.btn-confirm{
  padding:10px 22px;background:var(--accent);border:none;color:#fff;
  border-radius:10px;cursor:pointer;font-size:13px;
  font-family:'Pretendard',sans-serif;font-weight:700;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 14px rgba(255,78,42,.35);
}
.btn-confirm:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 6px 22px rgba(255,78,42,.5);}

/* 사이드바 오버레이 */
#sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);backdrop-filter:blur(3px);z-index:90;
}

/* ══ 반응형 ══ */
@media(max-width:768px){
  html,body{height:100svh;overflow:hidden;}
  body{flex-direction:column;overflow:hidden;}
  #mobile-header{display:flex;position:sticky;top:0;left:0;right:0;padding:0 14px;padding-top:env(safe-area-inset-top);height:calc(56px + env(safe-area-inset-top));z-index:220;}
  #sidebar{
    position:fixed;
    top:calc(56px + env(safe-area-inset-top));
    left:0;
    width:min(320px,88vw);
    min-width:min(320px,88vw);
    height:calc(100svh - 56px - env(safe-area-inset-top));
    max-height:calc(100svh - 56px - env(safe-area-inset-top));
    padding-bottom:env(safe-area-inset-bottom);
    transform:translateX(-100%);
    z-index:210;
    box-shadow:var(--shadow);
  }
  #sidebar.open{transform:translateX(0);}
  #sidebar-header{padding:18px 14px 14px;}
  #menu-list{padding:12px 10px 24px;}
  #sidebar-footer{padding:12px 10px calc(16px + env(safe-area-inset-bottom));}
  #sidebar-overlay.open{display:block;z-index:205;}
  #main{
    margin-top:0;
    min-height:calc(100svh - 56px - env(safe-area-inset-top));
    height:calc(100svh - 56px - env(safe-area-inset-top));
    overflow:hidden;
  }
  #main-header{padding:12px 14px;min-height:58px;position:sticky;top:0;z-index:10;}
  #main-title{font-size:22px;}
  #btn-add-item{display:none;}
  #btn-theme{display:none;}
  #items-container{padding:12px 12px calc(16px + env(safe-area-inset-bottom));overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;scroll-behavior:auto;}
  .items-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;align-items:start;}
  .item-card{border-radius:12px;}
  .item-card:hover{transform:none;box-shadow:0 2px 12px rgba(0,0,0,.25);}
  .card-title-bar{padding:10px 12px 9px;min-height:40px;}
  .card-title-text{font-size:12.5px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card-title-text.empty{font-size:11px;}
  .card-body{padding:10px 12px;}
  .card-memo{font-size:12px;line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .link-display{padding:8px 10px;}
  .link-display a{font-size:10px;}
  .yt-box{padding-bottom:140%;}
  .yt-play-btn{width:54px;height:38px;border-radius:10px;}
  .yt-play-btn::after{border-left:16px solid white;border-top:9px solid transparent;border-bottom:9px solid transparent;}
  .card-footer{padding:9px 10px;gap:6px;}
  .card-action-btn{padding:6px 10px;font-size:11px;}
  .modal{padding:22px 18px;border-radius:16px;max-width:100%;}
  .modal-overlay{padding:12px;align-items:flex-end;}
  .form-input,.form-textarea{font-size:16px;}
  .menu-item:hover{background:transparent;border-color:transparent;}
  .menu-item.active:hover{background:var(--accent-dim);border-color:rgba(255,78,42,.3);}
}
@media(max-width:480px){
  #items-container{padding:10px 10px calc(18px + env(safe-area-inset-bottom));}
  #main-title{font-size:18px;}
  .items-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;}
  .yt-box{padding-bottom:146%;}
  .card-title-bar{padding:9px 10px 8px;}
  .card-body{padding:9px 10px;}
  .card-footer{padding:8px 9px;}
  .empty-box{max-width:none;width:100%;padding:28px 20px;}
}

@media (hover:none) and (pointer:coarse){
  .menu-actions{display:flex;}
  .menu-btn{padding:4px 9px;}
}

</style>
</head>
<body>

<!-- 모바일 헤더 -->
<div id="mobile-header">
  <button id="btn-menu-toggle" onclick="toggleSidebar()">
    <span></span><span></span><span></span>
  </button>
  <div id="mobile-logo">💪 Workout</div>
  <button class="hdr-icon-btn" id="btn-theme-m" onclick="toggleTheme()" title="테마 전환">🌙</button>
  <button id="mobile-add-btn" onclick="openAddItem()" disabled>＋</button>
</div>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- 사이드바 -->
<div id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-logo"><div class="logo-icon">💪</div>WORKOUT</div>
    <div id="sidebar-sub">Training Log</div>
  </div>
  <div id="menu-list"></div>
  <div id="sidebar-footer">
    <button id="btn-add-menu">＋ 메뉴 추가</button>
  </div>
</div>

<!-- 메인 -->
<div id="main">
  <div id="main-header">
    <div id="main-title">메뉴를 <span>선택</span>하세요</div>
    <button class="hdr-icon-btn" id="btn-theme" onclick="toggleTheme()" title="테마 전환">🌙</button>
    <button id="btn-add-item" disabled>＋ 기록 추가</button>
  </div>
  <div id="items-container">
    <div id="empty-state">
      <div class="empty-box">
        <div class="icon">🏋️</div>
        <p>좌측 메뉴에서 카테고리를 선택하거나<br/><b>메뉴 추가</b>로 새로운 운동을 시작해보세요.</p>
      </div>
    </div>
  </div>
</div>

<!-- 모달: 메뉴 -->
<div class="modal-overlay" id="modal-menu">
  <div class="modal">
    <div class="modal-title" id="modal-menu-title">메뉴 <span class="accent">추가</span></div>
    <div class="form-group">
      <label class="form-label">메뉴 이름</label>
      <input class="form-input" id="input-menu-name" type="text" placeholder="예: 가슴 운동, 하체 루틴…"/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-menu')">취소</button>
      <button class="btn-confirm" id="btn-menu-confirm">저장</button>
    </div>
  </div>
</div>

<!-- 모달: 기록 -->
<div class="modal-overlay" id="modal-item">
  <div class="modal">
    <div class="modal-title" id="modal-item-title">기록 <span class="accent">추가</span></div>
    <div class="form-group">
      <label class="form-label">제목 (선택)</label>
      <input class="form-input" id="input-item-title" type="text" placeholder="예: 벤치프레스 3세트, 오늘의 숄더…"/>
    </div>
    <div class="form-group">
      <label class="form-label">유튜브 링크 (선택)</label>
      <input class="form-input" id="input-item-link" type="url" placeholder="https://www.youtube.com/watch?v=…"/>
      <p class="form-hint">// 유튜브 링크 → 사이트 내 재생 🎬</p>
    </div>
    <div class="form-group">
      <label class="form-label">메모 (선택)</label>
      <textarea class="form-textarea" id="input-item-memo" placeholder="세트 수, 무게, 느낀 점 등…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-item')">취소</button>
      <button class="btn-confirm" id="btn-item-confirm">저장</button>
    </div>
  </div>
</div>

<script>
// ── 데이터 마이그레이션: 기존 item에 title 필드 없으면 추가 ──
let data = JSON.parse(localStorage.getItem('workoutData') || '{"menus":[],"items":{}}');
Object.values(data.items).forEach(arr => arr.forEach(item => { if(!item.title) item.title=''; }));

let activeMenuId = null;

function activeMenuName() {
  const menu = data.menus.find(m => m.id === activeMenuId);
  return menu ? menu.name : '';
}
function updateMobileHeaderTitle() {
  const logo = document.getElementById('mobile-logo');
  if (!logo) return;
  const name = activeMenuName();
  logo.textContent = name ? `💪 ${name}` : '💪 Workout';
}

function save() { localStorage.setItem('workoutData', JSON.stringify(data)); }
function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ── 테마 ──
function applyThemeIcons() {
  const icon = document.body.classList.contains('light') ? '☀️' : '🌙';
  document.getElementById('btn-theme').textContent = icon;
  document.getElementById('btn-theme-m').textContent = icon;
}
function toggleTheme() {
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
  applyThemeIcons();
}
// 복원
if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
applyThemeIcons();

// ── 모바일 사이드바 ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ── 유튜브 ──
function isYouTube(url) {
  return /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)/i.test(url);
}
function getYouTubeId(url) {
  const p = [/(?:youtube\.com\/watch\?v=)([^&\s]+)/, /(?:youtu\.be\/)([^?\s]+)/, /(?:youtube\.com\/shorts\/)([^?\s]+)/];
  for (const r of p) { const m = url.match(r); if (m) return m[1]; }
  return null;
}
function buildYTEmbed(url) {
  const id = getYouTubeId(url); if (!id) return null;
  const wid = 'yt' + Date.now() + Math.random().toString(36).slice(2, 6);
  return `<div class="yt-box" id="${wid}"><div class="yt-thumb-layer" onclick="ytPlay('${wid}','${id}')"><img class="yt-thumb-img" src="https://img.youtube.com/vi/${id}/hqdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${id}/mqdefault.jpg'" alt=""/><div class="yt-play-btn"></div></div></div>`;
}
function ytPlay(wid, videoId) {
  const box = document.getElementById(wid); if (!box) return;
  box.innerHTML = '<iframe style="position:absolute;inset:0;width:100%;height:100%;border:none;" src="https://www.youtube.com/embed/' + videoId + '?autoplay=1&rel=0&modestbranding=1&playsinline=1" allow="autoplay;encrypted-media;picture-in-picture;fullscreen" allowfullscreen></iframe>';
}

// ── 사이드바 렌더 ──
function renderMenus() {
  const list = document.getElementById('menu-list');
  list.innerHTML = '';
  data.menus.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'menu-item' + (m.id === activeMenuId ? ' active' : '');
    div.innerHTML = `
      <div class="menu-dot"></div>
      <div class="menu-name">${escHtml(m.name)}</div>
      <div class="menu-actions">
        <button class="menu-btn" onclick="event.stopPropagation();openEditMenu('${m.id}')">수정</button>
        <button class="menu-btn del" onclick="event.stopPropagation();deleteMenu('${m.id}')">삭제</button>
      </div>`;
    const handleSelect = (e) => {
      if (e.target.closest('.menu-actions')) return;
      e.preventDefault();
      selectMenu(m.id);
      closeSidebar();
    };
    div.addEventListener('click', handleSelect);
    div.addEventListener('touchend', handleSelect, {passive:false});
    list.appendChild(div);
  });
}

// ── 카드 렌더 ──
function renderItems() {
  const container = document.getElementById('items-container');
  const header    = document.getElementById('main-title');
  const addBtn    = document.getElementById('btn-add-item');
  const mobileAdd = document.getElementById('mobile-add-btn');

  updateMobileHeaderTitle();

  if (!activeMenuId) {
    header.innerHTML = '메뉴를 <span>선택</span>하세요';
    addBtn.disabled = mobileAdd.disabled = true;
    container.innerHTML = `<div id="empty-state"><div class="empty-box"><div class="icon">🏋️</div><p>좌측 메뉴에서 카테고리를 선택하거나<br/><b>메뉴 추가</b>로 새로운 운동을 시작해보세요.</p></div></div>`;
    return;
  }

  const menu = data.menus.find(m => m.id === activeMenuId);
  header.textContent = menu.name;
  addBtn.disabled = mobileAdd.disabled = false;

  const items = data.items[activeMenuId] || [];
  if (items.length === 0) {
    container.innerHTML = `<div id="empty-state"><div class="empty-box"><div class="icon">📝</div><p>아직 기록이 없어요.<br/><b>기록 추가</b> 버튼을 눌러보세요!</p></div></div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'items-grid';

  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.style.animationDelay = (i * 0.06) + 's';

    // 제목 바 (중앙 정렬)
    const safeTitle = (item.title || '').trim();
    const titleText = safeTitle
      ? `<span class="card-title-text">${escHtml(safeTitle)}</span>`
      : `<span class="card-title-text empty">#${String(i+1).padStart(2,'0')}</span>`;
    const titleBar = `<div class="card-title-bar">${titleText}</div>`;

    // 링크/영상
    let mediaHtml = '';
    if (item.link) {
      mediaHtml = isYouTube(item.link)
        ? (buildYTEmbed(item.link) || linkDisplay(item.link))
        : linkDisplay(item.link);
    }

    // 제목과 미디어 사이 구분선
    const divider = mediaHtml ? '<div class="card-divider"></div>' : '';

    // 메모
    const memoHtml = item.memo
      ? `<div class="card-body"><div class="card-memo">${escHtml(item.memo)}</div></div>` : '';

    // 버튼
    const footer = `<div class="card-footer">
      <button class="card-action-btn" onclick="openEditItem('${item.id}')">수정</button>
      <button class="card-action-btn del" onclick="deleteItem('${item.id}')">삭제</button>
    </div>`;

    card.innerHTML = titleBar + divider + mediaHtml + memoHtml + footer;
    grid.appendChild(card);
  });

  container.innerHTML = '';
  container.appendChild(grid);
}

function linkDisplay(url) {
  return `<div class="link-display"><span class="link-icon">🔗</span><a href="${escAttr(url)}" target="_blank" rel="noopener">${escHtml(url)}</a></div>`;
}

function resetContentScroll() {
  const container = document.getElementById('items-container');
  if (container) {
    container.scrollTop = 0;
    container.style.scrollBehavior = 'auto';
  }
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
  window.scrollTo(0, 0);
}

function selectMenu(id) {
  activeMenuId = id;
  renderMenus();
  renderItems();
  resetContentScroll();
}

// ── 메뉴 CRUD ──
let editingMenuId = null;
function openAddMenu() {
  editingMenuId = null;
  document.getElementById('modal-menu-title').innerHTML = '메뉴 <span class="accent">추가</span>';
  document.getElementById('input-menu-name').value = '';
  openModal('modal-menu');
  setTimeout(() => document.getElementById('input-menu-name').focus(), 100);
}
function openEditMenu(id) {
  editingMenuId = id;
  const m = data.menus.find(x => x.id === id);
  document.getElementById('modal-menu-title').innerHTML = '메뉴 <span class="accent">수정</span>';
  document.getElementById('input-menu-name').value = m.name;
  openModal('modal-menu');
  setTimeout(() => document.getElementById('input-menu-name').focus(), 100);
}
function saveMenu() {
  const name = document.getElementById('input-menu-name').value.trim();
  if (!name) { document.getElementById('input-menu-name').focus(); return; }
  if (editingMenuId) {
    data.menus.find(m => m.id === editingMenuId).name = name;
  } else {
    const id = uid();
    data.menus.unshift({ id, name });
    data.items[id] = [];
    activeMenuId = id;
  }
  save();
  renderMenus();
  renderItems();
  updateMobileHeaderTitle();
  const list = document.getElementById('menu-list');
  if (list) list.scrollTop = 0;
  resetContentScroll();
  closeModal('modal-menu');
}
function deleteMenu(id) {
  if (!confirm('메뉴를 삭제하면 안의 기록도 모두 삭제됩니다. 계속할까요?')) return;
  data.menus = data.menus.filter(m => m.id !== id);
  delete data.items[id];
  if (activeMenuId === id) activeMenuId = data.menus.length > 0 ? data.menus[0].id : null;
  save(); renderMenus(); renderItems(); updateMobileHeaderTitle(); resetContentScroll();
}

// ── 기록 CRUD ──
let editingItemId = null;
function openAddItem() {
  if (!activeMenuId) return;
  editingItemId = null;
  document.getElementById('modal-item-title').innerHTML = '기록 <span class="accent">추가</span>';
  document.getElementById('input-item-title').value = '';
  document.getElementById('input-item-link').value = '';
  document.getElementById('input-item-memo').value = '';
  openModal('modal-item');
  setTimeout(() => document.getElementById('input-item-title').focus(), 100);
}
function openEditItem(id) {
  editingItemId = id;
  const item = (data.items[activeMenuId] || []).find(x => x.id === id);
  document.getElementById('modal-item-title').innerHTML = '기록 <span class="accent">수정</span>';
  document.getElementById('input-item-title').value = item.title || '';
  document.getElementById('input-item-link').value = item.link || '';
  document.getElementById('input-item-memo').value = item.memo || '';
  openModal('modal-item');
  setTimeout(() => document.getElementById('input-item-title').focus(), 100);
}
function saveItem() {
  const title = document.getElementById('input-item-title').value.trim();
  const link  = document.getElementById('input-item-link').value.trim();
  const memo  = document.getElementById('input-item-memo').value.trim();
  if (!title && !link && !memo) return;
  if (!data.items[activeMenuId]) data.items[activeMenuId] = [];
  if (editingItemId) {
    const item = data.items[activeMenuId].find(x => x.id === editingItemId);
    if (!item) return;
    item.title = title;
    item.link = link;
    item.memo = memo;
  } else {
    data.items[activeMenuId].push({ id: uid(), title, link, memo });
  }
  save();
  closeModal('modal-item');
  renderItems();
  resetContentScroll();
}
function deleteItem(id) {
  if (!confirm('이 기록을 삭제할까요?')) return;
  data.items[activeMenuId] = (data.items[activeMenuId] || []).filter(x => x.id !== id);
  save(); renderItems(); resetContentScroll();
}

// ── 모달 ──
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (document.activeElement && typeof document.activeElement.blur === 'function') {
    document.activeElement.blur();
  }
}
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});
document.getElementById('input-menu-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveMenu();
  if (e.key === 'Escape') closeModal('modal-menu');
});
document.getElementById('input-item-memo').addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal('modal-item');
});
document.getElementById('btn-add-menu').addEventListener('click', openAddMenu);
document.getElementById('btn-add-item').addEventListener('click', openAddItem);
document.getElementById('btn-menu-confirm').addEventListener('click', saveMenu);
document.getElementById('btn-item-confirm').addEventListener('click', saveItem);

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return escHtml(s); }

// ── 초기화: 첫 번째 메뉴 자동 선택 ──
if (data.menus.length > 0) activeMenuId = data.menus[0].id;
renderMenus();
renderItems();
updateMobileHeaderTitle();
</script>
</body>
</html>
