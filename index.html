<script>
(function(){
  if(window.__WORKOUT_V44__) return;
  window.__WORKOUT_V44__=true;

  function mobileUI(){return matchMedia('(max-width:900px)').matches || ((navigator.maxTouchPoints||0)>0 && innerWidth<=980);}
  function esc44(s){try{return typeof esc==='function'?esc(s):String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}catch(e){return String(s||'');}}
  function currentSub(mid){try{return getActiveSub(mid,(data.items[mid]||[]));}catch(e){return 'shorts';}}
  function typeLabel(type){try{return (SUBS[type]?.icon||'')+' '+(SUBS[type]?.label||type);}catch(e){return type==='shorts'?'⚡ 숏폼':'▶ 롱폼';}}

  function applyMobileOrderMode(){
    const isMob=mobileUI();
    const grid=document.querySelector('#ct > .grid');
    if(grid){
      if(isMob){grid.dataset.dragDisabled='1';grid.dataset.dragDisabledMobile='1';}
      else if(grid.dataset.dragDisabledMobile==='1'){
        delete grid.dataset.dragDisabledMobile;
        if(!(typeof filtersActive==='function' && aid && filtersActive(aid))) delete grid.dataset.dragDisabled;
      }
    }
    document.querySelectorAll('#ct .grid .card').forEach(card=>{
      if(isMob){card.dataset.dragDisabled='1';card.dataset.mobileOrderOnly='1';}
      else if(card.dataset.mobileOrderOnly==='1'){
        delete card.dataset.mobileOrderOnly;
        if(!(typeof filtersActive==='function' && aid && filtersActive(aid))) delete card.dataset.dragDisabled;
      }
    });
  }

  // 모바일 터치 드래그 정렬은 불안정하므로 렌더 후 강제로 비활성화
  const oldRenderItems=window.renderItems;
  if(typeof oldRenderItems==='function'){
    window.renderItems=function(){
      const r=oldRenderItems.apply(this,arguments);
      requestAnimationFrame(applyMobileOrderMode);
      return r;
    };
  }
  const oldRender=window.render;
  if(typeof oldRender==='function'){
    window.render=function(){
      const r=oldRender.apply(this,arguments);
      requestAnimationFrame(applyMobileOrderMode);
      return r;
    };
  }
  window.addEventListener('resize',()=>requestAnimationFrame(applyMobileOrderMode),{passive:true});
  window.addEventListener('orientationchange',()=>setTimeout(applyMobileOrderMode,120),{passive:true});

  // 콘텐츠 툴바에 모바일 전용 순서 변경 버튼 추가
  if(typeof buildContentToolbar==='function'){
    buildContentToolbar=function(mid,cur){
      const wrap=document.createElement('section');
      wrap.className='content-toolbar';
      wrap.innerHTML=`<button id="btn-add" class="content-add" onclick="openAddLink()">
          <svg width="14" height="14" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span class="btn-lbl">링크 추가</span>
        </button>
        <button type="button" class="content-add reorder-add" onclick="openOrderManager('${esc44(mid)}','${esc44(cur||currentSub(mid))}')">
          <span aria-hidden="true">↕</span><span class="btn-lbl">순서 변경</span>
        </button>`;
      return wrap;
    };
  }

  const orderState={mid:null,type:'shorts',ids:[]};

  function listFor(mid,type){
    const arr=(data.items&&data.items[mid])||[];
    return arr.filter(it=>{try{return videoTypeFromItem(it)===type;}catch(e){return it.vtype===type;}});
  }
  function titleForId(mid,id){
    const it=((data.items&&data.items[mid])||[]).find(x=>String(x.id)===String(id));
    if(!it)return '삭제된 영상';
    return it.title||it.name||it.link||'제목 없음';
  }
  function ensureOrderModal(){
    let ov=document.getElementById('m-order');
    if(!ov){
      ov=document.createElement('div');
      ov.className='ov';
      ov.id='m-order';
      ov.addEventListener('click',e=>{if(e.target===ov)closeModal('m-order');});
      document.body.appendChild(ov);
    }
    return ov;
  }
  function renderOrderModal(){
    const ov=ensureOrderModal();
    const mid=orderState.mid;
    const type=orderState.type;
    const menu=(data.menus||[]).find(m=>String(m.id)===String(mid));
    const rows=orderState.ids.map((id,idx)=>{
      const title=titleForId(mid,id);
      return `<div class="order-row" data-id="${esc44(id)}">
        <div class="order-no">${idx+1}</div>
        <div class="order-info"><div class="order-title">${esc44(title)}</div><div class="order-sub">${esc44(menu?.name||'현재 메뉴')} · ${esc44(typeLabel(type))}</div></div>
        <div class="order-btns">
          <button class="order-btn" type="button" ${idx===0?'disabled':''} onclick="orderMove('${esc44(id)}','top')" title="맨 위">⇈</button>
          <button class="order-btn" type="button" ${idx===0?'disabled':''} onclick="orderMove('${esc44(id)}','up')" title="위로">↑</button>
          <button class="order-btn" type="button" ${idx===orderState.ids.length-1?'disabled':''} onclick="orderMove('${esc44(id)}','down')" title="아래로">↓</button>
          <button class="order-btn" type="button" ${idx===orderState.ids.length-1?'disabled':''} onclick="orderMove('${esc44(id)}','bottom')" title="맨 아래">⇊</button>
        </div>
      </div>`;
    }).join('') || '<div class="share-empty-small">현재 탭에 정렬할 영상이 없습니다.</div>';
    ov.innerHTML=`<div class="modal order-modal">
      <div class="mrow"><div class="mttl">영상 <span class="ac">순서 변경</span></div><button class="mclose" onclick="closeModal('m-order')">✕</button></div>
      <div class="order-head-note"><b>${esc44(menu?.name||'현재 메뉴')}</b> / <b>${esc44(typeLabel(type))}</b><br/>드래그 대신 버튼으로 순서를 바꿉니다. 1번 ↔ 3번처럼 떨어진 영상도 맨 위/맨 아래 버튼으로 바로 이동할 수 있습니다.</div>
      <div class="order-list">${rows}</div>
      <div class="order-actions"><button class="share-btn" type="button" onclick="closeModal('m-order')">취소</button><button class="share-btn primary" type="button" onclick="applyOrderManager()">순서 저장</button></div>
    </div>`;
  }
  window.openOrderManager=function(mid=aid,type){
    if(!mid||!data.items||!Array.isArray(data.items[mid])){showCenterToast&&showCenterToast('정렬할 메뉴가 없습니다.');return;}
    const cur=(type==='shorts'||type==='longform')?type:currentSub(mid);
    const ids=listFor(mid,cur).map(it=>String(it.id));
    orderState.mid=mid;orderState.type=cur;orderState.ids=ids;
    renderOrderModal();openModal('m-order');
    setTimeout(()=>{const box=document.querySelector('#m-order .order-list');if(box)box.scrollTop=0;},20);
  };
  window.orderMove=function(id,dir){
    const ids=orderState.ids;
    const idx=ids.findIndex(x=>String(x)===String(id));
    if(idx<0)return;
    const item=ids.splice(idx,1)[0];
    let to=idx;
    if(dir==='up')to=Math.max(0,idx-1);
    else if(dir==='down')to=Math.min(ids.length,idx+1);
    else if(dir==='top')to=0;
    else if(dir==='bottom')to=ids.length;
    ids.splice(to,0,item);
    renderOrderModal();
    const row=document.querySelector(`#m-order .order-row[data-id="${CSS.escape(String(id))}"]`);
    if(row) row.scrollIntoView({block:'nearest',behavior:'smooth'});
  };
  window.applyOrderManager=function(){
    const mid=orderState.mid,type=orderState.type,ids=orderState.ids.slice();
    if(!mid||!Array.isArray(data.items[mid]))return;
    const byId=new Map(data.items[mid].map(it=>[String(it.id),it]));
    let cursor=0;
    data.items[mid]=data.items[mid].map(it=>{
      const t=(typeof videoTypeFromItem==='function')?videoTypeFromItem(it):(it.vtype||'shorts');
      if(t!==type)return it;
      const next=byId.get(String(ids[cursor++]));
      return next||it;
    });
    try{save();}catch(e){}
    try{activateSubOnly(mid,type);}catch(e){}
    closeModal('m-order');
    try{render();}catch(e){try{renderItems();}catch(_){}}
    showCenterToast&&showCenterToast('영상 순서 저장 완료',`${typeLabel(type)} 영상 순서를 저장했습니다.`);
  };

  // 초기 화면에도 적용
  requestAnimationFrame(applyMobileOrderMode);
})();
</script>

<script>
(function(){
  if(window.__WORKOUT_V45__) return;
  window.__WORKOUT_V45__=true;

  function safeEsc(s){
    try{return typeof esc==='function'?esc(s):String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
    catch(e){return String(s||'');}
  }
  function currentType(mid){
    try{return getActiveSub(mid,(data.items&&data.items[mid])||[]);}catch(e){return 'shorts';}
  }

  // buildContentToolbar를 최종 버전으로 고정: 링크 추가 + 순서 변경 버튼 항상 렌더링
  window.buildContentToolbar = buildContentToolbar = function(mid,cur){
    const type=(cur==='shorts'||cur==='longform')?cur:currentType(mid);
    const wrap=document.createElement('section');
    wrap.className='content-toolbar action-toolbar';
    wrap.innerHTML=`<button id="btn-add" class="content-add" type="button" onclick="openAddLink()">
        <svg width="14" height="14" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span class="btn-lbl">링크 추가</span>
      </button>
      <button type="button" class="content-add reorder-add" onclick="openOrderManager('${safeEsc(mid)}','${safeEsc(type)}')">
        <span aria-hidden="true">↕</span><span class="btn-lbl">순서 변경</span>
      </button>`;
    return wrap;
  };

  // 기존 화면이 이미 렌더된 뒤 패치가 적용되는 문제 방지: 현재 화면을 한 번 다시 그려 버튼을 즉시 노출
  requestAnimationFrame(function(){
    try{
      if(typeof renderItems==='function') renderItems();
      else if(typeof render==='function') render();
    }catch(e){}
  });
})();
</script>
