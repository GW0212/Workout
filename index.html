<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>운동 기록</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect fill='%23ff4e2a' x='0' y='0' width='64' height='64' rx='14'/%3E%3Crect fill='white' x='28' y='25' width='8' height='14' rx='2'/%3E%3Crect fill='white' x='5' y='21' width='7' height='22' rx='3'/%3E%3Crect fill='white' x='52' y='21' width='7' height='22' rx='3'/%3E%3Crect fill='white' x='3' y='26' width='11' height='12' rx='2'/%3E%3Crect fill='white' x='50' y='26' width='11' height='12' rx='2'/%3E%3Crect fill='white' x='12' y='29' width='16' height='6' rx='2'/%3E%3Crect fill='white' x='36' y='29' width='16' height='6' rx='2'/%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Pretendard:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080808;--surface:#111;--surface2:#181818;--surface3:#222;--surface4:#2c2c2c;
  --accent:#ff4e2a;--accent2:#ff7a57;--accent-glow:rgba(255,78,42,.25);
  --text:#f2f2f2;--text-sub:#999;--text-muted:#444;
  --border:#1e1e1e;--border2:#2c2c2c;--red:#ff3b30;
  --sidebar-w:260px;
  --card-num-bg:rgba(255,78,42,.12);--card-num-color:var(--accent);
}
/* 라이트 모드 */
body.light{
  --bg:#f5f5f4;--surface:#fff;--surface2:#f0f0ef;--surface3:#e8e8e7;--surface4:#d8d8d7;
  --text:#1a1a1a;--text-sub:#555;--text-muted:#aaa;
  --border:#e4e4e4;--border2:#d0d0d0;
  --card-num-bg:rgba(255,78,42,.1);--card-num-color:var(--accent);
}
/* 카드 번호 배지 */
.card-num{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:24px;height:24px;padding:0 7px;
  background:var(--card-num-bg);color:var(--card-num-color);
  border-radius:6px;font-size:11px;font-weight:700;
  font-family:'JetBrains Mono',monospace;letter-spacing:.5px;
  flex-shrink:0;
}
/* 테마 토글 버튼 */
#btn-theme{
  width:34px;height:34px;background:var(--surface2);border:1px solid var(--border2);
  border-radius:9px;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;color:var(--text-sub);
  flex-shrink:0;
}
#btn-theme:hover{background:var(--surface3);color:var(--text);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);display:flex;}

/* 모바일 헤더 */
#mobile-header{
  display:none;position:fixed;top:0;left:0;right:0;height:56px;
  background:rgba(17,17,17,.95);border-bottom:1px solid var(--border);
  align-items:center;padding:0 14px;gap:10px;z-index:200;
  backdrop-filter:blur(12px);
}
#btn-menu-toggle{
  width:36px;height:36px;background:none;border:none;color:var(--text-sub);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:5px;border-radius:8px;transition:background .15s;
}
#btn-menu-toggle:hover{background:var(--surface3);}
#btn-menu-toggle span{display:block;width:18px;height:2px;background:currentColor;border-radius:2px;transition:all .3s;}
#mobile-logo{font-family:'Bebas Neue',cursive;font-size:22px;color:var(--accent);letter-spacing:2px;flex:1;}
#mobile-add-btn{
  width:34px;height:34px;background:var(--accent);border:none;color:white;
  border-radius:9px;font-size:20px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .2s;box-shadow:0 3px 12px rgba(255,78,42,.35);
}
#mobile-add-btn:hover{background:var(--accent2);}
#mobile-add-btn:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;}

/* 사이드바 */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:relative;z-index:100;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
body.light #mobile-header{background:rgba(255,255,255,.95);}
#sidebar-header{padding:22px 18px 16px;border-bottom:1px solid var(--border);}
#sidebar-logo{
  font-family:'Bebas Neue',cursive;font-size:26px;color:var(--accent);
  letter-spacing:2.5px;line-height:1;display:flex;align-items:center;gap:9px;
}
.logo-icon{
  width:28px;height:28px;background:var(--accent);border-radius:7px;
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
  box-shadow:0 3px 12px rgba(255,78,42,.4);
}
#sidebar-sub{
  font-size:10px;color:var(--text-muted);letter-spacing:2px;
  text-transform:uppercase;margin-top:5px;font-family:'JetBrains Mono',monospace;
}
#menu-list{flex:1;overflow-y:auto;padding:10px 8px;}
#menu-list::-webkit-scrollbar{width:3px;}
#menu-list::-webkit-scrollbar-thumb{background:var(--surface4);border-radius:2px;}
.menu-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:10px;cursor:pointer;transition:all .18s;position:relative;margin-bottom:2px;
}
.menu-item:hover{background:var(--surface2);}
.menu-item.active{background:linear-gradient(135deg,rgba(255,78,42,.16),rgba(255,78,42,.05));border:1px solid rgba(255,78,42,.18);}
.menu-item.active .menu-name{color:var(--accent);}
.menu-dot{width:7px;height:7px;border-radius:50%;background:var(--surface4);flex-shrink:0;transition:all .2s;}
.menu-item.active .menu-dot{background:var(--accent);box-shadow:0 0 8px rgba(255,78,42,.5);}
.menu-name{flex:1;font-size:13.5px;font-weight:500;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s;}
.menu-actions{display:none;gap:2px;}
.menu-item:hover .menu-actions,.menu-item.active .menu-actions{display:flex;}
.menu-btn{padding:3px 6px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:12px;border-radius:5px;transition:all .15s;line-height:1;}
.menu-btn:hover{background:var(--surface3);color:var(--text);}
.menu-btn.del:hover{color:var(--red);}
#sidebar-footer{padding:12px 8px 16px;border-top:1px solid var(--border);}
#btn-add-menu{
  width:100%;padding:11px;background:transparent;border:1px dashed var(--border2);
  color:var(--text-muted);border-radius:10px;cursor:pointer;
  font-size:13px;font-family:'Pretendard',sans-serif;font-weight:500;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;
}
#btn-add-menu:hover{border-color:var(--accent);color:var(--accent);background:rgba(255,78,42,.05);}

/* 메인 */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
#main-header{
  padding:18px 28px 15px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;min-height:66px;
  background:rgba(8,8,8,.85);backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:10;
}
body.light #main-header{background:rgba(245,245,244,.92);}
#main-title{
  font-family:'Bebas Neue',cursive;font-size:34px;letter-spacing:2px;
  color:var(--text);flex:1;line-height:1;
  text-align:center;  /* ① 중앙 정렬 */
}
#main-title span{color:var(--accent);}
#btn-add-item{
  padding:10px 20px;background:var(--accent);border:none;color:white;
  border-radius:10px;cursor:pointer;font-size:13px;font-family:'Pretendard',sans-serif;
  font-weight:700;transition:all .25s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  box-shadow:0 4px 18px rgba(255,78,42,.35);
}
#btn-add-item:hover{background:var(--accent2);transform:translateY(-2px) scale(1.03);box-shadow:0 8px 28px rgba(255,78,42,.5);}
#btn-add-item:active{transform:scale(.97);}
#btn-add-item:disabled{opacity:.25;cursor:not-allowed;transform:none;box-shadow:none;}

#items-container{flex:1;overflow-y:auto;padding:22px 26px;}
#items-container::-webkit-scrollbar{width:4px;}
#items-container::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}

/* 빈 상태 */
#empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:14px;animation:fadeUp .4s ease;
}
#empty-state .icon{font-size:54px;opacity:.25;filter:grayscale(1);}
#empty-state p{font-size:14px;text-align:center;line-height:1.9;color:var(--text-muted);}
#empty-state b{color:var(--text-sub);}

/* 그리드 */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}

/* 카드 */
.item-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;transition:border-color .2s,transform .25s cubic-bezier(.34,1.2,.64,1),box-shadow .25s;
  animation:fadeUp .35s cubic-bezier(.34,1.2,.64,1) both;
}
.item-card:hover{border-color:var(--border2);transform:translateY(-4px);box-shadow:0 18px 48px rgba(0,0,0,.55);}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

.card-body{padding:14px 16px;}
.card-memo{font-size:13.5px;color:var(--text-sub);line-height:1.8;white-space:pre-wrap;word-break:break-word;}
.link-display{
  padding:11px 14px;background:var(--surface2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;overflow:hidden;
}
.link-display a{
  color:#6eaaff;text-decoration:none;font-size:11.5px;
  font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .15s;
}
.link-display a:hover{color:#9cc4ff;}
.link-icon{font-size:13px;flex-shrink:0;}
.card-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end;}
.card-action-btn{
  padding:5px 12px;border:1px solid var(--border2);background:transparent;
  color:var(--text-muted);border-radius:7px;cursor:pointer;
  font-size:11.5px;font-family:'Pretendard',sans-serif;font-weight:500;transition:all .15s;
}
.card-action-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--surface4);}
.card-action-btn.del:hover{border-color:var(--red);color:var(--red);background:rgba(255,59,48,.06);}

/* 유튜브 */
.yt-box{position:relative;padding-bottom:100%;background:#000;overflow:hidden;}
.yt-box>*{position:absolute;inset:0;width:100%;height:100%;}
.yt-thumb-layer{cursor:pointer;}
.yt-thumb-img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .3s,transform .5s;}
.yt-thumb-layer:hover .yt-thumb-img{opacity:.65;transform:scale(1.06);}
.yt-thumb-layer::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 55%);
  pointer-events:none;
}
.yt-play-btn{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:62px;height:44px;background:rgba(255,0,0,.92);border-radius:12px;
  pointer-events:none;
  box-shadow:0 4px 24px rgba(0,0,0,.7),0 0 0 3px rgba(255,255,255,.1);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),background .2s,box-shadow .2s;
}
.yt-thumb-layer:hover .yt-play-btn{
  background:#ff0000;
  transform:translate(-50%,-50%) scale(1.18);
  box-shadow:0 10px 36px rgba(255,0,0,.55),0 0 0 5px rgba(255,255,255,.15);
}
.yt-play-btn::after{
  content:'';position:absolute;top:50%;left:54%;
  transform:translate(-50%,-50%);
  border-left:19px solid white;border-top:11px solid transparent;border-bottom:11px solid transparent;
}

/* 모달 */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.82);backdrop-filter:blur(10px);
  z-index:1000;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--surface);border:1px solid var(--border2);border-radius:18px;
  width:100%;max-width:460px;padding:28px;
  animation:modalIn .25s cubic-bezier(.34,1.2,.64,1);
  box-shadow:0 40px 90px rgba(0,0,0,.75);
}
@keyframes modalIn{from{opacity:0;transform:scale(.92) translateY(14px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-title{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:1.5px;color:var(--text);margin-bottom:22px;}
.modal-title .accent{color:var(--accent);}
.form-group{margin-bottom:16px;}
.form-label{
  display:block;font-size:10px;font-weight:700;color:var(--text-muted);
  letter-spacing:1.8px;text-transform:uppercase;margin-bottom:7px;
  font-family:'JetBrains Mono',monospace;
}
.form-input,.form-textarea{
  width:100%;background:var(--surface2);border:1px solid var(--border2);
  border-radius:10px;color:var(--text);font-family:'Pretendard',sans-serif;
  font-size:14px;padding:11px 14px;transition:border-color .2s,box-shadow .2s;outline:none;
}
.form-input:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,78,42,.12);}
.form-textarea{resize:vertical;min-height:100px;line-height:1.7;}
.form-hint{font-size:11px;color:var(--text-muted);margin-top:5px;font-family:'JetBrains Mono',monospace;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:24px;}
.btn-cancel{
  padding:10px 18px;background:transparent;border:1px solid var(--border2);
  color:var(--text-sub);border-radius:10px;cursor:pointer;font-size:13.5px;
  font-family:'Pretendard',sans-serif;font-weight:500;transition:all .15s;
}
.btn-cancel:hover{background:var(--surface2);color:var(--text);}
.btn-confirm{
  padding:10px 22px;background:var(--accent);border:none;color:white;
  border-radius:10px;cursor:pointer;font-size:13.5px;
  font-family:'Pretendard',sans-serif;font-weight:700;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 14px rgba(255,78,42,.35);
}
.btn-confirm:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 6px 22px rgba(255,78,42,.5);}

/* 사이드바 오버레이 (모바일) */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(3px);z-index:90;}

/* ── 반응형 ── */
@media(max-width:768px){
  html,body{height:auto;overflow:auto;}
  body{flex-direction:column;}
  #mobile-header{display:flex;}
  #sidebar{
    position:fixed;top:0;left:0;bottom:0;
    transform:translateX(-100%);z-index:150;
  }
  #sidebar.open{transform:translateX(0);}
  #sidebar-overlay.open{display:block;}
  #main{margin-top:56px;min-height:calc(100vh - 56px);overflow:visible;}
  #main-header{padding:13px 15px 11px;min-height:54px;position:sticky;top:56px;}
  #main-title{font-size:26px;}
  #btn-add-item{display:none;}
  #items-container{padding:14px 12px;overflow:visible;flex:none;}
  .items-grid{grid-template-columns:1fr;gap:12px;}
  .item-card:hover{transform:none;box-shadow:none;}
  .modal{padding:22px 18px;border-radius:16px;}
  .modal-overlay{padding:12px;}
}
@media(max-width:480px){
  #items-container{padding:10px 10px;}
  #main-title{font-size:22px;}
  .items-grid{gap:10px;}
}
</style>
</head>
<body>

<!-- 모바일 헤더 -->
<div id="mobile-header">
  <button id="btn-menu-toggle" onclick="toggleSidebar()">
    <span></span><span></span><span></span>
  </button>
  <div id="mobile-logo">💪 WORKOUT</div>
  <button id="btn-theme-mobile" onclick="toggleTheme()" style="width:32px;height:32px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;">🌙</button>
  <button id="mobile-add-btn" onclick="openAddItem()" disabled>＋</button>
</div>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- 사이드바 -->
<div id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-logo"><div class="logo-icon">💪</div>WORKOUT</div>
    <div id="sidebar-sub">Training Log</div>
  </div>
  <div id="menu-list"></div>
  <div id="sidebar-footer">
    <button id="btn-add-menu">＋ 메뉴 추가</button>
  </div>
</div>

<!-- 메인 -->
<div id="main">
  <div id="main-header">
    <div id="main-title">메뉴를 <span>선택</span>하세요</div>
    <button id="btn-theme" onclick="toggleTheme()" title="다크/라이트 모드">🌙</button>
    <button id="btn-add-item" disabled>＋ 기록 추가</button>
  </div>
  <div id="items-container">
    <div id="empty-state">
      <div class="icon">🏋️</div>
      <p>좌측 메뉴에서 카테고리를 선택하거나<br/><b>메뉴 추가</b>로 새로운 운동을 시작해보세요.</p>
    </div>
  </div>
</div>

<!-- 모달: 메뉴 -->
<div class="modal-overlay" id="modal-menu">
  <div class="modal">
    <div class="modal-title" id="modal-menu-title">메뉴 <span class="accent">추가</span></div>
    <div class="form-group">
      <label class="form-label">메뉴 이름</label>
      <input class="form-input" id="input-menu-name" type="text" placeholder="예: 가슴 운동, 하체 루틴…"/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-menu')">취소</button>
      <button class="btn-confirm" id="btn-menu-confirm">저장</button>
    </div>
  </div>
</div>

<!-- 모달: 기록 -->
<div class="modal-overlay" id="modal-item">
  <div class="modal">
    <div class="modal-title" id="modal-item-title">기록 <span class="accent">추가</span></div>
    <div class="form-group">
      <label class="form-label">링크 (선택)</label>
      <input class="form-input" id="input-item-link" type="url" placeholder="https://www.youtube.com/watch?v=…"/>
      <p class="form-hint">// 유튜브 링크 → 사이트 내 재생 🎬</p>
    </div>
    <div class="form-group">
      <label class="form-label">메모</label>
      <textarea class="form-textarea" id="input-item-memo" placeholder="세트 수, 무게, 느낀 점 등…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-item')">취소</button>
      <button class="btn-confirm" id="btn-item-confirm">저장</button>
    </div>
  </div>
</div>

<script>
let data=JSON.parse(localStorage.getItem('workoutData')||'{"menus":[],"items":{}}');
let activeMenuId=null;
function save(){localStorage.setItem('workoutData',JSON.stringify(data));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

function isYouTube(url){return /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)/i.test(url);}
function getYouTubeId(url){
  const p=[/(?:youtube\.com\/watch\?v=)([^&\s]+)/,/(?:youtu\.be\/)([^?\s]+)/,/(?:youtube\.com\/shorts\/)([^?\s]+)/];
  for(const r of p){const m=url.match(r);if(m)return m[1];}return null;
}
function buildYTEmbed(url){
  const id=getYouTubeId(url);if(!id)return null;
  const wid='yt'+Date.now()+Math.random().toString(36).slice(2,6);
  return `<div class="yt-box" id="${wid}"><div class="yt-thumb-layer" onclick="ytPlay('${wid}','${id}')"><img class="yt-thumb-img" src="https://img.youtube.com/vi/${id}/hqdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${id}/mqdefault.jpg'" alt=""/><div class="yt-play-btn"></div></div></div>`;
}
function ytPlay(wid,videoId){
  const box=document.getElementById(wid);if(!box)return;
  box.innerHTML='<iframe style="position:absolute;inset:0;width:100%;height:100%;border:none;" src="https://www.youtube.com/embed/'+videoId+'?autoplay=1&rel=0&modestbranding=1&playsinline=1" allow="autoplay;encrypted-media;picture-in-picture;fullscreen" allowfullscreen></iframe>';
}

function renderMenus(){
  const list=document.getElementById('menu-list');list.innerHTML='';
  data.menus.forEach((m,i)=>{
    const div=document.createElement('div');
    div.className='menu-item'+(m.id===activeMenuId?' active':'');
    div.style.animationDelay=(i*0.04)+'s';
    div.innerHTML=`<div class="menu-dot"></div><div class="menu-name">${escHtml(m.name)}</div><div class="menu-actions"><button class="menu-btn" onclick="event.stopPropagation();openEditMenu('${m.id}')">✏️</button><button class="menu-btn del" onclick="event.stopPropagation();deleteMenu('${m.id}')">🗑</button></div>`;
    div.addEventListener('click',()=>{selectMenu(m.id);closeSidebar();});
    list.appendChild(div);
  });
}

function renderItems(){
  const container=document.getElementById('items-container');
  const header=document.getElementById('main-title');
  const addBtn=document.getElementById('btn-add-item');
  const mobileAdd=document.getElementById('mobile-add-btn');
  if(!activeMenuId){
    header.innerHTML='메뉴를 <span>선택</span>하세요';
    addBtn.disabled=mobileAdd.disabled=true;
    container.innerHTML=`<div id="empty-state"><div class="icon">🏋️</div><p>좌측 메뉴에서 카테고리를 선택하거나<br/><b>메뉴 추가</b>로 새로운 운동을 시작해보세요.</p></div>`;
    return;
  }
  const menu=data.menus.find(m=>m.id===activeMenuId);
  header.innerHTML=`<span>${escHtml(menu.name)}</span>`;
  addBtn.disabled=mobileAdd.disabled=false;
  const items=data.items[activeMenuId]||[];
  if(items.length===0){
    container.innerHTML=`<div id="empty-state"><div class="icon">📝</div><p>아직 기록이 없어요.<br/><b>기록 추가</b> 버튼을 눌러보세요!</p></div>`;
    return;
  }
  const grid=document.createElement('div');grid.className='items-grid';
  items.forEach((item,i)=>{
    const card=document.createElement('div');
    card.className='item-card';card.style.animationDelay=(i*0.06)+'s';
    let topHtml='';
    if(item.link){topHtml=isYouTube(item.link)?(buildYTEmbed(item.link)||linkDisplay(item.link)):linkDisplay(item.link);}
    const memoHtml=item.memo?`<div class="card-body"><div class="card-memo">${escHtml(item.memo)}</div></div>`:'';
    /* 구분 레이블: 번호 + 영상/메모 타입 표시 */
    const typeLabel=item.link&&isYouTube(item.link)
      ?'<span style="font-size:11px;color:var(--text-muted);font-family:JetBrains Mono,monospace;">▶ VIDEO</span>'
      :item.link
        ?'<span style="font-size:11px;color:var(--text-muted);font-family:JetBrains Mono,monospace;">🔗 LINK</span>'
        :'<span style="font-size:11px;color:var(--text-muted);font-family:JetBrains Mono,monospace;">📝 NOTE</span>';
    const labelBar=`<div style="display:flex;align-items:center;gap:8px;padding:8px 14px 0;"><span class="card-num">#${String(i+1).padStart(2,'0')}</span>${typeLabel}</div>`;
    card.innerHTML=`${labelBar}${topHtml}${memoHtml}<div class="card-footer"><button class="card-action-btn" onclick="openEditItem('${item.id}')">✏️ 수정</button><button class="card-action-btn del" onclick="deleteItem('${item.id}')">🗑 삭제</button></div>`;
    grid.appendChild(card);
  });
  container.innerHTML='';container.appendChild(grid);
}

}
