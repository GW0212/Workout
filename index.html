/* v56: PC toolbar spacing + stable sortable feedback */
.toolbar.panel{
  padding:10px 12px;
  align-items:center;
}
.toolbar-actions{
  padding:0;
}
.toolbar-actions select,
.toolbar-actions .btn,
.toolbar-actions .count-chip,
.toolbar-actions .subtab{
  height:50px;
  min-height:50px;
  align-items:center;
}
.toolbar-actions .btn.small{
  height:50px;
  padding:0 16px;
}
.toolbar-actions .subtab{
  min-width:132px;
  padding:0 14px;
}
.toolbar-actions .btn.primary,
.toolbar-actions .order-btn{
  padding:0 18px;
}
.drop-placeholder{
  border:2px dashed rgba(242,83,59,.55);
  background:linear-gradient(180deg,rgba(242,83,59,.10),rgba(242,83,59,.04));
  color:var(--accent);
  border-radius:22px;
  min-height:220px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:900;
  letter-spacing:-.2px;
  box-shadow:inset 0 0 0 1px rgba(242,83,59,.10);
  transition:none!important;
}
.grid.longform .drop-placeholder{aspect-ratio:16/9;min-height:260px;}
.grid.shorts .drop-placeholder{aspect-ratio:9/16;min-height:320px;}
.card.dragging{
  opacity:.28;
  transform:scale(.985)!important;
  box-shadow:none!important;
}
.card.sorting-source{
  display:none!important;
}
body.card-sorting{
  user-select:none;
  cursor:grabbing;
}
.drag-ghost{
  position:fixed;
  left:0;
  top:0;
  width:260px!important;
  max-height:190px!important;
  overflow:hidden!important;
  opacity:.96;
  pointer-events:none;
  border:2px solid var(--accent)!important;
  box-shadow:0 16px 42px rgba(0,0,0,.24)!important;
  z-index:9999;
  transform:translate3d(-9999px,-9999px,0) scale(.88);
  transform-origin:top left;
  will-change:transform;
}
.drag-ghost .ytbox{max-height:120px!important;}

  @media (hover:hover) and (pointer:fine){
    .grid .card.dragging{opacity:.28!important; transform:scale(.985)!important;}
    .drop-placeholder{display:flex!important;align-items:center!important;justify-content:center!important;text-align:center!important;}
  }
body.dark .drop-placeholder{
  border-color:rgba(255,98,71,.68);
  background:rgba(255,98,71,.13);

<script>
const LS_DATA='workoutData';
const LS_MENU='workoutActiveMenuId';
const LS_TYPE='workoutActiveVideoType';

let data, activeMenuId, activeType, homeMode=false, editVideo=null, editMenuId=null, editMenuId2=null, lastDetect=null, detectTimer=null;
let searchText='', favOnly=false, sortMode='manual';
let importData=null, orderDraft=[];

const $=id=>document.getElementById(id);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,9);
const isMobile=()=>matchMedia('(max-width:768px), (pointer:coarse)').matches;
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const asBool=v=>v===true||v===1||v==='1'||String(v).toLowerCase()==='true'||v==='on';
const isFav=v=>asBool(v?.favorite)||asBool(v?.fav);
function normalizeFavorites(){Object.values(data.items||{}).forEach(arr=>(arr||[]).forEach(v=>{v.favorite=isFav(v);delete v.fav;}));}
const nowStr=()=>new Date().toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});

function loadData(){
  try{data=JSON.parse(localStorage.getItem(LS_DATA)||'{"menus":[],"items":{}}')}catch{data={menus:[],items:{}}}
  if(!Array.isArray(data.menus))data.menus=[]; if(!data.items||typeof data.items!=='object')data.items={};
  const seenMenus=new Set(); const newItems={};
  data.menus=data.menus.filter(m=>m&&typeof m==='object').map(m=>({id:String(m.id||uid()),name:String(m.name||'메뉴')})).filter(m=>{if(seenMenus.has(m.id)){m.id=uid()}seenMenus.add(m.id);return true});
  const seenVideo=new Set();
  data.menus.forEach(m=>{
    const arr=Array.isArray(data.items[m.id])?data.items[m.id]:[];
    newItems[m.id]=arr.filter(Boolean).map(v=>{
      const link=String(v.link||v.url||'').trim();
      let id=String(v.id||uid()); if(seenVideo.has(id))id=uid(); seenVideo.add(id);
      const type=(v.vtype||v.type||detectType(link));
      return {id,title:String(v.title||v.name||link||'제목 없음'),link,memo:String(v.memo||v.content||''),type:type==='shorts'?'shorts':'longform',favorite:asBool(v.favorite)||asBool(v.fav),createdAt:v.createdAt||new Date().toISOString(),ratio:v.ratio||null};
    });
  });
  data.items=newItems; normalizeFavorites(); save();
  activeMenuId=localStorage.getItem(LS_MENU); if(!data.menus.some(m=>m.id===activeMenuId))activeMenuId=data.menus[0]?.id||null;
  activeType=localStorage.getItem(LS_TYPE)||'shorts'; if(!['shorts','longform'].includes(activeType))activeType='shorts';
}
function save(){localStorage.setItem(LS_DATA,JSON.stringify(data));}

function getId(url){const s=String(url||'');const ps=[/youtube\.com\/watch\?[^\s#]*v=([^&#\s]+)/i,/youtu\.be\/([^?&#\s]+)/i,/youtube\.com\/shorts\/([^?&#\s]+)/i,/youtube\.com\/embed\/([^?&#\s]+)/i];for(const p of ps){const m=s.match(p);if(m)return m[1]}return ''}
function detectType(url){return /youtube\.com\/shorts\//i.test(String(url||''))?'shorts':'longform'}
function isYT(url){return !!getId(url)}
async function detectYT(url){
  const id=getId(url); if(!id)return null;
  const original=String(url||'').trim(); let type=detectType(original); let title=''; let ratio=type==='shorts'?177.78:56.25;
  try{const r=await fetch('https://www.youtube.com/oembed?url='+encodeURIComponent(original)+'&format=json'); if(r.ok){const d=await r.json(); title=d.title||''; if(d.width&&d.height){ratio=(d.height/d.width)*100; if(ratio>100)type='shorts';}}}catch(e){}
  return {id,type,ratio,title};
}
function thumbUrl(id,quality='maxresdefault'){return `https://img.youtube.com/vi/${id}/${quality}.jpg`}
function thumbImg(id){return `<img src="${thumbUrl(id)}" alt="" loading="lazy" data-step="0" onerror="fallbackThumb(this,'${id}')">`}

function embedUrl(id,autoplay=1){const origin=location.origin&&location.origin!=='null'?`&origin=${encodeURIComponent(location.origin)}`:'';return `https://www.youtube.com/embed/${id}?autoplay=${autoplay}&playsinline=1&controls=1&fs=1&rel=0&modestbranding=1&enablejsapi=1${origin}`}

function setupCardDrag(){
  const grid=$('videoGrid');
  if(!grid||isMobile())return;

  const placeholder=document.createElement('div');
  placeholder.className='drop-placeholder';
  placeholder.textContent='여기로 이동';

  let state=null;
  const MOVE_THRESHOLD=3;

  const cards=()=>[...grid.querySelectorAll('.card')].filter(el=>el!==state?.card);
  const getPointer=e=>({x:e.clientX,y:e.clientY});

  function removeGhost(){
    if(state?.ghost?.parentNode)state.ghost.remove();
  }

  function cleanup(saveIt=false){
    if(!state)return;
    const {card}=state;
    if(saveIt&&placeholder.parentNode){
      grid.insertBefore(card,placeholder);
    }
    card.classList.remove('dragging','sorting-source');
    card.style.removeProperty('display');
    if(placeholder.parentNode)placeholder.remove();
    removeGhost();
    document.body.classList.remove('card-sorting');
    try{card.releasePointerCapture(state.pointerId)}catch(_){ }
    const moved=saveIt&&saveDomOrder();
    state=null;
    if(moved)showToast('영상 순서를 저장했습니다.');
  }

  function saveDomOrder(){
    const ids=[...grid.querySelectorAll('.card')].map(c=>c.dataset.id).filter(Boolean);
    if(!ids.length)return false;
    const all=menuItems();
    const currentTyped=all.filter(v=>v.type===activeType).map(v=>v.id).join('|');
    const now=ids.join('|');
    if(now===currentTyped)return false;
    const typedMap=new Map(all.filter(v=>v.type===activeType).map(v=>[v.id,v]));
    const other=all.filter(v=>v.type!==activeType);
    const ordered=ids.map(id=>typedMap.get(id)).filter(Boolean);
    if(!ordered.length)return false;
    data.items[activeMenuId]=[...ordered,...other];
    save();
    return true;
  }

  function makeGhost(card){
    const r=card.getBoundingClientRect();
    const g=card.cloneNode(true);
    g.classList.add('drag-ghost');
    g.style.width=Math.min(r.width,300)+'px';
    document.body.appendChild(g);
    return g;
  }

  function startDrag(e){
    const {card}=state;
    state.dragging=true;
    document.body.classList.add('card-sorting');
    state.ghost=makeGhost(card);

    // 원래 자리에는 placeholder를 두고 원본 카드는 레이아웃에서 제거합니다.
    // 이렇게 해야 왼쪽/위쪽으로 이동할 때 카드와 placeholder가 서로 밀어내며 깜빡이지 않습니다.
    grid.insertBefore(placeholder,card);
    card.classList.add('dragging','sorting-source');
    moveGhost(e);
  }

  function moveGhost(e){
    if(!state?.ghost)return;
    const x=e.clientX-state.offsetX;
    const y=e.clientY-state.offsetY;
    state.ghost.style.transform=`translate3d(${x}px,${y}px,0) scale(.88)`;
  }

  function getRows(){
    const els=[...grid.querySelectorAll('.card')].filter(el=>el!==state?.card);
    const items=els.map(el=>({el,rect:el.getBoundingClientRect()}))
      .filter(x=>x.rect.width>0&&x.rect.height>0)
      .sort((a,b)=>Math.abs(a.rect.top-b.rect.top)>24?a.rect.top-b.rect.top:a.rect.left-b.rect.left);
    const rows=[];
    for(const item of items){
      let row=rows.find(r=>Math.abs(r.top-item.rect.top)<28);
      if(!row){row={top:item.rect.top,bottom:item.rect.bottom,items:[]};rows.push(row);}
      row.items.push(item);
      row.top=Math.min(row.top,item.rect.top);row.bottom=Math.max(row.bottom,item.rect.bottom);
    }
    rows.forEach(r=>r.items.sort((a,b)=>a.rect.left-b.rect.left));
    rows.sort((a,b)=>a.top-b.top);
    return rows;
  }

  function findBeforeElement(x,y){
    const rows=getRows();
    if(!rows.length)return null;

    // 위쪽 영역이면 첫 카드 앞, 아래쪽 영역이면 맨 뒤로 보냅니다.
    if(y<rows[0].top)return rows[0].items[0].el;
    if(y>rows[rows.length-1].bottom)return null;

    let row=rows.find(r=>y>=r.top-18&&y<=r.bottom+18);
    if(!row){
      row=rows.reduce((best,r)=>{
        const cy=(r.top+r.bottom)/2;
        const d=Math.abs(y-cy);
        return !best||d<best.d?{r,d}:best;
      },null).r;
    }

    // 같은 줄 안에서는 카드 중앙선 기준으로 위치를 바꾸되, 반응이 답답하지 않도록 여유값을 낮게 둡니다.
    const BUFFER=0;
    for(const item of row.items){
      const mid=item.rect.left+item.rect.width/2;
      if(x<mid-BUFFER)return item.el;
    }

    // 줄의 마지막 카드 뒤. 다음 줄이 있으면 다음 줄 첫 카드 앞, 없으면 맨 뒤.
    const rowIndex=rows.indexOf(row);
    const nextRow=rows[rowIndex+1];
    return nextRow?nextRow.items[0].el:null;
  }

  function placePlaceholder(e){
    if(!state?.dragging)return;
    const before=findBeforeElement(e.clientX,e.clientY);
    if(before===placeholder.nextSibling)return;
    grid.insertBefore(placeholder,before);
  }

  grid.querySelectorAll('.card').forEach(card=>{
    card.draggable=false;
    card.addEventListener('pointerdown',e=>{
      if(e.button!==0)return;
      if(e.target.closest('button,a,input,textarea,select,iframe,.ytthumb,.iconbtn'))return;
      const r=card.getBoundingClientRect();
      state={card,pointerId:e.pointerId,startX:e.clientX,startY:e.clientY,offsetX:e.clientX-r.left,offsetY:e.clientY-r.top,dragging:false,ghost:null};
      try{card.setPointerCapture(e.pointerId)}catch(_){ }
    });
  });

  window.addEventListener('pointermove',e=>{
    if(!state)return;
    const dx=e.clientX-state.startX, dy=e.clientY-state.startY;
    if(!state.dragging){
      if(Math.hypot(dx,dy)<MOVE_THRESHOLD)return;
      startDrag(e);
    }
    e.preventDefault();
    moveGhost(e);
    placePlaceholder(e);
  },{passive:false});

  window.addEventListener('pointerup',()=>{
    if(!state)return;
    cleanup(state.dragging);
  });
  window.addEventListener('pointercancel',()=>cleanup(false));
}

function setupTabDrag(){if(isMobile())return;const sc=$('tab-scroll');let src=null;sc.querySelectorAll('.tab:not(.new-tab)').forEach(tab=>{tab.addEventListener('dragstart',e=>{src=tab.dataset.id;tab.classList.add('dragging');e.dataTransfer.effectAllowed='move'});tab.addEventListener('dragend',()=>{src=null;sc.querySelectorAll('.tab').forEach(t=>t.classList.remove('dragging'))});tab.addEventListener('dragover',e=>e.preventDefault());tab.addEventListener('drop',e=>{e.preventDefault();const target=tab.dataset.id;if(!src||src===target)return;const s=data.menus.findIndex(m=>m.id===src),t=data.menus.findIndex(m=>m.id===target);const [m]=data.menus.splice(s,1);data.menus.splice(t,0,m);save();renderTabs();showToast('메뉴 순서를 저장했습니다.')})})}

function openShare(){renderShareStatus();renderExportTree();openModal('shareModal')}
function renderShareStatus(){const last=localStorage.getItem(LS_BACKUP);$('shareBackupStatus').innerHTML=last?`마지막 백업: ${new Date(last).toLocaleString('ko-KR')}`:`아직 백업 기록이 없습니다. 영상이 쌓이면 백업을 권장합니다.`}
function setShareTab(t){$('exportTab').classList.toggle('on',t==='export');$('importTab').classList.toggle('on',t==='import');$('exportPane').classList.toggle('on',t==='export');$('importPane').classList.toggle('on',t==='import')}
function renderExportTree(){const tree=$('exportTree');tree.innerHTML=data.menus.map(m=>`<details class="tree-menu"><summary><label><input type="checkbox" class="ex-menu" data-mid="${m.id}" checked> ${esc(m.name)}</label><span>${(data.items[m.id]||[]).length}</span></summary><div class="tree-items">${(data.items[m.id]||[]).map(v=>`<label class="checkrow"><input type="checkbox" class="ex-item" data-mid="${m.id}" data-vid="${v.id}" checked><span>${esc(v.title)} <b>${v.type==='shorts'?'⚡':'▶'}</b></span></label>`).join('')||'<div class="checkrow">영상 없음</div>'}</div></details>`).join('')||'<div class="empty">내보낼 데이터가 없습니다.</div>'}
function selectAllExport(val){document.querySelectorAll('#exportTree input[type=checkbox]').forEach(x=>x.checked=val)}
function selectedExportData(){const out={menus:[],items:{}};document.querySelectorAll('.ex-menu').forEach(ch=>{const mid=ch.dataset.mid;const checkedItems=[...document.querySelectorAll(`.ex-item[data-mid="${mid}"]:checked`)].map(x=>x.dataset.vid);if(ch.checked||checkedItems.length){const m=data.menus.find(x=>x.id===mid);const id=mid;out.menus.push({id,name:m.name});out.items[id]=(data.items[mid]||[]).filter(v=>checkedItems.includes(v.id)||ch.checked)}});return out}
function backupString(){return JSON.stringify(selectedExportData())}
function markBackup(){localStorage.setItem(LS_BACKUP,new Date().toISOString());renderShareStatus()}
function downloadBackup(){const blob=new Blob([backupString()],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`workout-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href);markBackup();showToast('JSON 백업을 저장했습니다.')}
function copyBackupCode(){const s=backupString();navigator.clipboard?.writeText(s).then(()=>{markBackup();showToast('공유 코드를 복사했습니다.')}).catch(()=>prompt('공유 코드를 복사하세요',s))}
async function mobileShareBackup(){const text=backupString();try{if(navigator.share){await navigator.share({title:'Workout backup',text});markBackup();showToast('공유창을 열었습니다.')}else copyBackupCode()}catch(e){}}
function readImportFile(e){const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=()=>loadImportData(r.result);r.readAsText(f)}
function loadImportCode(){loadImportData($('importCode').value)}
async function pasteImportCode(){try{$('importCode').value=await navigator.clipboard.readText();loadImportCode()}catch{showToast('클립보드 접근이 제한되었습니다.')}}
function loadImportData(txt){try{const obj=JSON.parse(txt);importData=normalizeImport(obj);renderImportTree();showToast('가져올 데이터를 읽었습니다.')}catch(e){showToast('가져올 수 없는 데이터입니다.')}}
function normalizeImport(obj){const menus=Array.isArray(obj.menus)?obj.menus:[];const items=obj.items&&typeof obj.items==='object'?obj.items:{};return {menus:menus.map(m=>({id:String(m.id||uid()),name:String(m.name||'메뉴')})),items}}
function renderImportTree(){const tree=$('importTree');tree.classList.remove('hidden');tree.innerHTML=importData.menus.map(m=>`<details class="tree-menu" open><summary><label><input type="checkbox" class="im-menu" data-mid="${m.id}" checked> ${esc(m.name)}</label><span>${(importData.items[m.id]||[]).length}</span></summary><div class="tree-items">${(importData.items[m.id]||[]).map((v,i)=>`<label class="checkrow"><input type="checkbox" class="im-item" data-mid="${m.id}" data-idx="${i}" checked><span>${esc(v.title||v.name||v.link||v.url||'제목 없음')}</span></label>`).join('')}</div></details>`).join('')}
function applyImportSelection(){if(!importData)return showToast('먼저 데이터를 읽어주세요.');document.querySelectorAll('.im-menu').forEach(ch=>{const src=importData.menus.find(m=>m.id===ch.dataset.mid);const ids=[...document.querySelectorAll(`.im-item[data-mid="${src.id}"]:checked`)].map(x=>Number(x.dataset.idx));if(!ch.checked&&!ids.length)return;let dst=data.menus.find(m=>m.name===src.name);if(!dst){dst={id:uid(),name:src.name};data.menus.push(dst);data.items[dst.id]=[]}const arr=importData.items[src.id]||[];ids.forEach(i=>{const raw=arr[i];const link=String(raw.link||raw.url||'').trim();if(link&&data.items[dst.id].some(v=>v.link===link))return;data.items[dst.id].push({id:uid(),title:String(raw.title||raw.name||link||'제목 없음'),link,memo:String(raw.memo||raw.content||''),type:(raw.type||raw.vtype||detectType(link))==='shorts'?'shorts':'longform',favorite:asBool(raw.favorite)||asBool(raw.fav),createdAt:raw.createdAt||new Date().toISOString()})})});save();closeModal('shareModal');render();showToast('데이터 가져오기를 완료했습니다.')}

function openModal(id){$(id).classList.add('open');document.body.classList.add('no-scroll')}
function closeModal(id){$(id).classList.remove('open');if(!document.querySelector('.ov.open')&&!$('playerModal').classList.contains('open'))document.body.classList.remove('no-scroll')}
document.querySelectorAll('.ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeModal(o.id)}));
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.querySelectorAll('.ov.open').forEach(o=>closeModal(o.id));closePlayer()}});
window.addEventListener('scroll',()=>{$('toTop').classList.toggle('show',window.scrollY>420)},{passive:true});

loadData();applyTheme();render();
</script>
