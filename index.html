<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Workout</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect fill='%23ff5a30' x='0' y='0' width='64' height='64' rx='14'/%3E%3Ctext x='32' y='42' font-size='34' text-anchor='middle'%3E%F0%9F%92%AA%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0b0d12;
  --surface:#12151b;
  --surface2:#171b22;
  --surface3:#1e2430;
  --surface4:#252d3a;
  --text:#eef2f7;
  --text-sub:#c6ced9;
  --text-muted:#8a93a0;
  --border:#232936;
  --border-strong:#394356;
  --accent:#ff5a30;
  --accent-soft:rgba(255,90,48,.14);
  --shadow:0 18px 48px rgba(0,0,0,.32);
  --sidebar-w:270px;
  --mobile-header-h:72px;
}
body.light{
  --bg:#f4f6fa;
  --surface:#ffffff;
  --surface2:#f5f7fb;
  --surface3:#edf1f7;
  --surface4:#e1e7f0;
  --text:#1a2230;
  --text-sub:#475468;
  --text-muted:#7b8798;
  --border:#dce3ec;
  --border-strong:#bcc8d8;
  --accent-soft:rgba(255,90,48,.1);
  --shadow:0 14px 32px rgba(20,32,58,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;overflow:hidden}
button,input,textarea{font:inherit}
button{border:0;background:none;color:inherit}
a{color:inherit}

#mobile-header{display:none}
#sidebar-overlay{display:none}

#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);height:100dvh;
  background:var(--surface);border-right:1px solid var(--border-strong);
  display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:20;
}
#sidebar-header{
  padding:20px 18px 16px;border-bottom:1px solid var(--border-strong);background:linear-gradient(180deg,var(--surface2),var(--surface));
}
#sidebar-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;color:var(--accent)}
.logo-icon{width:34px;height:34px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(255,90,48,.28)}
#sidebar-sub{margin-top:8px;color:var(--text-muted);font-size:11px;letter-spacing:2.2px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
#menu-list{flex:1;overflow:auto;padding:12px 12px 20px}
#menu-list::-webkit-scrollbar,#items-container::-webkit-scrollbar{width:6px}
#menu-list::-webkit-scrollbar-thumb,#items-container::-webkit-scrollbar-thumb{background:var(--surface4);border-radius:999px}
.menu-item{
  width:100%;display:flex;align-items:center;gap:10px;padding:13px 12px;margin-bottom:8px;border-radius:14px;border:1px solid transparent;
  background:transparent;cursor:pointer;transition:.18s ease;min-height:56px;
}
.menu-item:hover{background:var(--surface2);border-color:var(--border)}
.menu-item.active{background:var(--accent-soft);border-color:rgba(255,90,48,.45)}
.menu-dot{width:10px;height:10px;border-radius:999px;background:var(--surface4);flex:none}
.menu-item.active .menu-dot{background:var(--accent);box-shadow:0 0 0 4px rgba(255,90,48,.14)}
.menu-name{flex:1;min-width:0;font-weight:700;font-size:15px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.menu-actions{display:flex;gap:6px;flex:none}
.menu-btn{padding:8px 12px;border-radius:10px;background:var(--surface3);border:1px solid var(--border-strong);font-size:13px;font-weight:700;color:var(--text-sub);cursor:pointer;transition:.15s ease}
.menu-btn:hover{background:var(--surface4);color:var(--text)}
.menu-btn.del{background:transparent;border-color:transparent;color:var(--text-muted)}
.menu-btn.del:hover{background:rgba(255,90,48,.08);border-color:rgba(255,90,48,.2);color:var(--accent)}
#sidebar-footer{padding:12px;border-top:1px solid var(--border-strong);background:var(--surface);position:sticky;bottom:0}
#btn-add-menu{width:100%;height:48px;border-radius:14px;background:var(--surface2);border:1px dashed var(--border-strong);font-weight:700;color:var(--text-sub);cursor:pointer;transition:.18s ease}
#btn-add-menu:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

#main{flex:1;min-width:0;display:flex;flex-direction:column;height:100dvh;overflow:hidden}
#main-header{height:72px;flex:none;display:flex;align-items:center;gap:14px;padding:0 22px;border-bottom:1px solid var(--border-strong);background:linear-gradient(180deg,var(--surface),var(--bg));}
#main-title{flex:1;text-align:center;font-size:28px;font-weight:800;letter-spacing:-.02em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#main-title.is-empty span{color:var(--accent)}
.hdr-icon-btn,#mobile-menu-btn,#mobile-add-btn{width:46px;height:46px;border-radius:14px;border:1px solid var(--border-strong);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.18s ease;color:var(--text-sub);flex:none}
.hdr-icon-btn:hover,#mobile-menu-btn:hover,#mobile-add-btn:hover{background:var(--surface3);color:var(--text)}
#btn-add-item{height:46px;padding:0 18px;border-radius:14px;background:var(--accent);color:#fff;font-weight:800;cursor:pointer;box-shadow:0 10px 24px rgba(255,90,48,.22);transition:.18s ease;flex:none}
#btn-add-item:hover{transform:translateY(-1px)}
#btn-add-item:disabled,#mobile-add-btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
#items-container{flex:1;overflow:auto;padding:20px 22px 26px}

#empty-state{min-height:100%;display:flex;align-items:flex-start;justify-content:center;padding-top:20px}
.empty-box{max-width:520px;width:100%;background:linear-gradient(180deg,var(--surface),var(--surface2));border:1px solid var(--border-strong);border-radius:24px;box-shadow:var(--shadow);padding:42px 24px;text-align:center}
.empty-box .icon{font-size:54px;opacity:.7;margin-bottom:14px}
.empty-box h2{font-size:20px;font-weight:800;margin-bottom:14px}
.empty-box h2 span{color:var(--accent)}
.empty-box p{color:var(--text-sub);font-size:16px;line-height:1.75}
.empty-box b{color:var(--accent)}

.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;align-content:start}
.item-card{background:linear-gradient(180deg,var(--surface),var(--surface2));border:1px solid var(--border-strong);border-radius:20px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;min-width:0}
.card-title-bar{padding:14px 16px;border-bottom:1px solid var(--border-strong);background:rgba(255,255,255,.02)}
.card-title-text{display:block;text-align:center;font-size:15px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-title-text.empty{font-weight:700;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.yt-box,.thumb-box{position:relative;background:#000;aspect-ratio:9/16}
.yt-box iframe,.yt-thumb-layer,.yt-thumb-img{position:absolute;inset:0;width:100%;height:100%}
.yt-thumb-img{object-fit:cover;display:block}
.yt-thumb-layer{cursor:pointer}
.yt-thumb-layer::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(0,0,0,.28))}
.yt-play-btn{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:68px;height:48px;border-radius:16px;background:#ff1f1f;box-shadow:0 12px 28px rgba(0,0,0,.36)}
.yt-play-btn::after{content:'';position:absolute;left:54%;top:50%;transform:translate(-50%,-50%);border-left:18px solid #fff;border-top:11px solid transparent;border-bottom:11px solid transparent}
.card-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.card-memo{font-size:14px;line-height:1.7;color:var(--text-sub);white-space:pre-wrap;word-break:break-word}
.link-display{display:flex;align-items:center;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:var(--surface3)}
.link-display a{font-size:12px;color:#7db4ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none}
.link-display a:hover{text-decoration:underline}
.card-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 16px;border-top:1px solid var(--border-strong);background:rgba(255,255,255,.015)}
.card-action-btn{height:40px;padding:0 16px;border-radius:12px;background:var(--surface3);border:1px solid var(--border-strong);font-size:13px;font-weight:800;color:var(--text-sub);cursor:pointer}
.card-action-btn.del{background:transparent;border-color:transparent;color:var(--text-muted)}
.card-action-btn.del:hover{color:var(--accent)}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:16px;z-index:200}
.modal-overlay.open{display:flex}
.modal{width:min(100%,460px);background:var(--surface);border:1px solid var(--border-strong);border-radius:24px;padding:26px;box-shadow:0 30px 70px rgba(0,0,0,.42)}
.modal-title{font-size:24px;font-weight:800;margin-bottom:20px}
.modal-title .accent{color:var(--accent)}
.form-group{margin-bottom:16px}
.form-label{display:block;margin-bottom:7px;font-size:12px;font-weight:800;color:var(--text-muted)}
.form-input,.form-textarea{width:100%;border-radius:14px;border:1px solid var(--border-strong);background:var(--surface2);color:var(--text);padding:14px 15px;font-size:16px;outline:none}
.form-input:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(255,90,48,.12)}
.form-textarea{min-height:120px;resize:vertical;line-height:1.6}
.form-hint{margin-top:6px;font-size:12px;color:var(--text-muted)}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.btn-cancel,.btn-confirm{height:46px;padding:0 18px;border-radius:14px;font-weight:800;cursor:pointer}
.btn-cancel{background:var(--surface2);border:1px solid var(--border-strong);color:var(--text-sub)}
.btn-confirm{background:var(--accent);color:#fff}

@media (max-width: 768px){
  body{overflow:hidden}
  #mobile-header{display:flex;position:fixed;top:0;left:0;right:0;height:var(--mobile-header-h);padding:0 max(16px, env(safe-area-inset-left)) 0 max(16px, env(safe-area-inset-right));align-items:center;gap:12px;background:linear-gradient(180deg,var(--surface),var(--bg));border-bottom:1px solid var(--border-strong);z-index:100}
  #mobile-brand{flex:1;min-width:0;display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #mobile-menu-btn{display:flex;flex-direction:column;gap:4px}
  #mobile-menu-btn span{display:block;width:18px;height:2px;background:currentColor;border-radius:2px}
  #mobile-add-btn{background:var(--accent);border-color:transparent;color:#fff;box-shadow:0 10px 24px rgba(255,90,48,.22)}
  #sidebar-overlay.open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:80}
  #sidebar{position:fixed;top:var(--mobile-header-h);left:0;height:calc(100dvh - var(--mobile-header-h));padding-bottom:env(safe-area-inset-bottom);width:min(86vw,340px);min-width:0;transform:translateX(-100%);transition:transform .24s ease;box-shadow:16px 0 40px rgba(0,0,0,.32);z-index:90}
  #sidebar.open{transform:translateX(0)}
  #main{height:100dvh;padding-top:var(--mobile-header-h)}
  #main-header{height:68px;padding:0 14px;position:sticky;top:var(--mobile-header-h);z-index:30;background:var(--surface);border-bottom:1px solid var(--border-strong)}
  #main-header .hdr-icon-btn{display:none}
  #main-title{font-size:26px}
  #btn-add-item{display:none}
  #items-container{padding:14px 12px 22px}
  #empty-state{padding-top:0;min-height:auto}
  .empty-box{padding:28px 18px;border-radius:20px}
  .empty-box .icon{font-size:42px}
  .empty-box h2{font-size:18px}
  .empty-box p{font-size:15px}
  .items-grid{grid-template-columns:1fr;gap:12px}
  .item-card{border-radius:16px;max-width:100%;width:100%}
  .card-title-bar{padding:10px 12px}
  .card-title-text{font-size:14px}
  .card-body{padding:10px 12px}
  .card-memo{font-size:12px;line-height:1.55}
  .link-display{padding:10px 12px}
  .link-display a{font-size:11px}
  .card-footer{padding:10px 12px;gap:6px}
  .card-action-btn{height:34px;padding:0 11px;border-radius:10px;font-size:12px}
  .yt-play-btn{width:56px;height:40px;border-radius:14px}
  .yt-play-btn::after{border-left-width:15px;border-top-width:9px;border-bottom-width:9px}
  .modal-overlay{padding:12px;align-items:flex-end}
  .modal{border-radius:22px 22px 0 0;padding:22px;max-height:88dvh;overflow:auto}
}
@media (max-width: 420px){
  #main-title{font-size:24px}
}
</style>
</head>
<body>
<div id="mobile-header">
  <button id="mobile-menu-btn" onclick="toggleSidebar()" aria-label="메뉴 열기"><span></span><span></span><span></span></button>
  <div id="mobile-brand">💪 <span id="mobile-brand-text">Workout</span></div>
  <button class="hdr-icon-btn" id="btn-theme-m" onclick="toggleTheme()" title="테마 전환">🌙</button>
  <button id="mobile-add-btn" onclick="openAddItem()" title="기록 추가" disabled>＋</button>
</div>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>
<div id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-logo"><div class="logo-icon">💪</div><span id="sidebar-title-text">Workout</span></div>
    <div id="sidebar-sub">Training Log</div>
  </div>
  <div id="menu-list"></div>
  <div id="sidebar-footer"><button id="btn-add-menu">＋ 메뉴 추가</button></div>
</div>
<div id="main">
  <div id="main-header">
    <div id="main-title" class="is-empty">메뉴를 <span>선택</span>하세요</div>
    <button class="hdr-icon-btn" id="btn-theme" onclick="toggleTheme()" title="테마 전환">🌙</button>
    <button id="btn-add-item" onclick="openAddItem()" disabled>＋ 기록 추가</button>
  </div>
  <div id="items-container"></div>
</div>
<div class="modal-overlay" id="modal-menu">
  <div class="modal">
    <div class="modal-title" id="modal-menu-title">메뉴 <span class="accent">추가</span></div>
    <div class="form-group">
      <label class="form-label">메뉴 이름</label>
      <input class="form-input" id="input-menu-name" type="text" placeholder="예: 가슴 운동, 하체 루틴"/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-menu')">취소</button>
      <button class="btn-confirm" id="btn-menu-confirm">저장</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal-item">
  <div class="modal">
    <div class="modal-title" id="modal-item-title">기록 <span class="accent">추가</span></div>
    <div class="form-group">
      <label class="form-label">기록 제목</label>
      <input class="form-input" id="input-item-title" type="text" placeholder="예: 벤치프레스 3세트"/>
    </div>
    <div class="form-group">
      <label class="form-label">유튜브 링크 (선택)</label>
      <input class="form-input" id="input-item-link" type="url" placeholder="https://www.youtube.com/watch?v=..."/>
      <p class="form-hint">유튜브 링크는 사이트 안에서 바로 재생됩니다.</p>
    </div>
    <div class="form-group">
      <label class="form-label">메모 (선택)</label>
      <textarea class="form-textarea" id="input-item-memo" placeholder="세트 수, 무게, 메모"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-item')">취소</button>
      <button class="btn-confirm" id="btn-item-confirm">저장</button>
    </div>
  </div>
</div>
<script>
const STORAGE_KEY = 'workoutData';
const THEME_KEY = 'theme';
let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"menus":[],"items":{}}');
if (!Array.isArray(data.menus)) data.menus = [];
if (!data.items || typeof data.items !== 'object') data.items = {};
Object.values(data.items).forEach(arr => Array.isArray(arr) && arr.forEach(item => {
  if (typeof item.title !== 'string') item.title = typeof item.name === 'string' ? item.name : '';
  if (typeof item.link !== 'string') item.link = typeof item.url === 'string' ? item.url : '';
  if (typeof item.memo !== 'string') item.memo = typeof item.content === 'string' ? item.content : '';
}));
let activeMenuId = data.menus[0]?.id || null;
let editingMenuId = null;
let editingItemId = null;

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function uid(){ return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function escHtml(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return escHtml(s); }
function menuNameById(id){ return data.menus.find(m => m.id === id)?.name || ''; }
function getActiveItems(){ return data.items[activeMenuId] || []; }
function isMobile(){ return window.matchMedia('(max-width: 768px)').matches; }
function scrollContentTop(){ const el = document.getElementById('items-container'); el.scrollTo({top:0, behavior:'auto'}); }
function scrollMenuTop(){ document.getElementById('menu-list').scrollTo({top:0, behavior:'auto'}); }

function applyThemeIcons(){
  const icon = document.body.classList.contains('light') ? '☀️' : '🌙';
  document.getElementById('btn-theme').textContent = icon;
  document.getElementById('btn-theme-m').textContent = icon;
}
function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem(THEME_KEY, document.body.classList.contains('light') ? 'light' : 'dark');
  applyThemeIcons();
}
if (localStorage.getItem(THEME_KEY) === 'light') document.body.classList.add('light');
applyThemeIcons();

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

function updateTitles(){
  const title = menuNameById(activeMenuId);
  const mainTitle = document.getElementById('main-title');
  const sideTitle = document.getElementById('sidebar-title-text');
  if (title) {
    mainTitle.classList.remove('is-empty');
    mainTitle.textContent = title;
    sideTitle.textContent = title;
  } else {
    mainTitle.classList.add('is-empty');
    mainTitle.innerHTML = '메뉴를 <span>선택</span>하세요';
    sideTitle.textContent = 'Workout';
  }
  const enabled = !!title;
  document.getElementById('btn-add-item').disabled = !enabled;
  document.getElementById('mobile-add-btn').disabled = !enabled;
}

function renderEmptyState(kind='menu'){
  const container = document.getElementById('items-container');
  if (kind === 'items') {
    container.innerHTML = `<div id="empty-state"><div class="empty-box"><div class="icon">📝</div><h2><span>기록</span>이 아직 없어요</h2><p><b>기록 추가</b> 버튼을 눌러 첫 운동 기록을 남겨보세요.</p></div></div>`;
  } else {
    container.innerHTML = `<div id="empty-state"><div class="empty-box"><div class="icon">🏋️</div><h2>메뉴를 <span>선택</span>하세요</h2><p>좌측 메뉴에서 카테고리를 선택하거나<br><b>메뉴 추가</b>로 새로운 운동을 시작해보세요.</p></div></div>`;
  }
}

function renderMenus(){
  const list = document.getElementById('menu-list');
  list.innerHTML = '';
  data.menus.forEach(menu => {
    const row = document.createElement('div');
    row.className = 'menu-item' + (menu.id === activeMenuId ? ' active' : '');
    row.innerHTML = `
      <div class="menu-dot"></div>
      <div class="menu-name">${escHtml(menu.name)}</div>
      <div class="menu-actions">
        <button class="menu-btn" type="button">수정</button>
        <button class="menu-btn del" type="button">삭제</button>
      </div>`;
    row.querySelector('.menu-btn').addEventListener('click', e => { e.stopPropagation(); openEditMenu(menu.id); });
    row.querySelector('.menu-btn.del').addEventListener('click', e => { e.stopPropagation(); deleteMenu(menu.id); });
    const selectNow = (e) => {
      if (e.target.closest('.menu-actions')) return;
      e.preventDefault();
      selectMenu(menu.id, true);
    };
    row.addEventListener('touchend', selectNow, {passive:false});
    row.addEventListener('click', selectNow);
    list.appendChild(row);
  });
}

function isYouTube(url){ return /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)/i.test(url || ''); }
function getYouTubeId(url){
  const rules = [/(?:youtube\.com\/watch\?v=)([^&\s]+)/,/(?:youtu\.be\/)([^?\s]+)/,/(?:youtube\.com\/shorts\/)([^?\s]+)/];
  for (const r of rules){ const m = String(url).match(r); if (m) return m[1]; }
  return null;
}
function buildYTEmbed(url){
  const id = getYouTubeId(url); if (!id) return '';
  const wid = 'yt_' + uid();
  return `<div class="yt-box" id="${wid}"><div class="yt-thumb-layer" onclick="ytPlay('${wid}','${id}')"><img class="yt-thumb-img" src="https://img.youtube.com/vi/${id}/hqdefault.jpg" alt="썸네일"><div class="yt-play-btn"></div></div></div>`;
}
function ytPlay(wid, id){
  const box = document.getElementById(wid); if (!box) return;
  box.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1&playsinline=1" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>`;
}
function linkDisplay(url){
  return `<div class="link-display"><span>🔗</span><a href="${escAttr(url)}" target="_blank" rel="noopener">${escHtml(url)}</a></div>`;
}

function renderItems(){
  updateTitles();
  if (!activeMenuId) { renderEmptyState('menu'); return; }
  const items = getActiveItems();
  if (!items.length) { renderEmptyState('items'); return; }
  const grid = document.createElement('div');
  grid.className = 'items-grid';
  items.forEach((item, index) => {
    const card = document.createElement('div');
    card.className = 'item-card';
    const itemTitle = (item.title || item.name || '').trim();
    const title = itemTitle ? `<span class="card-title-text">${escHtml(itemTitle)}</span>` : `<span class="card-title-text empty">#${String(index+1).padStart(2,'0')}</span>`;
    let media = '';
    if (item.link?.trim()) media = isYouTube(item.link) ? buildYTEmbed(item.link) : '';
    let body = item.memo?.trim() ? `<div class="card-body"><div class="card-memo">${escHtml(item.memo)}</div></div>` : '';
    let link = item.link?.trim() && !isYouTube(item.link) ? linkDisplay(item.link) : (item.link?.trim() && isYouTube(item.link) ? linkDisplay(item.link) : '');
    card.innerHTML = `
      <div class="card-title-bar">${title}</div>
      ${media}
      ${body}
      ${link}
      <div class="card-footer">
        <button class="card-action-btn" type="button">수정</button>
        <button class="card-action-btn del" type="button">삭제</button>
      </div>`;
    card.querySelector('.card-action-btn').addEventListener('click', () => openEditItem(item.id));
    card.querySelector('.card-action-btn.del').addEventListener('click', () => deleteItem(item.id));
    grid.appendChild(card);
  });
  const container = document.getElementById('items-container');
  container.innerHTML = '';
  container.appendChild(grid);
}

function selectMenu(id, shouldClose=false){
  activeMenuId = id;
  renderMenus();
  renderItems();
  scrollContentTop();
  if (shouldClose && isMobile()) closeSidebar();
}

function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

function openAddMenu(){
  editingMenuId = null;
  document.getElementById('modal-menu-title').innerHTML = '메뉴 <span class="accent">추가</span>';
  document.getElementById('input-menu-name').value = '';
  openModal('modal-menu');
  setTimeout(() => document.getElementById('input-menu-name').focus(), 50);
}
function openEditMenu(id){
  editingMenuId = id;
  document.getElementById('modal-menu-title').innerHTML = '메뉴 <span class="accent">수정</span>';
  document.getElementById('input-menu-name').value = menuNameById(id);
  openModal('modal-menu');
  setTimeout(() => document.getElementById('input-menu-name').focus(), 50);
}
function saveMenu(){
  const name = document.getElementById('input-menu-name').value.trim();
  if (!name) return document.getElementById('input-menu-name').focus();
  if (editingMenuId) {
    const menu = data.menus.find(m => m.id === editingMenuId);
    if (menu) menu.name = name;
    activeMenuId = editingMenuId;
  } else {
    const id = uid();
    data.menus.unshift({id, name});
    data.items[id] = [];
    activeMenuId = id;
    scrollMenuTop();
  }
  save();
  renderMenus();
  renderItems();
  closeModal('modal-menu');
  scrollContentTop();
  requestAnimationFrame(scrollMenuTop);
  if (isMobile()) closeSidebar();
}
function deleteMenu(id){
  if (!confirm('메뉴를 삭제하면 안의 기록도 함께 삭제됩니다. 계속할까요?')) return;
  data.menus = data.menus.filter(m => m.id !== id);
  delete data.items[id];
  if (activeMenuId === id) activeMenuId = data.menus[0]?.id || null;
  save();
  renderMenus();
  renderItems();
  scrollContentTop();
}

function openAddItem(){
  if (!activeMenuId) return;
  editingItemId = null;
  document.getElementById('modal-item-title').innerHTML = '기록 <span class="accent">추가</span>';
  document.getElementById('input-item-title').value = '';
  document.getElementById('input-item-link').value = '';
  document.getElementById('input-item-memo').value = '';
  openModal('modal-item');
  setTimeout(() => document.getElementById('input-item-title').focus(), 50);
}
function openEditItem(id){
  const item = getActiveItems().find(v => v.id === id);
  if (!item) return;
  editingItemId = id;
  document.getElementById('modal-item-title').innerHTML = '기록 <span class="accent">수정</span>';
  document.getElementById('input-item-title').value = item.title || item.name || '';
  document.getElementById('input-item-link').value = item.link || item.url || '';
  document.getElementById('input-item-memo').value = item.memo || item.content || '';
  openModal('modal-item');
  setTimeout(() => document.getElementById('input-item-title').focus(), 50);
}
function saveItem(){
  if (!activeMenuId) return;
  const title = document.getElementById('input-item-title').value.trim();
  const link = document.getElementById('input-item-link').value.trim();
  const memo = document.getElementById('input-item-memo').value.trim();
  if (!title && !link && !memo) return;
  if (!data.items[activeMenuId]) data.items[activeMenuId] = [];
  if (editingItemId) {
    const item = data.items[activeMenuId].find(v => v.id === editingItemId);
    if (item) { item.title = title; item.name = title; item.link = link; item.url = link; item.memo = memo; item.content = memo; }
  } else {
    data.items[activeMenuId].unshift({ id: uid(), title, name:title, link, url:link, memo, content:memo });
  }
  save();
  renderItems();
  closeModal('modal-item');
  scrollContentTop();
}
function deleteItem(id){
  if (!confirm('이 기록을 삭제할까요?')) return;
  data.items[activeMenuId] = getActiveItems().filter(v => v.id !== id);
  save();
  renderItems();
}

document.getElementById('btn-add-menu').addEventListener('click', openAddMenu);
document.getElementById('btn-menu-confirm').addEventListener('click', saveMenu);
document.getElementById('btn-item-confirm').addEventListener('click', saveItem);
document.getElementById('input-menu-name').addEventListener('keydown', e => { if (e.key === 'Enter') saveMenu(); });
document.getElementById('input-item-title').addEventListener('keydown', e => { if (e.key === 'Enter') e.preventDefault(); });
window.addEventListener('resize', () => { if (!isMobile()) closeSidebar(); });

renderMenus();
renderItems();
</script>
</body>
</html>
